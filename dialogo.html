<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diálogo — Atlas Diplomático</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js" crossorigin="anonymous"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: #0d0f14;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1a1f2e 0%, #0d0f14 100%);
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #1a1f2e;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .back-btn, .voice-btn {
      background: none;
      border: none;
      color: #8892b0;
      cursor: pointer;
      font-size: 1.5rem;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .back-btn:hover, .voice-btn:hover {
      background: #1a1f2e;
      color: white;
    }

    .header-content {
      flex: 1;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 600;
      color: white;
      margin-bottom: 0.25rem;
    }

    .header-subtitle {
      font-size: 0.75rem;
      color: #8892b0;
    }

    main {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .chat {
      width: min(100%, 700px);
      margin: auto;
      padding: 40px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
      overflow-y: auto;
    }

    .chat::-webkit-scrollbar {
      width: 6px;
    }

    .chat::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat::-webkit-scrollbar-thumb {
      background: #1a1f2e;
      border-radius: 3px;
    }

    .chat::-webkit-scrollbar-thumb:hover {
      background: #2a3142;
    }

    .message {
      display: flex;
      width: 100%;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.left {
      justify-content: flex-start;
    }

    .message.right {
      justify-content: flex-end;
    }

    .bubble {
      background: white;
      color: #111;
      padding: 14px 18px;
      border-radius: 24px;
      max-width: 80%;
      line-height: 1.5;
      font-size: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: all 0.2s;
    }

    .left .bubble {
      border-bottom-left-radius: 8px;
    }

    .right .bubble {
      border-bottom-right-radius: 8px;
      background: #ec4899;
      color: white;
    }

    .bubble:hover {
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
    }

    .bubble-text {
      flex: 1;
    }

    .sound-btn {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 1rem;
      opacity: 0.7;
      transition: all 0.2s;
      padding: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: 50%;
    }

    .sound-btn:hover {
      opacity: 1;
      transform: scale(1.1);
    }

    .sound-btn.playing {
      animation: pulse 0.6s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.7;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.15);
      }
    }

    .time {
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.55;
      text-align: right;
    }

    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8892b0;
      text-align: center;
      padding: 2rem;
    }

    .fim-message {
      background: #10b981;
      color: white;
      padding: 14px 18px;
      border-radius: 24px;
      border-bottom-left-radius: 8px;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
      margin: auto;
      max-width: 80%;
    }

    .error-message {
      padding: 1rem;
      background: #7f1d1d;
      color: #fecaca;
      border-radius: 8px;
      border-left: 4px solid #dc2626;
      font-size: 0.95rem;
      margin: 1rem;
    }

    .bottom-section {
      background: #0d0f14;
      padding: 1rem 1.5rem;
      border-top: 1px solid #1a1f2e;
    }

    .progress-container {
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .progress-label {
      font-size: 0.75rem;
      color: #8892b0;
      text-align: center;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #1a1f2e;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ec4899, #06b6d4);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .button-group {
      display: flex;
      gap: 0.75rem;
    }

    button {
      flex: 1;
      padding: 0.875rem;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-next {
      background: #ec4899;
      color: white;
      box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
    }

    .btn-next:hover:not(:disabled) {
      background: #db2777;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
    }

    .btn-next:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-next:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-reset {
      background: #1a1f2e;
      color: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .btn-reset:hover {
      background: #2a3142;
    }

    .voice-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }

    .voice-modal.active {
      display: flex;
      align-items: flex-end;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .voice-modal-content {
      width: 100%;
      background: #1a1f2e;
      border-radius: 16px 16px 0 0;
      padding: 1.5rem;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }
      to {
        transform: translateY(0);
      }
    }

    .voice-modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: white;
      margin-bottom: 1rem;
    }

    .voice-options {
      display: grid;
      gap: 0.5rem;
    }

    .voice-option {
      background: #0d0f14;
      border: 2px solid #2a3142;
      color: white;
      padding: 1rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      font-size: 0.95rem;
    }

    .voice-option:hover {
      background: #2a3142;
      border-color: #06b6d4;
    }

    .voice-option.active {
      background: #ec4899;
      border-color: #ec4899;
      color: white;
      font-weight: 700;
    }

    .voice-option-label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .voice-option-desc {
      display: block;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      .chat {
        padding: 24px 14px;
      }

      .bubble {
        max-width: 88%;
        font-size: 14px;
      }

      header {
        padding: 0.875rem 1rem;
      }

      button {
        padding: 0.75rem;
        font-size: 0.875rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <button class="back-btn" onclick="window.history.back()">←</button>
    <div class="header-content">
      <div class="header-title" id="title">Diálogo</div>
      <div class="header-subtitle" id="subtitle">0 / 483 linhas</div>
    </div>
    <button class="voice-btn" id="voiceBtn" title="Selecionar voz">🎤</button>
  </header>

  <main>
    <div id="error-container"></div>

    <div class="chat" id="chatArea">
      <div class="empty-state">Clique em "Próximo" para começar...</div>
    </div>

    <div class="bottom-section">
      <div class="progress-container">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-label" id="progressLabel">0%</div>
      </div>

      <div class="button-group">
        <button class="btn-next" id="nextBtn">Próximo</button>
        <button class="btn-reset" id="resetBtn">Reiniciar</button>
      </div>
    </div>
  </main>

  <div class="voice-modal" id="voiceModal">
    <div class="voice-modal-content">
      <div class="voice-modal-title">Selecionar Voz</div>
      <div class="voice-options" id="voiceOptions"></div>
    </div>
  </div>

  <script>
    const STATE = {
      messages: [],
      currentMessageIndex: -1,
      startTime: Date.now(),
      isPlaying: false,
      voiceIndexA: 0,
      voiceIndexB: 0,
      availableVoices: [],
      useCustomVoiceA: false,
      useCustomVoiceB: false
    };

    const CONFIG = {
      CSV_URL: 'DIALOGO/DIREITODOMAR.csv',
      TTS_RATE: 0.95,
      TTS_PITCH_A: 1.3,
      TTS_PITCH_B: 0.7,
      STORAGE_KEY: 'dialogo_progress',
      VOICE_STORAGE_KEY: 'dialogo_voice'
    };

    function loadAvailableVoices() {
      const voices = speechSynthesis.getVoices();
      STATE.availableVoices = voices.filter(v => v.lang.startsWith('pt'));

      if (STATE.availableVoices.length === 0) {
        STATE.availableVoices = voices.filter(v => v.lang.startsWith('pt-BR') || v.lang === 'pt-PT');
      }

      if (STATE.availableVoices.length === 0) {
        STATE.availableVoices = voices.filter(v => v.lang.includes('pt'));
      }

      if (STATE.availableVoices.length === 0) {
        STATE.availableVoices = voices;
      }

      autoSelectVoices();
      renderVoiceOptions();
      restoreVoicePreference();
      console.log(`Vozes disponíveis: ${STATE.availableVoices.length}`);
    }

    function autoSelectVoices() {
      if (STATE.availableVoices.length === 0) return;

      let femaleIdx = 0;
      let maleIdx = STATE.availableVoices.length > 1 ? 1 : 0;

      for (let i = 0; i < STATE.availableVoices.length; i++) {
        const name = STATE.availableVoices[i].name.toLowerCase();
        if ((name.includes('female') || name.includes('francisca') || name.includes('maria')) && i !== maleIdx) {
          femaleIdx = i;
          break;
        }
      }

      for (let i = 0; i < STATE.availableVoices.length; i++) {
        const name = STATE.availableVoices[i].name.toLowerCase();
        if ((name.includes('male') || name.includes('daniel') || name.includes('ricardo')) && i !== femaleIdx) {
          maleIdx = i;
          break;
        }
      }

      STATE.voiceIndexA = femaleIdx;
      STATE.voiceIndexB = maleIdx !== femaleIdx ? maleIdx : (femaleIdx === 0 ? 1 : 0);
    }

    function renderVoiceOptions() {
      const container = document.getElementById('voiceOptions');
      container.innerHTML = '';

      const createSection = (title, voiceIndex, speaker) => {
        const section = document.createElement('div');
        section.style.marginBottom = '1.5rem';

        const label = document.createElement('div');
        label.style.fontSize = '0.9rem';
        label.style.fontWeight = '700';
        label.style.color = '#ec4899';
        label.style.marginBottom = '0.75rem';
        label.textContent = title;
        section.appendChild(label);

        const grid = document.createElement('div');
        grid.className = 'voice-options';
        grid.style.gap = '0.75rem';

        STATE.availableVoices.forEach((voice, index) => {
          const option = document.createElement('button');
          option.className = 'voice-option';
          if (speaker === 'a' && index === STATE.voiceIndexA) {
            option.classList.add('active');
          } else if (speaker === 'b' && index === STATE.voiceIndexB) {
            option.classList.add('active');
          }

          const voiceName = voice.name.replace('Microsoft ', '').replace('Google ', '');
          const voiceLang = voice.lang;

          option.innerHTML = `
            <span class="voice-option-label">${voiceName}</span>
            <span class="voice-option-desc">${voiceLang}${voice.default ? ' (Padrão)' : ''}</span>
          `;

          option.addEventListener('click', () => {
            if (speaker === 'a') {
              STATE.voiceIndexA = index;
              STATE.useCustomVoiceA = true;
              localStorage.setItem(CONFIG.VOICE_STORAGE_KEY + '_a', index);
            } else {
              STATE.voiceIndexB = index;
              STATE.useCustomVoiceB = true;
              localStorage.setItem(CONFIG.VOICE_STORAGE_KEY + '_b', index);
            }
            renderVoiceOptions();
            testVoice(voice);
          });

          grid.appendChild(option);
        });

        section.appendChild(grid);
        return section;
      };

      container.appendChild(createSection('🎤 Voz — Pessoa1 (Pergunta)', STATE.voiceIndexA, 'a'));
      container.appendChild(createSection('🎤 Voz — Pessoa2 (Resposta)', STATE.voiceIndexB, 'b'));
    }

    function restoreVoicePreference() {
      try {
        const savedA = localStorage.getItem(CONFIG.VOICE_STORAGE_KEY + '_a');
        if (savedA) {
          STATE.voiceIndexA = parseInt(savedA);
          if (STATE.voiceIndexA >= STATE.availableVoices.length) {
            STATE.voiceIndexA = 0;
          }
          STATE.useCustomVoiceA = true;
        }

        const savedB = localStorage.getItem(CONFIG.VOICE_STORAGE_KEY + '_b');
        if (savedB) {
          STATE.voiceIndexB = parseInt(savedB);
          if (STATE.voiceIndexB >= STATE.availableVoices.length) {
            STATE.voiceIndexB = 0;
          }
          STATE.useCustomVoiceB = true;
        }
      } catch (e) {
        console.warn('Erro ao restaurar voz:', e);
      }
    }

    function testVoice(voice) {
      const testText = 'Olá! Esta é a voz selecionada.';
      const utterance = new SpeechSynthesisUtterance(testText);
      utterance.voice = voice;
      utterance.lang = voice.lang;
      utterance.rate = CONFIG.TTS_RATE;
      speechSynthesis.cancel();
      speechSynthesis.speak(utterance);
    }

    function setupVoiceModal() {
      const voiceBtn = document.getElementById('voiceBtn');
      const voiceModal = document.getElementById('voiceModal');

      voiceBtn.addEventListener('click', () => {
        voiceModal.classList.toggle('active');
      });

      voiceModal.addEventListener('click', (e) => {
        if (e.target === voiceModal) {
          voiceModal.classList.remove('active');
        }
      });
    }

    async function loadCSV() {
      try {
        console.log('Carregando CSV...');
        const response = await fetch(CONFIG.CSV_URL);
        if (!response.ok) {
          throw new Error(`CSV não encontrado (${response.status})`);
        }

        let csvText = await response.text();
        csvText = csvText.replace(/^﻿/, '');

        let delimiter = ';';
        let parseResult = Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          delimiter: ';'
        });

        if (!parseResult.data || parseResult.data.length === 0 || !parseResult.data[0]['person']) {
          delimiter = ',';
          parseResult = Papa.parse(csvText, {
            header: true,
            skipEmptyLines: true,
            delimiter: ','
          });
        }

        const hasHeader = parseResult.data && parseResult.data.length > 0 &&
                          (parseResult.data[0]['person'] !== undefined || parseResult.data[0]['message'] !== undefined);

        STATE.messages = [];

        if (hasHeader && parseResult.data[0]['person'] !== undefined) {
          parseResult.data.forEach(row => {
            if (row.person && row.message) {
              const speaker = row.person.trim().toLowerCase() === 'pessoa1' ? 'a' : 'b';
              STATE.messages.push({
                speaker: speaker,
                text: row.message.trim(),
                personName: row.person.trim()
              });
            }
          });
          console.log(`✓ Carregados ${STATE.messages.length} mensagens (formato novo)`);
        } else {
          const legacyResults = Papa.parse(csvText, {
            header: false,
            skipEmptyLines: true,
            delimiter: ';'
          });

          legacyResults.data.forEach(row => {
            if (row[0] && row[1]) {
              STATE.messages.push({
                speaker: 'a',
                text: row[0].trim(),
                personName: 'Pergunta'
              });
              STATE.messages.push({
                speaker: 'b',
                text: row[1].trim(),
                personName: 'Resposta'
              });
            }
          });
          console.log(`✓ Carregados ${STATE.messages.length} mensagens (formato legado)`);
        }

        if (STATE.messages.length === 0) {
          showError('Nenhum diálogo foi carregado');
          return;
        }

        restoreProgress();
        updateUI();
      } catch (error) {
        console.error('Erro ao carregar CSV:', error);
        showError(`Erro: ${error.message}`);
      }
    }

    function restoreProgress() {
      try {
        const saved = localStorage.getItem(CONFIG.STORAGE_KEY);
        if (saved) {
          const data = JSON.parse(saved);
          STATE.currentMessageIndex = data.lastLineIndex || -1;
        }
      } catch (e) {
        console.warn('Erro ao restaurar progresso:', e);
      }
    }

    function saveProgress() {
      try {
        localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify({
          lastLineIndex: STATE.currentMessageIndex,
          timestamp: Date.now()
        }));
      } catch (e) {
        console.warn('Erro ao salvar progresso:', e);
      }
    }

    function playTTS(text, speaker) {
      if (!window.speechSynthesis) {
        console.warn('TTS não suportado');
        return;
      }

      speechSynthesis.cancel();
      STATE.isPlaying = true;

      const soundBtns = document.querySelectorAll('.sound-btn');
      soundBtns.forEach(btn => btn.classList.remove('playing'));

      const currentBtn = event?.target?.closest('.sound-btn');
      if (currentBtn) {
        currentBtn.classList.add('playing');
      }

      const utterance = new SpeechSynthesisUtterance(text);

      const voiceIndex = speaker === 'a' ? STATE.voiceIndexA : STATE.voiceIndexB;
      const useCustom = speaker === 'a' ? STATE.useCustomVoiceA : STATE.useCustomVoiceB;

      if (useCustom && STATE.availableVoices[voiceIndex]) {
        utterance.voice = STATE.availableVoices[voiceIndex];
        utterance.lang = STATE.availableVoices[voiceIndex].lang;
      } else {
        utterance.lang = 'pt-BR';
      }

      utterance.rate = CONFIG.TTS_RATE;
      utterance.pitch = speaker === 'a' ? CONFIG.TTS_PITCH_A : CONFIG.TTS_PITCH_B;
      utterance.volume = 1.0;

      utterance.onstart = () => {
        console.log('TTS iniciado:', speaker);
      };

      utterance.onend = () => {
        STATE.isPlaying = false;
        if (currentBtn) {
          currentBtn.classList.remove('playing');
        }
        console.log('TTS finalizado');
      };

      utterance.onerror = (e) => {
        console.error('Erro TTS:', e.error);
        STATE.isPlaying = false;
        if (currentBtn) {
          currentBtn.classList.remove('playing');
        }
      };

      try {
        speechSynthesis.speak(utterance);
      } catch (e) {
        console.error('Erro ao iniciar TTS:', e);
        STATE.isPlaying = false;
        if (currentBtn) {
          currentBtn.classList.remove('playing');
        }
      }
    }

    function displayMessage(text, speaker, personName) {
      const container = document.getElementById('chatArea');

      if (container.querySelector('.empty-state')) {
        container.innerHTML = '';
      }

      const message = document.createElement('div');
      message.className = `message ${speaker === 'a' ? 'left' : 'right'}`;

      const speakerLabel = document.createElement('div');
      speakerLabel.style.fontSize = '10px';
      speakerLabel.style.fontWeight = '700';
      speakerLabel.style.opacity = '0.5';
      speakerLabel.style.marginBottom = '3px';
      speakerLabel.style.textAlign = speaker === 'a' ? 'left' : 'right';
      speakerLabel.textContent = personName || (speaker === 'a' ? 'Pergunta' : 'Resposta');

      const bubble = document.createElement('div');
      bubble.className = `bubble`;

      const textEl = document.createElement('span');
      textEl.className = 'bubble-text';
      textEl.textContent = text;

      const soundBtn = document.createElement('button');
      soundBtn.className = 'sound-btn';
      soundBtn.innerHTML = '🔊';
      soundBtn.title = 'Reproduzir áudio';
      soundBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        playTTS(text, speaker);
      });

      bubble.appendChild(textEl);
      bubble.appendChild(soundBtn);

      const timeEl = document.createElement('div');
      timeEl.className = 'time';
      const now = new Date();
      timeEl.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

      message.appendChild(speakerLabel);
      message.appendChild(bubble);
      message.appendChild(timeEl);
      container.appendChild(message);
      container.scrollTop = container.scrollHeight;
    }

    function nextMessage() {
      if (!STATE.messages || STATE.messages.length === 0) return;

      speechSynthesis.cancel();
      STATE.currentMessageIndex++;

      const totalMessages = STATE.messages.length;

      if (STATE.currentMessageIndex >= totalMessages) {
        showFimMessage();
        saveProgress();
        return;
      }

      const msg = STATE.messages[STATE.currentMessageIndex];
      displayMessage(msg.text, msg.speaker, msg.personName);
      playTTS(msg.text, msg.speaker);

      saveProgress();
      updateUI();
    }

    function showFimMessage() {
      const container = document.getElementById('chatArea');
      const message = document.createElement('div');
      message.className = 'message left';
      const bubble = document.createElement('div');
      bubble.className = 'fim-message';
      bubble.textContent = '✓ Fim do Diálogo';
      message.appendChild(bubble);
      container.appendChild(message);
      document.getElementById('nextBtn').disabled = true;
    }

    function resetGame() {
      speechSynthesis.cancel();
      STATE.currentMessageIndex = -1;
      STATE.startTime = Date.now();

      const container = document.getElementById('chatArea');
      container.innerHTML = '<div class="empty-state">Clique em "Próximo" para começar...</div>';

      document.getElementById('nextBtn').disabled = false;

      saveProgress();
      updateUI();
    }

    function updateUI() {
      const totalMessages = STATE.messages.length;
      const messageCount = STATE.currentMessageIndex + 1;

      document.getElementById('subtitle').textContent = `${messageCount} / ${totalMessages} mensagens`;

      const progress = totalMessages > 0 ? (messageCount / totalMessages) * 100 : 0;
      document.getElementById('progressFill').style.width = `${progress}%`;
      document.getElementById('progressLabel').textContent = `${Math.round(progress)}%`;
    }

    function showError(message) {
      const container = document.getElementById('error-container');
      container.innerHTML = `<div class="error-message">${message}</div>`;
    }

    document.getElementById('nextBtn').addEventListener('click', nextMessage);
    document.getElementById('resetBtn').addEventListener('click', resetGame);

    window.addEventListener('load', () => {
      if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadAvailableVoices;
      }
      loadAvailableVoices();
      setupVoiceModal();
      loadCSV();
    });
  </script>
</body>
</html>
