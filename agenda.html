<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Agenda — Atlas Diplomático</title>
<link rel="stylesheet" href="theme.css"/>
<script src="icons.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
:root{
  --bg:#0f1115;--surface:#171a21;--card:rgba(255,255,255,0.04);
  --border:#2a2f3a;--text:#e5e7eb;--muted:#9ca3af;--muted2:#6b7280;
  --gold:#d4af37;--gold-dim:rgba(212,175,55,0.12);
  --blue:#60a5fa;--green:#34d399;--amber:#f59e0b;--red:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono','SF Mono','Courier New',monospace;min-height:100vh}

nav{position:sticky;top:0;z-index:200;height:52px;background:#000;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;padding:0 16px;gap:2px;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nav-logo{font-size:13px;font-weight:900;letter-spacing:2.5px;margin-right:14px;white-space:nowrap;flex-shrink:0;color:#fff}
.nav-logo span{color:#fff;text-decoration:underline}
nav a{color:#888;text-decoration:none;font-size:11px;font-weight:600;padding:5px 9px;border-radius:6px;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0;letter-spacing:.3px}
nav a:hover{color:#fff;background:rgba(255,255,255,.06)}
.nav-ham{background:none;border:none;color:#888;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:.15s;flex-shrink:0;margin-right:4px}
.nav-ham:hover{color:#fff;background:rgba(255,255,255,.07)}
nav a.active{color:#d4af37;border-bottom:2px solid #d4af37;border-radius:0;padding-bottom:3px}
.nav-spacer{flex:1;min-width:8px}
.nav-cd{font-size:11px;font-weight:700;color:#f5e642;background:rgba(245,230,66,.1);border:1px solid rgba(245,230,66,.25);padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.nav-user{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-left:6px;color:#888}

/* ── LAYOUT ── */
main{padding:20px 24px;display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start;max-width:1200px;margin:0 auto}

/* ── CALENDAR ── */
.calendar-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.cal-header h2{font-size:15px;font-weight:700;text-transform:capitalize;letter-spacing:.3px}
.cal-nav-btn{background:none;border:1px solid var(--border);color:var(--muted2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:.15s}
.cal-nav-btn:hover:not(:disabled){border-color:var(--blue);color:var(--blue)}
.cal-nav-btn:disabled{opacity:.3;cursor:default}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:8px 12px 12px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted2);padding:6px 0 8px;letter-spacing:.5px}
.cal-day{
  display:flex;flex-direction:column;align-items:center;
  padding:6px 2px 5px;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:500;transition:background .1s;
  min-height:52px;gap:3px;position:relative;
}
.cal-day:hover{background:rgba(255,255,255,.05)}
.cal-day.today{background:rgba(96,165,250,.15);color:var(--blue);font-weight:700}
.cal-day.selected{background:rgba(96,165,250,.28);color:#fff;font-weight:800}
.cal-day.other-month{opacity:.25;cursor:default;pointer-events:none}
.cal-day.past-overdue .cal-day-num{color:var(--red)}
.cal-day-num{line-height:1;font-size:13px}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;width:100%}
.dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dot-study{background:var(--blue)}
.dot-review{background:var(--amber)}
.dot-exam{background:var(--red)}
.dot-event{background:var(--green)}
.cal-act-dot{width:4px;height:4px;border-radius:50%;background:rgba(52,211,153,.6)}

/* ── RIGHT COLUMN ── */
.right-col{display:flex;flex-direction:column;gap:16px}

/* ── DAY PANEL ── */
.day-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.panel-tabs{display:flex;border-bottom:1px solid var(--border)}
.panel-tab{flex:1;padding:11px 6px;text-align:center;font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--muted2);cursor:pointer;transition:.15s;border-bottom:2px solid transparent}
.panel-tab:hover{color:var(--text)}
.panel-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.panel-tab-badge{background:var(--red);color:#fff;border-radius:10px;font-size:10px;padding:1px 5px;margin-left:4px;vertical-align:middle}

.panel-body{padding:0}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* day header */
.day-header{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.day-header h3{font-size:14px;font-weight:700;text-transform:capitalize}
.add-btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:opacity .15s;letter-spacing:.3px}
.add-btn:hover{opacity:.85}

/* agenda items */
.day-items{padding:6px 14px 10px;min-height:100px;max-height:340px;overflow-y:auto}
.agenda-item{display:flex;align-items:flex-start;gap:10px;padding:9px 4px;border-bottom:1px solid rgba(255,255,255,.04);cursor:default}
.agenda-item:last-child{border-bottom:none}
.item-check{width:17px;height:17px;border-radius:5px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:.15s}
.item-check:hover{border-color:var(--green)}
.item-check.done{background:var(--green);border-color:var(--green);color:#000}
.item-body{flex:1;min-width:0}
.item-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-title.done{text-decoration:line-through;color:var(--muted2)}
.item-meta{font-size:11px;color:var(--muted2);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.item-type-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:8px;letter-spacing:.3px}
.type-study{background:rgba(96,165,250,.15);color:var(--blue)}
.type-review{background:rgba(245,158,11,.15);color:var(--amber)}
.type-exam{background:rgba(248,113,113,.15);color:var(--red)}
.type-event{background:rgba(52,211,153,.15);color:var(--green)}
.item-tagged{font-size:10px;color:#8ea7ff;margin-top:2px}
.item-del{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;transition:color .15s;opacity:0;flex-shrink:0}
.agenda-item:hover .item-del{opacity:1}
.item-del:hover{color:var(--red)}
.day-empty{text-align:center;padding:28px 16px;color:var(--muted2);font-size:12px;line-height:1.6}

/* ── TODO TAB ── */
.todo-toolbar{padding:10px 14px;display:flex;gap:6px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.todo-filter{font-size:10px;font-weight:700;padding:4px 9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted2);cursor:pointer;letter-spacing:.3px;transition:.15s;font-family:inherit}
.todo-filter.active{background:rgba(96,165,250,.15);color:var(--blue);border-color:var(--blue)}
.todo-list{padding:6px 14px 10px;max-height:380px;overflow-y:auto}
.todo-date-label{font-size:10px;font-weight:700;color:var(--muted2);letter-spacing:.6px;text-transform:uppercase;padding:8px 4px 4px;border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:2px}
.todo-item{display:flex;align-items:flex-start;gap:10px;padding:8px 4px;border-bottom:1px solid rgba(255,255,255,.03)}
.todo-item:last-child{border-bottom:none}
.todo-item.overdue .todo-item-title{color:var(--red)}
.todo-item-title{font-size:12px;font-weight:600;flex:1}
.todo-item-title.done{text-decoration:line-through;color:var(--muted2)}
.todo-item-sub{font-size:10px;color:var(--muted2);margin-top:1px}
.todo-empty{text-align:center;padding:28px 16px;color:var(--muted2);font-size:12px}

/* ── TAGGED TAB ── */
.tagged-list{padding:6px 14px 10px;max-height:380px;overflow-y:auto}
.tagged-item{padding:10px 4px;border-bottom:1px solid rgba(255,255,255,.04)}
.tagged-item:last-child{border-bottom:none}
.tagged-item-owner{font-size:10px;color:#8ea7ff;margin-bottom:3px;font-weight:600}
.tagged-item-title{font-size:13px;font-weight:600}
.tagged-item-meta{font-size:11px;color:var(--muted2);margin-top:2px}
.tagged-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(142,167,255,.12);color:#8ea7ff;border:1px solid rgba(142,167,255,.25);border-radius:12px;padding:2px 8px;font-size:10px;font-weight:700;margin-bottom:6px}

/* ── COUNTDOWN CARD ── */
.countdown-card{background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(180,180,180,.04));border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:18px 20px}
.cd-label-top{font-size:10px;font-weight:700;color:var(--muted2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.cd-main{font-size:42px;font-weight:900;color:var(--blue);line-height:1}
.cd-exam-label{font-size:12px;color:var(--muted2);margin-top:4px}
.cd-sub{display:flex;gap:16px;margin-top:14px}
.cd-sub-item{text-align:center}
.cd-sub-val{font-size:16px;font-weight:800}
.cd-sub-lbl{font-size:10px;color:var(--muted2);letter-spacing:.4px;margin-top:2px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:300}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;width:460px;max-width:96vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--muted2);margin-bottom:4px;letter-spacing:.3px;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-size:13px;font-family:inherit;transition:.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue)}
.form-group select option{background:#1e2030}
.form-group textarea{resize:vertical;min-height:56px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
.btn-cancel{background:var(--card);border:1px solid var(--border);color:var(--muted2);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.btn-cancel:hover{border-color:var(--text);color:var(--text)}
.btn-save{background:var(--blue);border:none;color:#fff;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit}
.btn-save:hover{opacity:.85}

/* view banner */
#viewBanner{display:none;background:rgba(142,167,255,.08);border-bottom:1px solid rgba(142,167,255,.2);padding:9px 24px;font-size:12px;color:#8ea7ff;text-align:center}

@media(max-width:860px){
  main{grid-template-columns:1fr;padding:12px;gap:14px}
}
</style>
</head>

<nav>
  <button class="nav-ham" onclick="openSidebar()">☰</button>
  <div class="nav-logo">ATLAS <span>DIPL.</span></div>
  <a href="index.html">Início</a>
  <a href="flashcards.html">Flashcards</a>

  <a href="agenda.html" class="active">Agenda</a>
  <a href="segunda-fase.html">2ª Fase</a>
  <a href="mapas.html">Mapas</a>
  <a href="noticias.html">Notícias</a>
  <a href="admin.html" id="navAdmin" style="display:none">Admin</a>
  <div class="nav-spacer"></div>
  <button id="btnShare" onclick="copyAgendaLink()" style="display:none;background:rgba(142,167,255,.12);color:#8ea7ff;border:1px solid rgba(142,167,255,.3);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">🔗 Compartilhar</button>
  <div class="nav-cd" id="navCountdown"></div>

</nav>

<div id="viewBanner">
  Visualizando a agenda de <strong id="viewOwnerName">outro usuário</strong> — somente leitura
</div>

<main>
  <!-- LEFT: Calendar -->
  <div class="calendar-panel">
    <div class="cal-header">
      <button class="cal-nav-btn" id="prevMonth" onclick="changeMonth(-1)">‹</button>
      <h2 id="calTitle"></h2>
      <button class="cal-nav-btn" id="nextMonth" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- RIGHT -->
  <div class="right-col">

    <!-- Day/Todo/Tagged panel -->
    <div class="day-panel">
      <div class="panel-tabs">
        <div class="panel-tab active" id="ptab-day" onclick="switchPanelTab('day')">DIA</div>
        <div class="panel-tab" id="ptab-todo" onclick="switchPanelTab('todo')">TO-DO</div>
        <div class="panel-tab" id="ptab-tagged" onclick="switchPanelTab('tagged')">MARCADOS <span class="panel-tab-badge" id="taggedBadge" style="display:none">0</span></div>
      </div>

      <!-- DAY TAB -->
      <div class="tab-pane active" id="pane-day">
        <div class="day-header">
          <h3 id="dayTitle">—</h3>
          <button class="add-btn" id="addEvtBtn" onclick="openModal()">+ Evento</button>
        </div>
        <div class="day-items" id="dayItems">
          <div class="day-empty">Selecione um dia no calendário</div>
        </div>
      </div>

      <!-- TODO TAB -->
      <div class="tab-pane" id="pane-todo">
        <div class="todo-toolbar">
          <button class="todo-filter active" id="tf-all" onclick="setTodoFilter('all',this)">Todos</button>
          <button class="todo-filter" id="tf-pending" onclick="setTodoFilter('pending',this)">Pendentes</button>
          <button class="todo-filter" id="tf-done" onclick="setTodoFilter('done',this)">Concluídos</button>
          <button class="todo-filter" id="tf-overdue" onclick="setTodoFilter('overdue',this)">Atrasados</button>
        </div>
        <div class="todo-list" id="todoList"></div>
      </div>

      <!-- TAGGED TAB -->
      <div class="tab-pane" id="pane-tagged">
        <div class="day-header" style="border-bottom:none;padding-bottom:8px">
          <h3>Marcado em mim</h3>
        </div>
        <div class="tagged-list" id="taggedList"></div>
      </div>
    </div>

    <!-- Countdown -->
    <div class="countdown-card">
      <div class="cd-label-top">Contagem Regressiva</div>
      <div class="cd-main" id="cdDays">—</div>
      <div class="cd-exam-label" id="cdLabel">dias para o CACD 2027</div>
      <div class="cd-sub">
        <div class="cd-sub-item"><div class="cd-sub-val" id="cdWeeks">—</div><div class="cd-sub-lbl">SEMANAS</div></div>
        <div class="cd-sub-item"><div class="cd-sub-val" id="cdMonths">—</div><div class="cd-sub-lbl">MESES</div></div>
        <div class="cd-sub-item"><div class="cd-sub-val" id="cdStudyDays">—</div><div class="cd-sub-lbl">DIAS ESTUDADOS</div></div>
      </div>
    </div>
  </div>
</main>

<!-- ADD EVENT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Novo Evento</h3>
    <div class="form-group">
      <label>Título</label>
      <input type="text" id="evTitle" placeholder="Ex: Flashcards PI, Simulado TPS…"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Tipo</label>
        <select id="evType">
          <option value="study">📘 Estudo</option>
          <option value="review">🔁 Revisão</option>
          <option value="exam">📋 Simulado</option>
          <option value="event">📌 Evento</option>
        </select>
      </div>
      <div class="form-group">
        <label>Matéria</label>
        <select id="evSubject">
          <option value="">— Geral —</option>
          <option value="LP">LP — Língua Portuguesa</option>
          <option value="ING">ING — Inglês</option>
          <option value="HB">HB — História do Brasil</option>
          <option value="HM">HM — História Mundial</option>
          <option value="GEO">GEO — Geografia</option>
          <option value="PI">PI — Política Internacional</option>
          <option value="ECO">ECO — Economia</option>
          <option value="DIP">DIP — Dir. Internacional</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Início</label>
        <input type="time" id="evStart"/>
      </div>
      <div class="form-group">
        <label>Fim</label>
        <input type="time" id="evEnd"/>
      </div>
    </div>
    <div class="form-group">
      <label>Marcar usuários (opcional)</label>
      <input type="text" id="tagSearch" placeholder="Buscar por nome…" autocomplete="off" oninput="searchUsersForTag(this.value)"/>
      <div id="tagResults" style="display:none;background:#1a1d2a;border:1px solid rgba(255,255,255,.1);border-radius:8px;margin-top:4px;overflow:hidden;max-height:160px;overflow-y:auto"></div>
      <div id="taggedChips" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEvent()">Salvar</button>
    </div>
  </div>
</div>

<script>
const MONTHS_PT = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS_PT   = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const TYPE_LABELS = { study:'Estudo', review:'Revisão', exam:'Simulado', event:'Evento' };
const TYPE_DOT    = { study:'dot-study', review:'dot-review', exam:'dot-exam', event:'dot-event' };

const TODAY = new Date();
const MIN_YEAR = TODAY.getFullYear(), MIN_MONTH = TODAY.getMonth();
const MAX_YEAR = 2027, MAX_MONTH = 11;

let _curYear  = TODAY.getFullYear();
let _curMonth = TODAY.getMonth();
let _selectedDate = formatDate(TODAY);
let _agendaItems  = [];
let _allItems     = [];   // for to-do: wider range
let _taggedEvents = [];   // events from other users where I'm tagged
let _activityMap  = {};
let _userId  = null;
let _examDate= null;
let _viewMode = false;
let _viewUserId = null;
let _taggedUsers = [];
let _todoFilter = 'all';
let _activePanel = 'day';

function formatDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseDateLocal(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}
function todayBSB() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
}
function todayStr() { return formatDate(todayBSB()); }

/* ── PANEL TABS ── */
function switchPanelTab(tab) {
  _activePanel = tab;
  ['day','todo','tagged'].forEach(t => {
    document.getElementById('ptab-'+t).classList.toggle('active', t===tab);
    document.getElementById('pane-'+t).classList.toggle('active', t===tab);
  });
  if (tab === 'todo') renderTodo();
  if (tab === 'tagged') renderTaggedPane();
}

/* ── CALENDAR ── */
function changeMonth(delta) {
  _curMonth += delta;
  if (_curMonth < 0)  { _curMonth = 11; _curYear--; }
  if (_curMonth > 11) { _curMonth = 0;  _curYear++; }
  clampMonth();
  renderCalendar();
  loadMonthData();
}
function clampMonth() {
  if (_curYear < MIN_YEAR || (_curYear===MIN_YEAR && _curMonth<MIN_MONTH)) { _curYear=MIN_YEAR; _curMonth=MIN_MONTH; }
  if (_curYear > MAX_YEAR || (_curYear===MAX_YEAR && _curMonth>MAX_MONTH)) { _curYear=MAX_YEAR; _curMonth=MAX_MONTH; }
}
function updateNavBtns() {
  document.getElementById('prevMonth').disabled = _curYear===MIN_YEAR && _curMonth===MIN_MONTH;
  document.getElementById('nextMonth').disabled = _curYear===MAX_YEAR && _curMonth===MAX_MONTH;
}

function renderCalendar() {
  updateNavBtns();
  document.getElementById('calTitle').textContent = MONTHS_PT[_curMonth] + ' ' + _curYear;

  const first   = new Date(_curYear, _curMonth, 1);
  const startDow= first.getDay();
  const lastDay = new Date(_curYear, _curMonth+1, 0).getDate();
  const tStr    = todayStr();

  let html = DAYS_PT.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // leading blanks (prev month days)
  for (let i = 0; i < startDow; i++) {
    const pd = new Date(_curYear, _curMonth, 1 - startDow + i);
    html += `<div class="cal-day other-month"><span class="cal-day-num">${pd.getDate()}</span></div>`;
  }

  for (let d = 1; d <= lastDay; d++) {
    const ds = _curYear + '-' + String(_curMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const dayItems = _agendaItems.filter(i => i.date === ds);
    const hasAct   = (_activityMap[ds] || 0) > 0;
    const isToday  = ds === tStr;
    const isSel    = ds === _selectedDate;
    const isPast   = ds < tStr;
    const hasOverdue = isPast && dayItems.some(i => !i.done);

    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (isSel)   cls += ' selected';
    if (hasOverdue) cls += ' past-overdue';

    const dots = dayItems.slice(0,4).map(i => `<div class="dot ${TYPE_DOT[i.type]||'dot-event'}"></div>`).join('');
    const dotsHtml = (dots || hasAct)
      ? `<div class="cal-dots">${dots}${hasAct ? '<div class="cal-act-dot"></div>' : ''}</div>`
      : '';

    html += `<div class="${cls}" onclick="selectDay('${ds}')">
      <span class="cal-day-num">${d}</span>
      ${dotsHtml}
    </div>`;
  }

  const total = startDow + lastDay;
  const trailing = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= trailing; i++) {
    html += `<div class="cal-day other-month"><span class="cal-day-num">${i}</span></div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

async function loadMonthData() {
  const from = _curYear + '-' + String(_curMonth+1).padStart(2,'0') + '-01';
  const lastD = new Date(_curYear, _curMonth+1, 0).getDate();
  const to   = _curYear + '-' + String(_curMonth+1).padStart(2,'0') + '-' + lastD;

  if (_viewMode && _viewUserId) {
    _agendaItems = await DB.getPublicAgenda(_viewUserId, from, to) || [];
  } else {
    _agendaItems = await DB.getAgendaItems(from, to) || [];
  }
  renderCalendar();
  renderDay(_selectedDate);
  if (_activePanel === 'todo') renderTodo();
}

function selectDay(ds) {
  _selectedDate = ds;
  renderCalendar();
  renderDay(ds);
  if (_activePanel !== 'day') switchPanelTab('day');
}

/* ── DAY PANEL ── */
function renderDay(ds) {
  const d = parseDateLocal(ds);
  const label = DAYS_PT[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS_PT[d.getMonth()].slice(0,3) + ' ' + d.getFullYear();
  document.getElementById('dayTitle').textContent = label;

  const items = _agendaItems.filter(i => i.date === ds)
    .sort((a,b) => (a.time_start||'99:99').localeCompare(b.time_start||'99:99'));

  const container = document.getElementById('dayItems');
  if (!items.length) {
    container.innerHTML = '<div class="day-empty">Nenhum evento neste dia.<br><span style="font-size:11px">Clique em + Evento para adicionar.</span></div>';
    return;
  }
  container.innerHTML = items.map(item => renderAgendaItem(item, ds)).join('');
}

function renderAgendaItem(item, ds) {
  const subj    = item.subject ? ` · ${item.subject}` : '';
  const timeStr = item.time_start
    ? item.time_start.slice(0,5) + (item.time_end ? ' – ' + item.time_end.slice(0,5) : '')
    : '';
  const typeCls = 'item-type-badge type-' + (item.type||'event');
  const tagsHtml= (item.tagged_users && item.tagged_users.length)
    ? `<div class="item-tagged">👥 ${item.tagged_users.length} marcado${item.tagged_users.length>1?'s':''}</div>`
    : '';
  const checkHtml = _viewMode ? '' :
    `<div class="item-check ${item.done?'done':''}" onclick="toggleDone('${item.id}','${ds}')" title="${item.done?'Desmarcar':'Marcar concluído'}">${item.done?'✓':''}</div>`;
  const delHtml = _viewMode ? '' :
    `<button class="item-del" onclick="deleteItem('${item.id}','${ds}')" title="Excluir">×</button>`;
  return `<div class="agenda-item" id="item-${item.id}">
    ${checkHtml}
    <div class="item-body">
      <div class="item-title ${item.done?'done':''}">${escH(item.title)}</div>
      <div class="item-meta">
        <span class="${typeCls}">${TYPE_LABELS[item.type]||item.type}</span>
        ${timeStr ? `<span>${timeStr}</span>` : ''}
        ${subj ? `<span>${subj}</span>` : ''}
      </div>
      ${tagsHtml}
    </div>
    ${delHtml}
  </div>`;
}

/* ── TODO LIST ── */
function setTodoFilter(f, btn) {
  _todoFilter = f;
  document.querySelectorAll('.todo-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTodo();
}

function renderTodo() {
  const tStr = todayStr();
  let items = [..._agendaItems];

  // Also include future month items if loaded
  if (_allItems.length) items = [...new Map([..._agendaItems, ..._allItems].map(i => [i.id, i])).values()];

  // Apply filter
  if (_todoFilter === 'pending')  items = items.filter(i => !i.done);
  if (_todoFilter === 'done')     items = items.filter(i => i.done);
  if (_todoFilter === 'overdue')  items = items.filter(i => !i.done && i.date < tStr);

  items.sort((a,b) => a.date.localeCompare(b.date) || (a.time_start||'').localeCompare(b.time_start||''));

  const container = document.getElementById('todoList');
  if (!items.length) {
    container.innerHTML = '<div class="todo-empty">Nenhuma tarefa encontrada.</div>';
    return;
  }

  // Group by date
  const groups = {};
  items.forEach(i => { if (!groups[i.date]) groups[i.date] = []; groups[i.date].push(i); });

  container.innerHTML = Object.entries(groups).map(([ds, dayItems]) => {
    const d = parseDateLocal(ds);
    const isPast = ds < tStr;
    const isToday = ds === tStr;
    const label = isToday ? 'Hoje' : (DAYS_PT[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS_PT[d.getMonth()].slice(0,3));
    return `<div class="todo-date-label" style="${isPast&&!isToday?'color:var(--red)':''}">${label}</div>
    ${dayItems.map(item => {
      const overdue = isPast && !item.done && !isToday;
      return `<div class="todo-item ${overdue?'overdue':''}">
        <div class="item-check ${item.done?'done':''}" onclick="toggleDone('${item.id}','${ds}')" style="flex-shrink:0;margin-top:2px">${item.done?'✓':''}</div>
        <div style="flex:1;min-width:0">
          <div class="todo-item-title ${item.done?'done':''}">${escH(item.title)}</div>
          <div class="todo-item-sub">
            <span class="item-type-badge type-${item.type||'event'}" style="font-size:9px">${TYPE_LABELS[item.type]||''}</span>
            ${item.subject ? `<span style="margin-left:4px">${item.subject}</span>` : ''}
            ${item.time_start ? `<span style="margin-left:4px">${item.time_start.slice(0,5)}</span>` : ''}
          </div>
        </div>
        <button class="item-del" onclick="deleteItem('${item.id}','${ds}')" title="Excluir">×</button>
      </div>`;
    }).join('')}`;
  }).join('');
}

/* ── TAGGED EVENTS ── */
async function loadTaggedEvents() {
  try {
    _taggedEvents = await DB.getTaggedEvents(_userId);

    const badge = document.getElementById('taggedBadge');
    const pending = _taggedEvents.filter(e => !e.done).length;
    if (pending > 0) {
      badge.style.display = '';
      badge.textContent = pending;
    } else {
      badge.style.display = 'none';
    }
    if (_activePanel === 'tagged') renderTaggedPane();
  } catch(e) {
    _taggedEvents = [];
  }
}

function renderTaggedPane() {
  const container = document.getElementById('taggedList');
  if (!_taggedEvents.length) {
    container.innerHTML = '<div class="todo-empty" style="padding:28px 16px">Nenhum evento em que você foi marcado.</div>';
    return;
  }
  const tStr = todayStr();
  container.innerHTML = _taggedEvents.map(ev => {
    const d = parseDateLocal(ev.date);
    const dateLabel = DAYS_PT[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS_PT[d.getMonth()].slice(0,3) + ' ' + d.getFullYear();
    const timeStr = ev.time_start ? ev.time_start.slice(0,5) + (ev.time_end ? ' – ' + ev.time_end.slice(0,5) : '') : '';
    const ownerName = ev.profiles?.name || 'Usuário';
    const isPast = ev.date < tStr;
    return `<div class="tagged-item">
      <div class="tagged-item-owner">📌 ${escH(ownerName)}</div>
      <div class="tagged-item-title ${ev.done?'done':''}" style="${isPast&&!ev.done?'color:var(--amber)':''}">${escH(ev.title)}</div>
      <div class="tagged-item-meta">
        <span class="item-type-badge type-${ev.type||'event'}">${TYPE_LABELS[ev.type]||ev.type}</span>
        ${timeStr ? `<span style="margin-left:6px">${timeStr}</span>` : ''}
        <span style="margin-left:6px">${dateLabel}</span>
        ${ev.subject ? `<span style="margin-left:6px">· ${ev.subject}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ── CRUD ── */
async function toggleDone(id, ds) {
  const item = _agendaItems.find(i => i.id === id) || _allItems.find(i => i.id === id);
  if (!item) return;
  item.done = !item.done;
  await DB.updateAgendaItem(id, { done: item.done });
  renderDay(_selectedDate);
  renderCalendar();
  if (_activePanel === 'todo') renderTodo();
}

async function deleteItem(id, ds) {
  await DB.deleteAgendaItem(id);
  _agendaItems = _agendaItems.filter(i => i.id !== id);
  _allItems    = _allItems.filter(i => i.id !== id);
  renderDay(_selectedDate);
  renderCalendar();
  if (_activePanel === 'todo') renderTodo();
}

/* ── MODAL ── */
function openModal() {
  if (_viewMode) return;
  document.getElementById('evTitle').value = '';
  document.getElementById('evType').value  = 'study';
  document.getElementById('evSubject').value = '';
  document.getElementById('evStart').value = '';
  document.getElementById('evEnd').value   = '';
  document.getElementById('tagSearch').value = '';
  document.getElementById('tagResults').style.display = 'none';
  _taggedUsers = [];
  renderTaggedChips();
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('evTitle').focus(), 50);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function saveEvent() {
  const title = document.getElementById('evTitle').value.trim();
  if (!title) { document.getElementById('evTitle').focus(); return; }
  const item = {
    user_id: _userId,
    title,
    date: _selectedDate,
    type: document.getElementById('evType').value,
    subject: document.getElementById('evSubject').value || null,
    time_start: document.getElementById('evStart').value || null,
    time_end:   document.getElementById('evEnd').value   || null,
    tagged_users: _taggedUsers.map(u => u.id),
    done: false
  };
  const saved = await DB.addAgendaItem(item);
  if (saved) {
    _agendaItems.push(saved);
    renderDay(_selectedDate);
    renderCalendar();
    if (_activePanel === 'todo') renderTodo();
  }
  closeModal();
}

/* ── USER TAGGING ── */
let _tagTimer = null;
async function searchUsersForTag(query) {
  clearTimeout(_tagTimer);
  const res = document.getElementById('tagResults');
  if (query.length < 2) { res.style.display = 'none'; return; }
  _tagTimer = setTimeout(async () => {
    const users = await DB.searchUsers(query);
    const filtered = users.filter(u => u.id !== _userId);
    if (!filtered.length) { res.style.display = 'none'; return; }
    res.style.display = 'block';
    res.innerHTML = filtered.map(u => `
      <div onclick="tagUser('${u.id}','${escA(u.name||'')}'); document.getElementById('tagSearch').value=''; document.getElementById('tagResults').style.display='none'"
        style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid rgba(255,255,255,.05)"
        onmouseenter="this.style.background='rgba(255,255,255,.05)'" onmouseleave="this.style.background=''">
        <strong>${escH(u.name||'—')}</strong>
        <span style="color:#6b7280;font-size:11px;margin-left:6px">${escH(u.email||'')}</span>
      </div>`).join('');
  }, 280);
}

function tagUser(id, name) {
  if (!_taggedUsers.find(u => u.id === id)) _taggedUsers.push({ id, name });
  renderTaggedChips();
}
function removeTag(id) {
  _taggedUsers = _taggedUsers.filter(u => u.id !== id);
  renderTaggedChips();
}
function renderTaggedChips() {
  document.getElementById('taggedChips').innerHTML = _taggedUsers.map(u =>
    `<span style="background:rgba(142,167,255,.15);color:#8ea7ff;border:1px solid rgba(142,167,255,.3);border-radius:20px;padding:3px 10px;font-size:11px;display:inline-flex;align-items:center;gap:6px">
      ${escH(u.name)}
      <span onclick="removeTag('${u.id}')" style="cursor:pointer;opacity:.7;font-size:13px">×</span>
    </span>`
  ).join('');
}

/* ── COUNTDOWN ── */
function renderCountdown(examDate) {
  const nowBSB  = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
  const examBSB = new Date(examDate.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
  nowBSB.setHours(0,0,0,0); examBSB.setHours(0,0,0,0);
  const days   = Math.max(0, Math.ceil((examBSB - nowBSB) / 86400000));
  const weeks  = Math.floor(days / 7);
  const months = Math.round(days / 30.44);
  document.getElementById('cdDays').textContent  = days;
  document.getElementById('cdWeeks').textContent = weeks;
  document.getElementById('cdMonths').textContent= months;
  const examStr = examDate.toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('cdLabel').textContent = `dias para o CACD 2027 · ${examStr}`;
  const navCd = document.getElementById('navCountdown');
  if (navCd) navCd.textContent = days + 'd';
}

/* ── SHARE ── */
async function copyAgendaLink() {
  const url = location.origin + location.pathname + '?view=' + _userId;
  try { await navigator.clipboard.writeText(url); } catch(e) { prompt('Copie o link:', url); return; }
  const btn = document.getElementById('btnShare');
  const orig = btn.textContent;
  btn.textContent = '✓ Copiado!';
  setTimeout(() => btn.textContent = orig, 2000);
}

/* ── UTILS ── */
function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escA(s) { return String(s||'').replace(/'/g,"\\'"); }

/* ── CLOSE MODAL ── */
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ── INIT ── */
(async () => {
  const user = await DB.requireAuth();
  _userId = user.id;

  const [profile, isAdm] = await Promise.all([DB.getProfile(), DB.isAdmin()]);
  if (isAdm) document.getElementById('navAdmin').style.display = '';
  const navUser = document.getElementById('navUser');
  if (navUser) navUser.textContent = (profile?.name || user.email || '?').slice(0,2).toUpperCase();

  // View mode
  const viewParam = new URLSearchParams(location.search).get('view');
  if (viewParam && viewParam !== _userId) {
    _viewMode = true;
    _viewUserId = viewParam;
    document.getElementById('viewBanner').style.display = '';
    document.getElementById('btnShare').style.display = 'none';
    document.getElementById('addEvtBtn').style.display = 'none';
  } else {
    document.getElementById('btnShare').style.display = '';
  }

  const [examDate, activity] = await Promise.all([
    DB.getExamDate(),
    DB.getActivity(user.id)
  ]);
  _examDate    = examDate;
  _activityMap = activity || {};

  const studyDays = Object.values(_activityMap).filter(v => v > 0).length;
  document.getElementById('cdStudyDays').textContent = studyDays;
  renderCountdown(examDate);

  renderCalendar();
  await loadMonthData();
  selectDay(_selectedDate);

  // Load tagged events in background
  if (!_viewMode) loadTaggedEvents();
})();
</script>
