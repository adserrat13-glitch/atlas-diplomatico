<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Análise TPS por Tema — Atlas Diplomático</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="theme.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1115;color:#e5e7eb;font-family:'JetBrains Mono',monospace;min-height:100vh}
nav{position:sticky;top:0;z-index:200;height:52px;background:#0f1115;border-bottom:1px solid rgba(212,175,55,.15);display:flex;align-items:center;padding:0 16px;gap:2px;overflow-x:auto}
.nav-ham{background:none;border:none;color:#9ca3af;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:.15s;flex-shrink:0}
.nav-ham:hover{color:#e5e7eb;background:rgba(255,255,255,.07)}
.nav-logo{font-size:13px;font-weight:900;letter-spacing:2.5px;margin-right:14px;white-space:nowrap;flex-shrink:0;color:#d4af37}
nav a{color:#9ca3af;text-decoration:none;font-size:11px;font-weight:600;padding:5px 9px;border-radius:6px;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0}
nav a.active{color:#d4af37;border-bottom:2px solid #d4af37}
.nav-spacer{flex:1;min-width:8px}

#sidebar{position:fixed;left:0;top:52px;bottom:0;width:240px;background:#171a21;border-right:1px solid rgba(212,175,55,.12);z-index:199;transform:translateX(-100%);transition:transform .25s;overflow-y:auto;padding:16px 0}
#sidebar.open{transform:translateX(0)}
#sidebar-overlay{display:none;position:fixed;inset:0;top:52px;background:rgba(0,0,0,.5);z-index:198}
#sidebar-overlay.open{display:block}

.page{max-width:1400px;margin:0 auto;padding:24px}
.page-title{font-size:32px;font-weight:800;margin-bottom:8px;color:#d4af37}
.page-subtitle{font-size:13px;color:#9ca3af;margin-bottom:32px}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.metric{background:#1a1e28;border:1px solid rgba(212,175,55,.15);border-radius:8px;padding:20px;text-align:center}
.metric-value{font-size:28px;font-weight:800;color:#d4af37;margin-bottom:4px}
.metric-label{font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:1px}

.tabs{display:flex;gap:2px;margin-bottom:24px;border-bottom:2px solid rgba(212,175,55,.1)}
.tab-btn{background:none;border:none;color:#9ca3af;font-size:12px;font-weight:700;padding:12px 16px;cursor:pointer;border-bottom:3px solid transparent;transition:.2s;font-family:inherit;margin-bottom:-2px}
.tab-btn:hover{color:#e5e7eb}
.tab-btn.active{color:#d4af37;border-bottom-color:#d4af37}

.tab-content{display:none}
.tab-content.active{display:block}

.weakness-list{display:grid;gap:12px}
.weakness-item{background:#1a1e28;border:1px solid rgba(212,175,55,.1);border-radius:8px;padding:16px;transition:all .2s;cursor:pointer}
.weakness-item:hover{border-color:rgba(212,175,55,.3);background:#212530}
.weakness-rank{display:inline-block;background:#d4af37;color:#000;padding:4px 8px;border-radius:4px;font-size:10px;font-weight:700;margin-bottom:8px}
.weakness-name{font-size:14px;font-weight:700;margin-bottom:4px}
.weakness-tema{font-size:11px;color:#9ca3af;margin-bottom:8px}
.weakness-stats{display:flex;gap:16px;font-size:11px;color:#666;margin-bottom:12px}
.weakness-bar{height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.weakness-fill{height:100%;background:#d4af37;border-radius:3px}

.empty-state{text-align:center;padding:60px 20px;color:#666}
.empty-state svg{width:64px;height:64px;margin-bottom:20px;opacity:.3}
.empty-state h2{font-size:18px;font-weight:700;margin-bottom:8px;color:#9ca3af}
.empty-state p{font-size:12px}
.empty-state a{color:#d4af37;text-decoration:none}
.empty-state a:hover{text-decoration:underline}

.heatmap-scroll{overflow-x:auto;margin-bottom:24px}
.heatmap-table{border-collapse:collapse;font-size:11px}
.heatmap-cell{padding:12px;border:1px solid rgba(212,175,55,.08);text-align:center;min-width:70px;font-weight:500}
.heatmap-label{background:#171a21;font-weight:700;color:#d4af37;text-align:left;max-width:200px}
.heatmap-year{background:#171a21;font-weight:700;color:#d4af37;text-align:center}
.heatmap-0{background:#0f1115;color:#666}
.heatmap-err{background:rgba(248,113,113,.25);color:#f87171}
.heatmap-warn{background:rgba(251,191,36,.2);color:#fbbf24}
.heatmap-ok{background:rgba(52,211,153,.2);color:#34d399}

.recs-list{display:grid;gap:12px}
.rec-card{background:#1a1e28;border-left:4px solid #d4af37;border-radius:6px;padding:16px}
.rec-num{font-size:10px;font-weight:700;color:#d4af37;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.rec-titulo{font-size:13px;font-weight:700;margin-bottom:8px}
.rec-desc{font-size:11px;color:#9ca3af;line-height:1.6}

@media(max-width:768px){
  .metrics{grid-template-columns:1fr}
  .tabs{flex-direction:column}
  .heatmap-table{font-size:10px}
}
</style>
</head>
<body>

<nav>
  <button class="nav-ham" onclick="openSidebar()">☰</button>
  <div class="nav-logo">ATLAS <span>DIPL.</span></div>
  <a href="index.html">Início</a>
  <a href="simulados.html">Simulados</a>
  <a href="analise-tps-tematica.html" class="active">Análise TPS</a>
  <div class="nav-spacer"></div>
</nav>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>
<aside id="sidebar"></aside>

<div class="page">
  <h1 class="page-title">📊 Análise TPS por Tema</h1>
  <p class="page-subtitle">Visualize seu desempenho em cada tema do edital — atualizando conforme você responde provas</p>

  <div class="metrics">
    <div class="metric">
      <div class="metric-value" id="metricTotal">0</div>
      <div class="metric-label">Questões Respondidas</div>
    </div>
    <div class="metric">
      <div class="metric-value" id="metricAcertos">0</div>
      <div class="metric-label">Acertos</div>
    </div>
    <div class="metric">
      <div class="metric-value" id="metricErros">0</div>
      <div class="metric-label">Erros</div>
    </div>
    <div class="metric">
      <div class="metric-value" id="metricPercent">0%</div>
      <div class="metric-label">Taxa de Acerto</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="mostrarTab('fraquezas')">🔴 Fraquezas</button>
    <button class="tab-btn" onclick="mostrarTab('fortes')">🟢 Pontos Fortes</button>
    <button class="tab-btn" onclick="mostrarTab('heatmap')">🔥 Mapa Temático</button>
    <button class="tab-btn" onclick="mostrarTab('recomendacoes')">📋 Recomendações</button>
  </div>

  <div id="fraquezas" class="tab-content active">
    <div id="fraquezasContainer" class="weakness-list"></div>
  </div>

  <div id="fortes" class="tab-content">
    <div id="fortesContainer" class="weakness-list"></div>
  </div>

  <div id="heatmap" class="tab-content">
    <div class="heatmap-scroll">
      <table class="heatmap-table">
        <thead id="heatmapTable"></thead>
      </table>
    </div>
  </div>

  <div id="recomendacoes" class="tab-content">
    <div id="recsContainer" class="recs-list"></div>
  </div>
</div>

<script src="_sidebar.js"></script>
<script>
function mostrarTab(tab) {
  document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e => e.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}

// Tema → Matéria mapping
const MATERIA_MAP = {
  'pi-negogiacao': 'PI', 'pi-conflitos': 'PI', 'pi-organizacoes': 'PI',
  'dip-soberania': 'DIP', 'dip-direitos': 'DIP', 'dip-tratados': 'DIP',
  'eco-mercosul': 'ECO', 'eco-desenvolvimento': 'ECO', 'eco-comercio': 'ECO',
  'geo-brasil': 'GEO', 'geo-mundo': 'GEO', 'geo-regiao': 'GEO',
  'hb-colonia': 'HB', 'hb-imperio': 'HB', 'hb-republica': 'HB'
};

function carregarDados() {
  try {
    const reviewDecks = JSON.parse(localStorage.getItem('tps_review_decks') || '[]');

    let totalCerto = 0, totalErro = 0;
    const temaData = {}; // tema -> { certos, erros, ano, materia }

    reviewDecks.forEach(deck => {
      if (!deck.wrong_pairs || !deck.pairs) return;

      const anoMatch = deck.file?.match(/(\d{4})/);
      const ano = anoMatch ? anoMatch[1] : 'outro';

      deck.pairs.forEach((pair, idx) => {
        const [questao, resposta] = pair;
        if (!questao) return;

        const temaSugerido = detectarTema(questao);
        const materia = MATERIA_MAP[temaSugerido] || 'Geral';

        if (!temaData[temaSugerido]) {
          temaData[temaSugerido] = { certos: 0, erros: 0, anos: {}, materia, questoes: [] };
        }

        const isErro = deck.wrong_pairs.some(w => w.pair[0] === questao);

        if (isErro) {
          temaData[temaSugerido].erros++;
          totalErro++;
        } else {
          temaData[temaSugerido].certos++;
          totalCerto++;
        }

        if (!temaData[temaSugerido].anos[ano]) {
          temaData[temaSugerido].anos[ano] = { certos: 0, erros: 0 };
        }

        if (isErro) {
          temaData[temaSugerido].anos[ano].erros++;
        } else {
          temaData[temaSugerido].anos[ano].certos++;
        }

        temaData[temaSugerido].questoes.push({ texto: questao, erro: isErro, ano });
      });
    });

    const totalRespostas = totalCerto + totalErro;
    const taxa = totalRespostas > 0 ? Math.round((totalCerto / totalRespostas) * 100) : 0;

    // Métricas
    document.getElementById('metricTotal').textContent = totalRespostas;
    document.getElementById('metricAcertos').textContent = totalCerto;
    document.getElementById('metricErros').textContent = totalErro;
    document.getElementById('metricPercent').textContent = taxa + '%';

    if (totalRespostas === 0) {
      mostrarEmptyState();
      return;
    }

    // Ordena por taxa de erro (pior primeiro)
    const temas = Object.entries(temaData)
      .map(([key, data]) => ({
        key,
        materia: data.materia,
        certos: data.certos,
        erros: data.erros,
        total: data.certos + data.erros,
        taxa: data.erros + data.certos > 0 ? Math.round((data.erros / (data.erros + data.certos)) * 100) : 0,
        anos: data.anos,
        questoes: data.questoes
      }))
      .sort((a, b) => b.taxa - a.taxa);

    renderizarFraquezas(temas);
    renderizarFortes(temas);
    renderizarHeatmap(temas);
    renderizarRecomendacoes(temas);

  } catch(e) {
    console.error('Erro ao carregar dados:', e);
    mostrarEmptyState();
  }
}

function detectarTema(questao) {
  const q = questao.toLowerCase();

  if (q.includes('negoci') || q.includes('acordo') || q.includes('diplomaci')) return 'pi-negogiacao';
  if (q.includes('conflito') || q.includes('guerra') || q.includes('tensão')) return 'pi-conflitos';
  if (q.includes('onu') || q.includes('organiz') || q.includes('mercosul')) return 'pi-organizacoes';

  if (q.includes('sobera') || q.includes('jurisdição')) return 'dip-soberania';
  if (q.includes('direito') || q.includes('humano')) return 'dip-direitos';
  if (q.includes('tratado') || q.includes('convençã')) return 'dip-tratados';

  if (q.includes('comér') || q.includes('export') || q.includes('import')) return 'eco-comercio';
  if (q.includes('desenvolv') || q.includes('infra')) return 'eco-desenvolvimento';
  if (q.includes('mercosul') || q.includes('bloco')) return 'eco-mercosul';

  if (q.includes('amazôn') || q.includes('brasil') || q.includes('fronteira')) return 'geo-brasil';
  if (q.includes('região') || q.includes('clima') || q.includes('população')) return 'geo-regiao';
  if (q.includes('mundo') || q.includes('global') || q.includes('ásia')) return 'geo-mundo';

  if (q.includes('brasil') || q.includes('português')) return 'hb-republica';
  if (q.includes('império') || q.includes('pedro')) return 'hb-imperio';
  if (q.includes('colôn') || q.includes('portugal')) return 'hb-colonia';

  return 'geral';
}

function renderizarFraquezas(temas) {
  const fracos = temas.filter(t => t.taxa >= 50).slice(0, 15);
  const html = fracos.length > 0
    ? fracos.map((t, i) => `
      <div class="weakness-item">
        <div class="weakness-rank">#${i + 1}</div>
        <div class="weakness-name">${t.key.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}</div>
        <div class="weakness-tema">${t.materia}</div>
        <div class="weakness-stats">
          <span>❌ ${t.erros} erros</span>
          <span>✅ ${t.certos} acertos</span>
          <span style="color:#f87171">${t.taxa}% taxa erro</span>
        </div>
        <div class="weakness-bar">
          <div class="weakness-fill" style="width:${t.taxa}%"></div>
        </div>
      </div>
    `).join('')
    : '<div class="empty-state"><h2>Sem erros aqui</h2><p>Parabéns! Estude outros temas.</p></div>';

  document.getElementById('fraquezasContainer').innerHTML = html;
}

function renderizarFortes(temas) {
  const fortes = temas.filter(t => t.taxa < 30).slice(0, 15);
  const html = fortes.length > 0
    ? fortes.map((t, i) => `
      <div class="weakness-item">
        <div class="weakness-rank">#${i + 1}</div>
        <div class="weakness-name">${t.key.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}</div>
        <div class="weakness-tema">${t.materia}</div>
        <div class="weakness-stats">
          <span>❌ ${t.erros} erros</span>
          <span>✅ ${t.certos} acertos</span>
          <span style="color:#34d399">${100 - t.taxa}% taxa acerto</span>
        </div>
        <div class="weakness-bar">
          <div class="weakness-fill" style="width:${100 - t.taxa}%;background:#34d399"></div>
        </div>
      </div>
    `).join('')
    : '<div class="empty-state"><h2>Nenhum ponto forte ainda</h2><p>Continue respondendo mais provas.</p></div>';

  document.getElementById('fortesContainer').innerHTML = html;
}

function renderizarHeatmap(temas) {
  const anos = new Set();
  temas.forEach(t => Object.keys(t.anos).forEach(a => anos.add(a)));
  const anosOrdenados = Array.from(anos).sort();

  let html = '<tr><th class="heatmap-label">Tema</th>';
  anosOrdenados.forEach(a => {
    html += `<th class="heatmap-year">${a}</th>`;
  });
  html += '</tr>';

  temas.slice(0, 20).forEach(t => {
    html += `<tr><td class="heatmap-label">${t.key}</td>`;
    anosOrdenados.forEach(ano => {
      const data = t.anos[ano];
      if (!data) {
        html += `<td class="heatmap-cell heatmap-0">—</td>`;
      } else {
        const total = data.certos + data.erros;
        const taxa = Math.round((data.erros / total) * 100);
        let cls = 'heatmap-ok';
        if (taxa >= 50) cls = 'heatmap-err';
        else if (taxa >= 30) cls = 'heatmap-warn';
        html += `<td class="heatmap-cell ${cls}">${taxa}%</td>`;
      }
    });
    html += '</tr>';
  });

  document.getElementById('heatmapTable').innerHTML = html;
}

function renderizarRecomendacoes(temas) {
  const fracos = temas.filter(t => t.taxa >= 50).slice(0, 5);
  const html = fracos.length > 0
    ? fracos.map((t, i) => `
      <div class="rec-card">
        <div class="rec-num">Recomendação ${i + 1}</div>
        <div class="rec-titulo">🎯 ${t.key.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}</div>
        <div class="rec-desc">
          <strong>Matéria:</strong> ${t.materia}<br>
          <strong>Status:</strong> ${t.taxa}% de taxa de erro (${t.erros}/${t.erros + t.certos} questões)<br>
          <br>
          Foque neste tema até atingir menos de 30% de erros. Revise as ${t.questoes.filter(q => q.erro).length} questões erradas.
        </div>
      </div>
    `).join('')
    : '<div class="empty-state"><h2>Nenhuma recomendação</h2><p>Seu desempenho está ótimo!</p></div>';

  document.getElementById('recsContainer').innerHTML = html;
}

function mostrarEmptyState() {
  const html = `
    <div class="empty-state">
      <div style="font-size:48px;margin-bottom:20px">📭</div>
      <h2>Nenhum dado ainda</h2>
      <p>Você ainda não respondeu nenhuma prova TPS.</p>
      <p style="margin-top:16px">
        <a href="/simulados.html">Ir para Simulados →</a>
      </p>
    </div>
  `;

  document.getElementById('fraquezasContainer').innerHTML = html;
  document.getElementById('fortesContainer').innerHTML = html;
  document.getElementById('heatmapTable').innerHTML = html;
  document.getElementById('recsContainer').innerHTML = html;
}

// Recarregar a cada 2 segundos
carregarDados();
setInterval(carregarDados, 2000);

window.openSidebar = function() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
};

window.closeSidebar = function() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
};
</script>
</body>
</html>
