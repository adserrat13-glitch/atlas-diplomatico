      setAlerts(alrt||[]);
      setEvents(ev||[]);
      setThresholds({ failed_login: t1 ? Number(t1) : 5, spike: t2 ? Number(t2) : 20 });
      setLoading(false);
    })();
  },[]);

  async function saveThresholds() {
    setSaving(true);
    await Promise.all([
      DB.setSetting('alert_failed_login_threshold', thresholds.failed_login),
      DB.setSetting('alert_spike_threshold', thresholds.spike),
    ]);
    setSaving(false);
    alert('Thresholds salvos.');
  }

  return (
    <div>
      <div className="page-title">Alertas</div>
      <div className="page-sub">Alertas ativos e configuração de thresholds</div>

      {loading ? <div className="loading-txt">Carregando…</div> : (
        <>
          <div style={{marginBottom:16}}>
            {alerts.length===0
              ? <div className="alert-card"><span className="alert-icon">✅</span><div className="alert-body"><div className="alert-title">Nenhum alerta ativo</div><div className="alert-desc">Sistema operando normalmente.</div></div></div>
              : alerts.map((a,i)=>(
                <div key={i} className={`alert-card${a.type==='brute_force'||a.type==='spike'?' danger':''}`}>
                  <span className="alert-icon">{a.type==='brute_force'?'🔓':a.type==='spike'?'📈':'⚠️'}</span>
                  <div className="alert-body">
                    <div className="alert-title">
                      {a.type==='brute_force'&&`Brute force: IP ${a.ip} (${a.count} tentativas)`}
                      {a.type==='spike'&&`Spike de logins falhos: ${a.count} eventos em 24h`}
                      {a.type==='reports'&&`${a.count} denúncias pendentes de revisão`}
                    </div>
                  </div>
                </div>
              ))
            }
          </div>

          <div className="card" style={{marginBottom:16}}>
            <div className="card-title">Configurar thresholds</div>
            <div className="threshold-row">
              <label>Tentativas de login falhas para alerta de brute force</label>
              <input type="number" className="form-input" style={{width:80}} min={1} value={thresholds.failed_login} onChange={e=>setThresholds(p=>({...p,failed_login:Number(e.target.value)}))} />
            </div>
            <div className="threshold-row">
              <label>Spike: total de falhas em 24h para alerta</label>
              <input type="number" className="form-input" style={{width:80}} min={1} value={thresholds.spike} onChange={e=>setThresholds(p=>({...p,spike:Number(e.target.value)}))} />
            </div>
            <button className="btn" style={{marginTop:12}} onClick={saveThresholds} disabled={saving}>{saving?'Salvando…':'Salvar thresholds'}</button>
          </div>

          <div className="card" style={{padding:0}}>
            <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',fontWeight:600,fontSize:13}}>Últimos 20 eventos de segurança</div>
            <div className="tbl-wrap">
              <table className="data-tbl">
                <thead><tr><th>Tipo</th><th>IP</th><th>Usuário</th><th>Data</th></tr></thead>
                <tbody>
                  {events.length===0
                    ? <tr><td colSpan={4} style={{textAlign:'center',color:'var(--muted)',padding:24}}>Nenhum evento.</td></tr>
                    : events.map(e=>(
                      <tr key={e.id}>
                        <td><span className={`badge ${e.event_type?.includes('fail')||e.event_type?.includes('ban')?'badge-err':'badge-ok'}`}>{e.event_type}</span></td>
                        <td><span className="mono">{e.ip||'—'}</span></td>
                        <td style={{fontSize:12,color:'var(--muted)'}}>{e.user?.name||e.user_id?.slice(0,8)||'—'}</td>
                        <td style={{fontSize:11,color:'var(--muted)'}}>{fmtDateTime(e.created_at)}</td>
                      </tr>
                    ))
                  }
                </tbody>
              </table>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// PERMISSIONS TAB
// ══════════════════════════════════════════════════════════════
const DEFAULT_PERMISSIONS = {
  super_admin: ['view_dashboard','manage_users','ban_users','view_security','manage_security','manage_content','view_analytics','manage_subscriptions','manage_settings','manage_permissions'],
  admin:       ['view_dashboard','manage_users','ban_users','view_security','manage_content','view_analytics','manage_subscriptions'],
  moderator:   ['view_dashboard','manage_content'],
  premium_user:['view_content'],
  free_user:   ['view_content'],
  banned_user: [],
};
const ALL_PERMISSIONS = [...new Set(Object.values(DEFAULT_PERMISSIONS).flat())];
const PAGES_BY_ROLE = {
  super_admin: ['admin.html','index.html','flashcards.html','simulados.html','analise.html','leaderboard.html'],
  admin:       ['admin.html','index.html','flashcards.html','simulados.html','analise.html','leaderboard.html'],
  moderator:   ['index.html','flashcards.html','simulados.html'],
  premium_user:['index.html','flashcards.html','simulados.html','analise.html','leaderboard.html'],
  free_user:   ['index.html','flashcards.html'],
  banned_user: [],
};

function PermissionsTab() {
  const [perms, setPerms] = useState(DEFAULT_PERMISSIONS);
  const [myRole, setMyRole] = useState('');
  const [saving, setSaving] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      const [profile, saved] = await Promise.all([
        DB.getProfile(),
        DB.getSetting('role_permissions').catch(()=>null),
      ]);
      setMyRole(profile?.role||'');
      if (saved) { try { setPerms(JSON.parse(saved)); } catch{} }
      setLoading(false);
    })();
  },[]);

  function togglePerm(role, perm) {
    if (myRole !== 'super_admin') return;
    setPerms(prev=>{
      const cur = prev[role]||[];
      return {...prev, [role]: cur.includes(perm)?cur.filter(p=>p!==perm):[...cur,perm]};
    });
  }

  async function savePerms() {
    setSaving(true);
    await DB.setSetting('role_permissions', JSON.stringify(perms));
    setSaving(false);
    alert('Permissões salvas.');
  }

  return (
    <div>
      <div className="page-title">Permissões</div>
      <div className="page-sub">Matriz de roles × permissões{myRole!=='super_admin'?' (somente leitura)':''}</div>

      {loading ? <div className="loading-txt">Carregando…</div> : (
        <>
          <div className="card" style={{padding:0,overflowX:'auto',marginBottom:16}}>
            <table className="perm-matrix">
              <thead>
                <tr>
                  <th>Role</th>
                  {ALL_PERMISSIONS.map(p=>(
                    <th key={p} style={{fontSize:10,whiteSpace:'nowrap',maxWidth:90,overflow:'hidden',textOverflow:'ellipsis'}} title={p}>{p.replace(/_/g,' ')}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {Object.keys(perms).map(role=>(
                  <tr key={role}>
                    <td>{roleBadge(role)}</td>
                    {ALL_PERMISSIONS.map(perm=>(
                      <td key={perm} style={{textAlign:'center'}}>
                        <input
                          type="checkbox"
                          className="perm-check"
                          checked={(perms[role]||[]).includes(perm)}
                          onChange={()=>togglePerm(role,perm)}
                          disabled={myRole!=='super_admin'}
                        />
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {myRole==='super_admin' && (
            <button className="btn" onClick={savePerms} disabled={saving}>{saving?'Salvando…':'Salvar permissões'}</button>
          )}

          <div className="card" style={{marginTop:16}}>
            <div className="card-title">Páginas acessíveis por role</div>
            <div className="pages-grid">
              {Object.entries(PAGES_BY_ROLE).map(([role,pages])=>(
                <div key={role}>
                  <div style={{marginBottom:6}}>{roleBadge(role)}</div>
                  {pages.length===0
                    ? <span style={{fontSize:11,color:'var(--muted)'}}>Sem acesso</span>
                    : pages.map(p=><span key={p} className="page-access-chip">{p}</span>)
                  }
                </div>
              ))}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// LEADERBOARD TAB
// ══════════════════════════════════════════════════════════════
function LeaderboardTab() {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [subjectFilter, setSubjectFilter] = useState('');

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      const data = await DB.getLeaderboardData(100).catch(()=>[]);
      setRows(data||[]);
      setLoading(false);
    })();
  },[]);

  async function toggleHide(userId, hide) {
    await DB.hideFromLeaderboard(userId, hide);
    setRows(prev=>prev.map(r=>r.user_id===userId?{...r,hidden:hide}:r));
  }

  const subjects = [...new Set(rows.map(r=>r.subject).filter(Boolean))];
  const filtered = subjectFilter ? rows.filter(r=>r.subject===subjectFilter) : rows;

  return (
    <div>
      <div className="page-title">Leaderboard</div>
      <div className="page-sub">Ranking de usuários — ocultar ou reexibir participantes</div>

      <div className="form-row" style={{marginBottom:16}}>
        <select className="form-input" style={{width:180}} value={subjectFilter} onChange={e=>setSubjectFilter(e.target.value)}>
          <option value="">Todas as disciplinas</option>
          {subjects.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <span style={{fontSize:12,color:'var(--muted)',marginLeft:8}}>{filtered.length} entradas</span>
      </div>

      {loading ? <div className="loading-txt">Carregando…</div> : (
        <div className="card" style={{padding:0}}>
          <div className="tbl-wrap">
            <table className="data-tbl">
              <thead><tr><th>#</th><th>Usuário</th><th>Score</th><th>Disciplina</th><th>Sessões</th><th>Status</th><th></th></tr></thead>
              <tbody>
                {filtered.length===0
                  ? <tr><td colSpan={7} style={{textAlign:'center',color:'var(--muted)',padding:24}}>Sem dados de ranking.</td></tr>
                  : filtered.map((r,i)=>(
                    <tr key={r.id||i} style={{opacity:r.hidden?0.5:1}}>
                      <td>
                        <span className={`lb-rank${i===0?' gold':i===1?' silver':i===2?' bronze':''}`}>{i+1}</span>
                      </td>
                      <td>
                        <div style={{fontWeight:600}}>{r.profiles?.name||r.user_id?.slice(0,8)||'—'}</div>
                        <div style={{fontSize:11,color:'var(--muted)'}}>{r.profiles?.email||'—'}</div>
                      </td>
                      <td><strong>{r.score??0}</strong></td>
                      <td style={{fontSize:12,color:'var(--muted)'}}>{r.subject||'—'}</td>
                      <td style={{fontSize:12}}>{r.sessions??0}</td>
                      <td>
                        {r.hidden
                          ? <span className="badge badge-err">Oculto</span>
                          : <span className="badge badge-ok">Visível</span>
                        }
                      </td>
                      <td>
                        {r.hidden
                          ? <button className="btn-sm" onClick={()=>toggleHide(r.user_id,false)}>👁 Mostrar</button>
                          : <button className="btn-sm btn-danger" onClick={()=>toggleHide(r.user_id,true)}>🙈 Ocultar</button>
                        }
                      </td>
                    </tr>
                  ))
                }
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// SETTINGS TAB
// ══════════════════════════════════════════════════════════════
function SettingsTab() {
  const [settings, setSettings] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState({});
  const [saved, setSaved] = useState({});

  useEffect(()=>{
    DB.getAppSettings().then(s=>{ setSettings(s||{}); setLoading(false); });
  },[]);

  async function saveSetting(key, value) {
    setSaving(p=>({...p,[key]:true}));
    await DB.setAppSetting(key, value);
    setSaving(p=>({...p,[key]:false}));
    setSaved(p=>({...p,[key]:true}));
    setTimeout(()=>setSaved(p=>({...p,[key]:false})),2000);
    setSettings(p=>({...p,[key]:value}));
  }

  const toggleSettings = [
    { key:'registration_open', label:'Registro aberto', desc:'Permite novos usuários se cadastrarem' },
    { key:'leaderboard_visible', label:'Ranking visível', desc:'Exibe o leaderboard para todos os usuários' },
    { key:'maintenance_mode', label:'Modo manutenção', desc:'Bloqueia acesso de usuários não-admin' },
  ];

  const numSettings = [
    { key:'max_group_members', label:'Máx. membros por grupo', placeholder:'Ex: 50' },
  ];

  if (loading) return <div className="loading-txt">Carregando configurações…</div>;

  return (
    <div>
      <div className="page-title">Configurações</div>
      <div className="page-sub">Configurações globais da plataforma</div>

      <div className="card" style={{marginBottom:16}}>
        <div className="card-title">Toggles</div>
        {toggleSettings.map(ts=>{
          const val = settings[ts.key]?.value ?? settings[ts.key] ?? false;
          return (
            <div key={ts.key} className="toggle-row">
              <div className="toggle-info">
                <div className="toggle-label">{ts.label}</div>
                <div className="toggle-desc">{ts.desc}</div>
              </div>
              <label className="toggle-switch">
                <input type="checkbox" checked={!!val} onChange={e=>saveSetting(ts.key, e.target.checked)} />
                <span className="toggle-track"></span>
              </label>
              {saved[ts.key] && <span style={{fontSize:11,color:'var(--green)',marginLeft:8}}>✓</span>}
            </div>
          );
        })}
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div className="card-title">Parâmetros numéricos</div>
        {numSettings.map(ns=>{
          const val = settings[ns.key]?.value ?? settings[ns.key] ?? '';
          return (
            <div key={ns.key} style={{display:'flex',gap:12,alignItems:'center',marginBottom:12}}>
              <label style={{fontSize:13,flex:1,fontWeight:500}}>{ns.label}</label>
              <input className="form-input" style={{width:120}} type="number" defaultValue={val}
                id={'setting-'+ns.key} placeholder={ns.placeholder} />
              <button className="btn btn-primary" style={{flexShrink:0}}
                onClick={()=>{ const v=document.getElementById('setting-'+ns.key).value; saveSetting(ns.key,Number(v)||0); }}
                disabled={saving[ns.key]}>
                {saved[ns.key]?'Salvo ✓':'Salvar'}
              </button>
            </div>
          );
        })}
      </div>

      <div className="card">
        <div className="card-title">Feeds RSS ativos</div>
        <div style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>
          Lista de feeds do Radar Diplomático. Um URL por linha.
        </div>
        <textarea className="form-input" rows={6}
          id="setting-rss_feeds"
          defaultValue={(settings.rss_feeds?.value || settings.rss_feeds || []).join?.('\n') || ''}
          placeholder="https://feeds.bbci.co.uk/news/world/rss.xml&#10;…" />
        <div style={{marginTop:10}}>
          <button className="btn btn-primary"
            onClick={()=>{
              const v=document.getElementById('setting-rss_feeds').value;
              saveSetting('rss_feeds', v.split('\n').map(s=>s.trim()).filter(Boolean));
            }}
            disabled={saving['rss_feeds']}>
            {saved['rss_feeds']?'Salvo ✓':'Salvar feeds'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════════════════════════════
function AdminApp() {
  const [activeTab, setActiveTab] = useState('dashboard');
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    (async()=>{
      try {
        await DB.requireAdmin();
        const [user, prof, examDate] = await Promise.all([DB.getUser(), DB.getProfile(), DB.getExamDate()]);
        setProfile(prof);
        const nu = document.getElementById('navUser');
        if (nu) nu.textContent = (prof?.name || user?.email || '?').slice(0,2).toUpperCase();
        const nc = document.getElementById('navCountdown');
        if (nc && examDate) nc.textContent = Math.ceil((examDate - Date.now()) / 86400000) + 'd';
      } catch(e) { console.error(e); }
      setLoading(false);
    })();
  },[]);

  if (loading) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'calc(100vh - 52px)',color:'var(--muted)'}}>
      Verificando permissões…
    </div>
  );

  if (!profile) return null;

  const role = profile.role || 'user';
  const visibleTabs = TABS_CONFIG.filter(t => t.roles.includes(role));

  const tabComponents = {
    dashboard: <DashboardTab />,
    users: <UsersTab />,
    security: <SecurityTab />,
    moderation: <ModerationTab />,
    content: <ContentTab />,
    analytics: <AnalyticsTab />,
    subscriptions: <SubscriptionsTab />,
    settings: <SettingsTab />,
    billing: <BillingTab />,
    notifications: <NotificationsTab />,
    permissions: <PermissionsTab />,
    leaderboard: <LeaderboardTab />,
  };

  const safeTab = visibleTabs.find(t=>t.id===activeTab) ? activeTab : visibleTabs[0]?.id;

  return (
    <div id="admin-layout" style={{display:'flex',minHeight:'calc(100vh - 52px)'}}>
      <aside className="admin-sidebar">
        <div className="admin-sidebar-title">Painel Admin</div>
        {visibleTabs.map(t=>(
          <button key={t.id} className={`tab-btn${safeTab===t.id?' active':''}`}
            onClick={()=>setActiveTab(t.id)}>
            <span className="tab-icon">{t.icon}</span>
            {t.label}
          </button>
        ))}
        <div style={{borderTop:'1px solid var(--border)',margin:'12px 16px',paddingTop:12}}>
          <div style={{fontSize:11,color:'var(--muted)',marginBottom:4}}>Logado como</div>
          <div style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{profile.name||'—'}</div>
          <div style={{marginTop:4}}>{roleBadge(role)}</div>
        </div>
      </aside>
      <main className="admin-content">
        {tabComponents[safeTab]}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('admin-root')).render(<AdminApp />);
</script>
</body>
