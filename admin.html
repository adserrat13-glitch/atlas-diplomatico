<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin — Atlas Diplomático</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="supabase.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080a0f; --surface: rgba(255,255,255,.04); --border: rgba(255,255,255,.09);
      --text: #dde2ee; --muted: #5a6070; --accent: #8ea7ff;
      --green: #6ee7b7; --red: #f87171; --yellow: #facc15;
      --orange: #fb923c; --purple: #c084fc; --mono: 'JetBrains Mono', monospace;
    }
    body { background: var(--bg); color: var(--text); font-family: Inter, sans-serif; min-height: 100vh; }
    .grid-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 40px 40px; }

    /* ── NAV ── */
    nav { position: sticky; top: 0; z-index: 300; height: 52px; background: rgba(8,10,15,.95);
      backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 2px; overflow-x: auto; scrollbar-width: none; }
    nav::-webkit-scrollbar { display: none; }
    .nav-logo { font-size: 13px; font-weight: 900; letter-spacing: 2.5px; margin-right: 14px;
      white-space: nowrap; flex-shrink: 0; color: #fff; }
    .nav-logo span { color: #39ff14; }
    .nav-ham { background: none; border: none; color: #888; font-size: 16px; cursor: pointer;
      padding: 4px 8px; border-radius: 6px; transition: .15s; flex-shrink: 0; margin-right: 4px; }
    .nav-ham:hover { color: #fff; background: rgba(255,255,255,.07); }
    nav a { color: #888; text-decoration: none; font-size: 11px; font-weight: 600;
      padding: 5px 9px; border-radius: 6px; transition: .15s; white-space: nowrap;
      display: flex; align-items: center; gap: 4px; flex-shrink: 0; letter-spacing: .3px; }
    nav a:hover { color: #fff; background: rgba(255,255,255,.06); }
    nav a.active { color: #39ff14; border-bottom: 2px solid #39ff14; border-radius: 0; padding-bottom: 3px; }
    .nav-spacer { flex: 1; min-width: 8px; }
    .nav-cd { font-size: 11px; font-weight: 700; color: #f5e642; background: rgba(245,230,66,.1);
      border: 1px solid rgba(245,230,66,.25); padding: 3px 10px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0; }
    .nav-user { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center; font-size: 11px;
      font-weight: 700; flex-shrink: 0; margin-left: 6px; color: #888; }

    /* ── SIDEBAR ── */
    #sidebar { position: fixed; left: 0; top: 52px; bottom: 0; width: 240px; background: #0d0d0d;
      border-right: 1px solid var(--border); z-index: 199; transform: translateX(-100%);
      transition: transform .25s; overflow-y: auto; padding: 16px 0; }
    #sidebar.open { transform: translateX(0); }
    #sidebar-overlay { display: none; position: fixed; inset: 0; top: 52px; background: rgba(0,0,0,.5); z-index: 198; }
    #sidebar-overlay.open { display: block; }
    .sb-brand { font-size: 13px; font-weight: 900; letter-spacing: 2.5px; color: #fff;
      padding: 0 16px 16px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .sb-brand span { color: #39ff14; }
    .sb-section { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: #444;
      padding: 12px 16px 4px; text-transform: uppercase; }
    .sb-link { display: flex; align-items: center; gap: 8px; padding: 8px 16px; color: #888;
      text-decoration: none; font-size: 12px; font-weight: 600; transition: .15s; }
    .sb-link:hover { color: #fff; background: rgba(255,255,255,.04); }
    .sb-link.active { color: #39ff14; }

    /* ── ADMIN SHELL ── */
    #admin-root { position: relative; z-index: 1; display: flex; min-height: calc(100vh - 52px); }
    .admin-sidebar {
      width: 220px; flex-shrink: 0; background: rgba(255,255,255,.02);
      border-right: 1px solid var(--border); padding: 20px 0;
      position: sticky; top: 52px; height: calc(100vh - 52px); overflow-y: auto; }
    .admin-sidebar-title { font-size: 9px; font-weight: 700; letter-spacing: 2px;
      color: var(--muted); padding: 0 16px 12px; text-transform: uppercase; }
    .tab-btn { display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 10px 16px; background: none; border: none; color: var(--muted);
      font-size: 13px; font-weight: 500; cursor: pointer; transition: .15s;
      text-align: left; font-family: inherit; border-left: 2px solid transparent; }
    .tab-btn:hover { color: var(--text); background: rgba(255,255,255,.03); }
    .tab-btn.active { color: var(--accent); background: rgba(142,167,255,.06);
      border-left-color: var(--accent); }
    .tab-btn .tab-icon { font-size: 15px; flex-shrink: 0; }
    .admin-content { flex: 1; padding: 28px 32px; min-width: 0; }

    /* ── COMMON COMPONENTS ── */
    .page-title { font-size: 20px; font-weight: 800; letter-spacing: .5px; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 22px; }
    .card-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px; }
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; margin-bottom: 24px; }
    .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
    .metric-val { font-size: 28px; font-weight: 800; line-height: 1; }
    .metric-lbl { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .metric-delta { font-size: 11px; font-weight: 600; margin-top: 4px; }
    .delta-up { color: var(--green); }
    .delta-dn { color: var(--red); }

    /* ── TABLES ── */
    .tbl-wrap { overflow-x: auto; }
    table.data-tbl { width: 100%; border-collapse: collapse; }
    table.data-tbl th { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: left; }
    table.data-tbl td { font-size: 13px; padding: 11px 12px; border-bottom: 1px solid rgba(255,255,255,.04);
      vertical-align: middle; }
    table.data-tbl tr:last-child td { border-bottom: none; }
    table.data-tbl tr:hover td { background: rgba(255,255,255,.02); }

    /* ── BADGES ── */
    .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; display: inline-block; }
    .badge-sa  { background: rgba(192,132,252,.15); border: 1px solid rgba(192,132,252,.3); color: var(--purple); }
    .badge-admin { background: rgba(250,204,21,.12); border: 1px solid rgba(250,204,21,.3); color: var(--yellow); }
    .badge-mod { background: rgba(251,146,60,.12); border: 1px solid rgba(251,146,60,.3); color: var(--orange); }
    .badge-prem { background: rgba(110,231,183,.12); border: 1px solid rgba(110,231,183,.3); color: var(--green); }
    .badge-free { background: rgba(142,167,255,.1); border: 1px solid rgba(142,167,255,.25); color: var(--accent); }
    .badge-ban  { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: var(--red); }
    .badge-pending { background: rgba(251,146,60,.12); border: 1px solid rgba(251,146,60,.3); color: var(--orange); }
    .badge-resolved { background: rgba(110,231,183,.12); border: 1px solid rgba(110,231,183,.3); color: var(--green); }
    .badge-dismissed { background: rgba(90,96,112,.15); border: 1px solid rgba(90,96,112,.3); color: var(--muted); }
    .badge-ok  { background: rgba(110,231,183,.12); border: 1px solid rgba(110,231,183,.3); color: var(--green); }
    .badge-err { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.3); color: var(--red); }

    /* ── FORMS ── */
    .form-input { background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 10px;
      padding: 9px 13px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; width: 100%; }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }
    textarea.form-input { min-height: 80px; resize: vertical; }
    select.form-input option { background: #1a1d28; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: .5px;
      text-transform: uppercase; display: block; margin-bottom: 5px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }

    /* ── BUTTONS ── */
    .btn { padding: 8px 16px; border-radius: 9px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: rgba(255,255,255,.06);
      color: var(--text); font-family: inherit; transition: .15s; }
    .btn:hover { background: rgba(255,255,255,.1); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #080a0f; border-color: transparent; }
    .btn-primary:hover { opacity: .85; background: var(--accent); }
    .btn-danger { background: rgba(248,113,113,.12); border-color: rgba(248,113,113,.3); color: var(--red); }
    .btn-danger:hover { background: rgba(248,113,113,.2); }
    .btn-success { background: rgba(110,231,183,.12); border-color: rgba(110,231,183,.3); color: var(--green); }
    .btn-success:hover { background: rgba(110,231,183,.2); }
    .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 7px; cursor: pointer;
      border: 1px solid var(--border); background: rgba(255,255,255,.05); color: var(--text);
      font-family: inherit; transition: .15s; }
    .btn-sm:hover { background: rgba(255,255,255,.1); }
    .btn-icon { background: none; border: none; cursor: pointer; color: var(--muted);
      font-size: 15px; transition: .15s; padding: 2px 4px; }
    .btn-icon:hover { color: var(--red); }

    /* ── MODAL ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex;
      align-items: center; justify-content: center; z-index: 500; padding: 20px; }
    .modal-box { background: #12151f; border: 1px solid var(--border); border-radius: 18px;
      padding: 28px; width: 600px; max-width: 100%; max-height: 85vh; overflow-y: auto; }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .modal-close { float: right; background: none; border: none; color: var(--muted);
      font-size: 18px; cursor: pointer; margin-top: -4px; }
    .modal-close:hover { color: var(--text); }

    /* ── CHARTS ── */
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .chart-wrap { height: 200px; position: relative; }
    @media(max-width: 800px) { .charts-row { grid-template-columns: 1fr; } }

    /* ── MISC ── */
    .divider { height: 1px; background: var(--border); margin: 16px 0; }
    .empty { color: var(--muted); text-align: center; padding: 32px; font-size: 13px; }
    .loading-txt { color: var(--muted); font-size: 13px; padding: 16px; text-align: center; }
    .mono { font-family: var(--mono); font-size: 11px; }
    .text-muted { color: var(--muted); }
    .text-green { color: var(--green); }
    .text-red { color: var(--red); }
    .text-yellow { color: var(--yellow); }
    .text-accent { color: var(--accent); }
    .gap8 { display: flex; gap: 8px; flex-wrap: wrap; }
    .search-bar { position: relative; }
    .search-bar input { padding-left: 34px; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 13px; pointer-events: none; }

    /* ── ANNOUNCE ── */
    .announce-item { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px; padding: 14px 16px; display: flex; gap: 12px; margin-bottom: 8px; }
    .announce-body { flex: 1; }
    .announce-title-txt { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .announce-text { font-size: 13px; color: var(--muted); }
    .announce-meta { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* ── GOALS ── */
    .goals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .goal-card { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px; padding: 14px; }
    .goal-subject { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .goal-input { background: rgba(255,255,255,.06); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px; color: var(--text); font-family: inherit;
      font-size: 13px; width: 70px; outline: none; text-align: center; }
    .goal-input:focus { border-color: var(--accent); }

    /* ── EDITAL ── */
    .edital-subject { margin-bottom: 20px; }
    .edital-subject h4 { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--accent); }
    .edital-item-row { display: flex; align-items: center; gap: 10px; padding: 7px 10px;
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.05);
      border-radius: 8px; font-size: 13px; margin-bottom: 3px; }
    .edital-item-code { font-size: 11px; font-weight: 700; color: var(--muted); min-width: 40px; }
    .edital-sub { margin-left: 24px; margin-top: 3px; }
    .edital-sub .edital-item-row { background: rgba(255,255,255,.015); }

    /* ── DISC ── */
    .disc-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .disc-form-grid .full { grid-column: 1 / -1; }
    .disc-row { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px; padding: 12px 16px; display: flex; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
    .disc-row-body { flex: 1; }
    .disc-row-prompt { font-size: 13px; margin-bottom: 4px; }
    .disc-row-meta { font-size: 11px; color: var(--muted); }

    /* ── RESP MODAL ── */
    .resp-card { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px; padding: 14px; margin-bottom: 10px; }
    .resp-user { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
    .resp-text { font-size: 13px; white-space: pre-wrap; margin-bottom: 8px; max-height: 120px; overflow-y: auto; }
    .resp-scores { display: flex; gap: 12px; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .resp-grade-row { display: flex; gap: 8px; align-items: center; }
    .resp-grade-row input { width: 60px; background: rgba(255,255,255,.06); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 8px; color: var(--text); font-size: 13px; outline: none; text-align: center; }
    .resp-grade-row textarea { flex: 1; background: rgba(255,255,255,.06); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 8px; color: var(--text); font-size: 13px;
      font-family: inherit; resize: none; height: 48px; outline: none; }

    /* ── SETTINGS TOGGLE ── */
    .toggle-row { display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.05); }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-info { flex: 1; }
    .toggle-label { font-size: 13px; font-weight: 600; }
    .toggle-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; margin-left: 16px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-track { position: absolute; inset: 0; border-radius: 11px;
      background: rgba(255,255,255,.12); cursor: pointer; transition: .2s; }
    .toggle-switch input:checked + .toggle-track { background: var(--accent); }
    .toggle-track::after { content: ''; position: absolute; width: 16px; height: 16px;
      border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: .2s; }
    .toggle-switch input:checked + .toggle-track::after { left: 21px; }

    /* ── USER DETAIL MODAL ── */
    .user-detail-section { margin-bottom: 18px; }
    .user-detail-section h4 { font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .session-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      background: rgba(255,255,255,.03); border-radius: 8px; margin-bottom: 4px; font-size: 12px; }
    .session-agent { color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }

    /* ── SUB PILLS ── */
    .sub-pills { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
    .pill-btn { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: none; color: var(--muted);
      font-family: inherit; transition: .15s; }
    .pill-btn.active { background: rgba(142,167,255,.12); border-color: var(--accent); color: var(--accent); }
    .pill-btn:hover:not(.active) { background: rgba(255,255,255,.04); }

    @media(max-width: 700px) {
      .admin-sidebar { display: none; }
      .admin-content { padding: 16px; }
      .goals-grid { grid-template-columns: repeat(2,1fr); }
      .disc-form-grid { grid-template-columns: 1fr; }
    }
    /* ── BILLING ── */
    .billing-hero { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
    .billing-cta { background:rgba(142,167,255,.08); border:1px dashed rgba(142,167,255,.3);
      border-radius:14px; padding:18px 20px; color:var(--accent); margin-bottom:20px; font-size:14px; }
    /* ── NOTIFICATIONS ── */
    .alert-card { background:rgba(250,204,21,.06); border:1px solid rgba(250,204,21,.3);
      border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:14px; margin-bottom:10px; }
    .alert-card.danger { background:rgba(248,113,113,.06); border-color:rgba(248,113,113,.3); }
    .alert-card.info   { background:rgba(142,167,255,.06); border-color:rgba(142,167,255,.3); }
    .alert-icon { font-size:22px; flex-shrink:0; }
    .alert-body { flex:1; }
    .alert-title { font-size:13px; font-weight:700; margin-bottom:2px; }
    .alert-desc  { font-size:12px; color:var(--muted); }
    .threshold-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
    .threshold-row:last-child { border-bottom:none; }
    .threshold-label { font-size:13px; flex:1; }
    .threshold-input { width:80px; }
    /* ── PERMISSIONS ── */
    .perm-matrix { width:100%; border-collapse:collapse; font-size:12px; }
    .perm-matrix th { padding:8px 10px; text-align:left; color:var(--muted); font-weight:600;
      border-bottom:1px solid var(--border); white-space:nowrap; background:rgba(255,255,255,.02); }
    .perm-matrix td { padding:8px 10px; border-bottom:1px solid rgba(255,255,255,.04); text-align:center; }
    .perm-matrix td:first-child { text-align:left; font-weight:600; }
    .perm-check { accent-color:var(--accent); width:15px; height:15px; cursor:pointer; }
    .pages-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; margin-top:8px; }
    .page-access-chip { padding:8px 12px; border-radius:8px; font-size:12px;
      background:rgba(255,255,255,.03); border:1px solid var(--border); }
    .page-access-chip strong { display:block; font-size:11px; margin-bottom:4px; color:var(--text); }
    /* ── LEADERBOARD ── */
    .lb-row { display:flex; align-items:center; gap:12px; padding:10px 14px;
      background:rgba(255,255,255,.03); border-radius:10px; margin-bottom:6px; transition:.15s; }
    .lb-row:hover { background:rgba(255,255,255,.06); }
    .lb-rank { font-size:16px; font-weight:900; width:32px; text-align:center; color:var(--muted); flex-shrink:0; }
    .lb-rank.gold   { color:#f59e0b; }
    .lb-rank.silver { color:#94a3b8; }
    .lb-rank.bronze { color:#b45309; }
    /* ── RETENTION ── */
    .ret-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .ret-label { font-size:12px; color:var(--muted); width:36px; flex-shrink:0; }
    .ret-bar-wrap { flex:1; height:10px; background:rgba(255,255,255,.06); border-radius:5px; overflow:hidden; }
    .ret-bar-fill { height:100%; border-radius:5px; background:var(--accent); }
    .ret-pct { font-size:13px; font-weight:700; width:36px; text-align:right; }
    /* ── HEATMAP ── */
    .heat-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

Chart.defaults.color = '#5a6070';
Chart.defaults.borderColor = 'rgba(255,255,255,0.07)';
Chart.defaults.font.family = 'Inter, sans-serif';

const SUBJECTS = ['LP','ING','HB','HM','GEO','PI','ECO','DIR','LING'];
const SUBJECT_NAMES = { LP:'Língua Portuguesa', ING:'Língua Inglesa', HB:'História do Brasil',
  HM:'História Mundial', GEO:'Geografia', PI:'Política Internacional',
  ECO:'Economia', DIR:'Direito', LING:'Espanhol / Francês' };
const SUBJECT_COLORS = { LP:'#a78bfa', ING:'#60a5fa', HB:'#fbbf24', HM:'#f97316',
  GEO:'#34d399', PI:'#22d3ee', ECO:'#facc15', DIR:'#f87171', LING:'#f472b6' };
const TYPE_LABEL = { fc:'🃏 Flashcard', sim:'📝 Simulado', rep:'📚 Repositório' };

const TABS_CONFIG = [
  { id:'dashboard',     icon:'📊', label:'Dashboard',    roles:['super_admin','admin','moderator'] },
  { id:'users',         icon:'👥', label:'Usuários',     roles:['super_admin','admin'] },
  { id:'security',      icon:'🔒', label:'Segurança',    roles:['super_admin','admin'] },
  { id:'moderation',    icon:'🛡️', label:'Moderação',   roles:['super_admin','admin','moderator'] },
  { id:'content',       icon:'📚', label:'Conteúdo',     roles:['super_admin','admin'] },
  { id:'analytics',     icon:'📈', label:'Analytics',    roles:['super_admin','admin'] },
  { id:'subscriptions', icon:'💎', label:'Assinaturas',  roles:['super_admin','admin'] },
  { id:'settings',      icon:'⚙️', label:'Configurações',roles:['super_admin'] },
  { id:'billing',       icon:'💳', label:'Billing',      roles:['super_admin','admin'] },
  { id:'notifications', icon:'🔔', label:'Alertas',      roles:['super_admin','admin'] },
  { id:'permissions',   icon:'🛡', label:'Permissões',   roles:['super_admin'] },
  { id:'leaderboard',   icon:'🏆', label:'Leaderboard',  roles:['super_admin','admin'] },
];

function roleBadge(role) {
  const map = {
    super_admin: ['badge badge-sa', 'SUPER'],
    admin: ['badge badge-admin', 'ADMIN'],
    moderator: ['badge badge-mod', 'MOD'],
    premium_user: ['badge badge-prem', 'PREMIUM'],
    free_user: ['badge badge-free', 'FREE'],
    banned_user: ['badge badge-ban', 'BANIDO'],
    admin_legacy: ['badge badge-admin', 'ADMIN'],
    user: ['badge badge-free', 'USER'],
  };
  const [cls, lbl] = map[role] || ['badge badge-free', role || '?'];
  return <span className={cls}>{lbl}</span>;
}

function tierBadge(tier) {
  const map = {
    free: ['badge badge-free', 'FREE'],
    premium: ['badge badge-prem', 'PREMIUM'],
    elite: ['badge badge-sa', 'ELITE'],
  };
  const [cls, lbl] = map[tier] || ['badge badge-free', tier || 'FREE'];
  return <span className={cls}>{lbl}</span>;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('pt-BR');
}
function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
}

// ══════════════════════════════════════════════════════════════
// DASHBOARD TAB
// ══════════════════════════════════════════════════════════════
function DashboardTab() {
  const [metrics, setMetrics] = useState(null);
  const [adv, setAdv] = useState(null);
  const [loading, setLoading] = useState(true);
  const chartTypesRef = useRef(null);
  const chartActRef   = useRef(null);
  const chartTypesInst = useRef(null);
  const chartActInst   = useRef(null);

  useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const [m, a] = await Promise.all([
          DB.getAdminMetrics(),
          DB.getAdvancedMetrics().catch(()=>null),
        ]);
        setMetrics(m);
        setAdv(a);
      } catch(e) { console.error(e); }
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    if (!metrics) return;
    if (chartTypesInst.current) chartTypesInst.current.destroy();
    if (chartActInst.current) chartActInst.current.destroy();
    const roles = Object.keys(metrics.byRole || {});
    if (chartTypesRef.current) {
      chartTypesInst.current = new Chart(chartTypesRef.current.getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: roles,
          datasets: [{ data: roles.map(r => metrics.byRole[r]),
            backgroundColor: ['rgba(192,132,252,.7)','rgba(250,204,21,.7)','rgba(251,146,60,.7)','rgba(110,231,183,.7)','rgba(142,167,255,.7)','rgba(248,113,113,.7)'],
            borderWidth: 1 }]
        },
        options: { responsive:true, maintainAspectRatio:false, cutout:'60%',
          plugins:{ legend:{ position:'bottom', labels:{ font:{size:10}, padding:10 } } } }
      });
    }
    const acts = metrics.activityLast30d || [];
    if (chartActRef.current && acts.length) {
      chartActInst.current = new Chart(chartActRef.current.getContext('2d'), {
        type: 'bar',
        data: {
          labels: acts.map(a => a.date?.slice(5)),
          datasets: [{ label:'Sessões', data: acts.map(a => a.count),
            backgroundColor:'rgba(142,167,255,.5)', borderColor:'#8ea7ff', borderWidth:1, borderRadius:3 }]
        },
        options: { responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false} },
          scales:{ y:{ beginAtZero:true }, x:{ grid:{display:false} } } }
      });
    }
    return () => {
      chartTypesInst.current?.destroy();
      chartActInst.current?.destroy();
    };
  }, [metrics]);

  if (loading) return <div className="loading-txt">Carregando métricas…</div>;
  if (!metrics) return <div className="empty">Erro ao carregar métricas.</div>;

  return (
    <div>
      <div className="page-title">Dashboard</div>
      <div className="page-sub">Visão geral da plataforma</div>

      <div className="metrics-grid">
        <div className="metric-card">
          <div className="metric-val text-accent">{metrics.totalUsers ?? 0}</div>
          <div className="metric-lbl">Usuários totais</div>
        </div>
        <div className="metric-card">
          <div className="metric-val text-green">{metrics.dau ?? 0}</div>
          <div className="metric-lbl">Ativos hoje (DAU)</div>
        </div>
        <div className="metric-card">
          <div className="metric-val">{adv ? adv.mau : (metrics.mauSessions ?? 0)}</div>
          <div className="metric-lbl">{adv ? 'Usuários ativos (MAU)' : 'Sessões (30d)'}</div>
        </div>
        <div className="metric-card">
          <div className="metric-val" style={{color: (metrics.avgScore||0)>=70?'var(--green)':'var(--yellow)'}}>{metrics.avgScore ?? 0}%</div>
          <div className="metric-lbl">Acerto médio global</div>
        </div>
        <div className="metric-card">
          <div className="metric-val text-yellow">{metrics.activeSubscriptions ?? 0}</div>
          <div className="metric-lbl">Assinaturas ativas</div>
        </div>
        {adv && (
          <div className="metric-card">
            <div className="metric-val" style={{color:'var(--accent)'}}>{adv.convRate}%</div>
            <div className="metric-lbl">Taxa de conversão</div>
          </div>
        )}
        {adv && (
          <div className="metric-card">
            <div className="metric-val">{adv.avgTime} min</div>
            <div className="metric-lbl">Tempo médio/sessão</div>
          </div>
        )}
        {adv && (
          <div className="metric-card">
            <div className="metric-val" style={{color:adv.avgScore>=70?'var(--green)':'var(--yellow)'}}>{adv.avgScore}%</div>
            <div className="metric-lbl">Score médio (30d)</div>
          </div>
        )}
      </div>

      {adv && (
        <div className="metrics-grid" style={{marginBottom:24}}>
          {[['free','Free',adv.tiers.free||0,'var(--muted)'],['premium','Premium',adv.tiers.premium||0,'#facc15'],['elite','Elite',adv.tiers.elite||0,'#a855f7']].map(([k,lbl,n,c])=>(
            <div key={k} className="metric-card">
              <div className="metric-val" style={{color:c}}>{n}</div>
              <div className="metric-lbl">Tier {lbl}</div>
            </div>
          ))}
        </div>
      )}

      <div className="charts-row">
        <div className="card">
          <div className="card-title">Usuários por role</div>
          <div className="chart-wrap"><canvas ref={chartTypesRef}></canvas></div>
        </div>
        <div className="card">
          <div className="card-title">Atividade (30 dias)</div>
          <div className="chart-wrap"><canvas ref={chartActRef}></canvas></div>
        </div>
      </div>

      {metrics.subjectCounts && Object.keys(metrics.subjectCounts).length > 0 && (
        <div className="card">
          <div className="card-title">Sessões por disciplina</div>
          <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))', gap:10, marginTop:4}}>
            {Object.entries(metrics.subjectCounts).sort((a,b)=>b[1]-a[1]).map(([sub,cnt]) => (
              <div key={sub} style={{background:'rgba(255,255,255,.03)', borderRadius:10, padding:'10px 12px', borderLeft:`3px solid ${SUBJECT_COLORS[sub]||'var(--accent)'}`}}>
                <div style={{fontSize:18, fontWeight:800}}>{cnt}</div>
                <div style={{fontSize:11, color:'var(--muted)', marginTop:2}}>{sub}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
// USERS TAB
// ══════════════════════════════════════════════════════════════
function UsersTab() {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [roleFilter, setRoleFilter] = useState('');
  const [detailUser, setDetailUser] = useState(null);
  const [detailData, setDetailData] = useState(null);
  const [banModal, setBanModal] = useState(null);
  const [banReason, setBanReason] = useState('');
  const [suspendModal, setSuspendModal] = useState(null);
  const [suspendDate, setSuspendDate] = useState('');
  const [me, setMe] = useState(null);

  useEffect(() => {
    (async () => {
      setLoading(true);
      const [u, profile] = await Promise.all([DB.getUser(), DB.getProfile()]);
      setMe(u?.id);
      const all = await DB.getAllUsersStats();
      setUsers(all || []);
      setLoading(false);
    })();
  }, []);

  async function openDetail(u) {
    setDetailUser(u);
    setDetailData(null);
    const [sessions, secEvents, auditLogs] = await Promise.all([
      DB.getUserDeviceSessions(u.id).catch(()=>[]),
      DB.getSecurityEvents({ userId: u.id, limit: 5 }).catch(()=>[]),
      DB.getAuditLogs({ userId: u.id, limit: 5 }).catch(()=>[]),
    ]);
    setDetailData({ sessions, secEvents, auditLogs });
  }

  async function doChangeRole(userId, newRole) {
    if (!confirm(`Mudar role para "${newRole}"?`)) return;
    await DB.changeUserRole(userId, newRole);
    setUsers(us => us.map(u => u.id === userId ? {...u, role: newRole} : u));
  }

  async function doBan() {
    await DB.banUser(banModal.id, banReason || 'Violação dos termos.');
    setBanModal(null); setBanReason('');
    setUsers(us => us.map(u => u.id === banModal.id ? {...u, role:'banned_user'} : u));
  }

  async function doUnban(userId) {
    await DB.unbanUser(userId);
    setUsers(us => us.map(u => u.id === userId ? {...u, role:'free_user'} : u));
  }

  async function doSuspend() {
    await DB.suspendUser(suspendModal.id, new Date(suspendDate).toISOString());
    setSuspendModal(null); setSuspendDate('');
    alert('Usuário suspenso até ' + suspendDate);
  }

  async function doRevokeSessions(userId) {
    await DB.revokeUserSessions(userId);
    alert('Sessões revogadas.');
  }

  async function doPasswordReset(email) {
    if (!email) return;
    await DB.sendPasswordReset(email);
    alert('E-mail de reset enviado para ' + email);
  }

  async function doDeleteUser(u) {
    if (!confirm(`Excluir permanentemente "${u.name || u.email}"? Esta ação é irreversível.`)) return;
    const ok = await DB.deleteUser(u.id);
    if (ok) setUsers(us => us.filter(x => x.id !== u.id));
    else alert('Erro ao excluir usuário.');
  }

  const filtered = users.filter(u => {
    const q = search.toLowerCase();
    const matchQ = !q || (u.name||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q);
    const matchR = !roleFilter || u.role === roleFilter;
    return matchQ && matchR;
  });

  return (
    <div>
      <div className="page-title">Usuários</div>
      <div className="page-sub">Gerenciar contas, roles e permissões</div>

      <div className="form-row" style={{marginBottom:16}}>
        <div className="search-bar" style={{flex:1}}>
          <span className="search-icon">🔍</span>
          <input className="form-input" placeholder="Buscar por nome ou e-mail…"
            value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
        <select className="form-input" style={{width:160}}
          value={roleFilter} onChange={e=>setRoleFilter(e.target.value)}>
          <option value="">Todos os roles</option>
          <option value="super_admin">Super Admin</option>
          <option value="admin">Admin</option>
          <option value="moderator">Moderador</option>
          <option value="premium_user">Premium</option>
          <option value="free_user">Free</option>
          <option value="banned_user">Banido</option>
        </select>
        <button className="btn" onClick={async()=>{ setLoading(true); setUsers(await DB.getAllUsersStats()||[]); setLoading(false); }}>↺</button>
      </div>

      {loading ? <div className="loading-txt">Carregando…</div> : (
        <div className="card" style={{padding:0}}>
          <div className="tbl-wrap">
            <table className="data-tbl">
              <thead><tr>
                <th>Nome</th><th>E-mail</th><th>Role</th><th>Tier</th>
                <th>Sessões</th><th>Acerto</th><th>Último acesso</th><th>Ações</th>
              </tr></thead>
              <tbody>
                {filtered.length === 0 ? (
                  <tr><td colSpan={8} style={{textAlign:'center',color:'var(--muted)',padding:24}}>Nenhum usuário encontrado.</td></tr>
                ) : filtered.map(u => (
                  <tr key={u.id}>
                    <td><strong>{u.name||'—'}</strong>{u.id===me&&<span style={{fontSize:10,color:'var(--muted)',marginLeft:6}}>(você)</span>}</td>
                    <td style={{color:'var(--muted)',fontSize:12}}>{u.email}</td>
                    <td>{roleBadge(u.role)}</td>
                    <td>{tierBadge(u.subscription_tier||'free')}</td>
                    <td>{u.totalSessions}</td>
                    <td style={{color:u.avgScore>=70?'var(--green)':u.avgScore>=50?'var(--yellow)':'var(--red)',fontWeight:600}}>{u.avgScore}%</td>
                    <td style={{color:'var(--muted)',fontSize:12}}>{u.lastActive||'—'}</td>
                    <td>
                      <div className="gap8">
                        <button className="btn-sm" onClick={()=>openDetail(u)}>Detalhes</button>
                        {u.role === 'banned_user'
                          ? <button className="btn-sm btn-success" onClick={()=>doUnban(u.id)}>Desbanir</button>
                          : <button className="btn-sm btn-danger" onClick={()=>setBanModal(u)}>Banir</button>
                        }
                        <select className="btn-sm" style={{cursor:'pointer'}}
                          defaultValue=""
                          onChange={e=>{ if(e.target.value) doChangeRole(u.id, e.target.value); e.target.value=''; }}>
                          <option value="" disabled>Role ▾</option>
                          {['super_admin','admin','moderator','premium_user','free_user','banned_user'].map(r=>(
                            <option key={r} value={r}>{r}</option>
                          ))}
                        </select>
                        {u.id !== me && (
                          <button className="btn-sm btn-danger" title="Excluir usuário" onClick={()=>doDeleteUser(u)}>🗑</button>
                        )}
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Detail Modal */}
      {detailUser && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setDetailUser(null)}>
          <div className="modal-box">
            <button className="modal-close" onClick={()=>setDetailUser(null)}>✕</button>
            <div className="modal-title">{detailUser.name || detailUser.email}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginBottom:4}}>{detailUser.email}</div>
            <div className="gap8" style={{marginBottom:16}}>
              {roleBadge(detailUser.role)}
              {tierBadge(detailUser.subscription_tier||'free')}
            </div>

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:18}}>
              <div style={{background:'rgba(255,255,255,.04)',borderRadius:10,padding:'10px 14px'}}>
                <div style={{fontSize:20,fontWeight:800}}>{detailUser.totalSessions}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>Sessões</div>
              </div>
              <div style={{background:'rgba(255,255,255,.04)',borderRadius:10,padding:'10px 14px'}}>
                <div style={{fontSize:20,fontWeight:800,color:detailUser.avgScore>=70?'var(--green)':'var(--yellow)'}}>{detailUser.avgScore}%</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>Acerto médio</div>
              </div>
            </div>

            {!detailData ? <div className="loading-txt">Carregando detalhes…</div> : (
              <>
                <div className="user-detail-section">
                  <h4>Dispositivos / Sessões ativas</h4>
                  {detailData.sessions?.length ? detailData.sessions.map(s=>(
                    <div className="session-row" key={s.id}>
                      <span>🖥</span>
                      <div style={{flex:1}}>
                        <div className="session-agent">{s.user_agent||'Dispositivo desconhecido'}</div>
                        <div style={{fontSize:10,color:'var(--muted)'}}>IP: {s.ip||'—'} · Último: {fmtDateTime(s.last_seen)}</div>
                      </div>
                    </div>
                  )) : <div style={{fontSize:12,color:'var(--muted)'}}>Nenhuma sessão registrada.</div>}
                </div>

                <div className="user-detail-section">
                  <h4>Eventos de segurança recentes</h4>
                  {detailData.secEvents?.length ? detailData.secEvents.map(e=>(
                    <div className="session-row" key={e.id}>
                      <span className={e.event_type?.includes('fail')?'text-red':'text-green'}>
                        {e.event_type?.includes('fail')?'✗':'✓'}
                      </span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12}}>{e.event_type}</div>
                        <div style={{fontSize:10,color:'var(--muted)'}}>IP: {e.ip||'—'} · {fmtDateTime(e.created_at)}</div>
                      </div>
                    </div>
                  )) : <div style={{fontSize:12,color:'var(--muted)'}}>Nenhum evento registrado.</div>}
                </div>

                <div className="user-detail-section">
                  <h4>Log de auditoria</h4>
                  {detailData.auditLogs?.length ? detailData.auditLogs.map(l=>(
                    <div className="session-row" key={l.id}>
                      <span style={{fontSize:10,fontFamily:'var(--mono)',color:'var(--accent)'}}>{l.action}</span>
                      <div style={{fontSize:10,color:'var(--muted)',marginLeft:'auto'}}>{fmtDateTime(l.created_at)}</div>
                    </div>
                  )) : <div style={{fontSize:12,color:'var(--muted)'}}>Nenhuma ação registrada.</div>}
                </div>
              </>
            )}

            <div className="gap8" style={{marginTop:8}}>
              <button className="btn btn-danger" onClick={()=>doRevokeSessions(detailUser.id)}>Revogar sessões</button>
              <button className="btn" onClick={()=>doPasswordReset(detailUser.email)}>🔑 Reset senha</button>
              <button className="btn" onClick={()=>setSuspendModal(detailUser)}>Suspender</button>
              <button className="btn btn-danger" onClick={()=>{setDetailUser(null);setBanModal(detailUser);}}>Banir</button>
            </div>
          </div>
        </div>
      )}

      {/* Ban Modal */}
      {banModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setBanModal(null)}>
          <div className="modal-box" style={{maxWidth:420}}>
            <button className="modal-close" onClick={()=>setBanModal(null)}>✕</button>
            <div className="modal-title">Banir usuário</div>
            <p style={{fontSize:13,color:'var(--muted)',marginBottom:14}}>Banir <strong>{banModal.name||banModal.email}</strong>? O usuário será redirecionado para a página de conta suspensa.</p>
            <div className="form-group" style={{marginBottom:14}}>
              <label className="form-label">Motivo</label>
              <textarea className="form-input" rows={3} value={banReason}
                onChange={e=>setBanReason(e.target.value)}
                placeholder="Descreva o motivo do banimento…" />
            </div>
            <div className="gap8">
              <button className="btn btn-danger" onClick={doBan}>Confirmar banimento</button>
              <button className="btn" onClick={()=>setBanModal(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* Suspend Modal */}
      {suspendModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setSuspendModal(null)}>
          <div className="modal-box" style={{maxWidth:380}}>
            <button className="modal-close" onClick={()=>setSuspendModal(null)}>✕</button>
            <div className="modal-title">Suspender usuário</div>
            <div className="form-group" style={{marginBottom:14}}>
              <label className="form-label">Suspender até</label>
              <input type="date" className="form-input" value={suspendDate} onChange={e=>setSuspendDate(e.target.value)} />
            </div>
            <div className="gap8">
              <button className="btn btn-danger" onClick={doSuspend} disabled={!suspendDate}>Confirmar</button>
              <button className="btn" onClick={()=>setSuspendModal(null)}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// SECURITY TAB
// ══════════════════════════════════════════════════════════════
function SecurityTab() {
  const [sub, setSub] = useState('audit');
  const [auditLogs, setAuditLogs] = useState([]);
  const [secEvents, setSecEvents] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [blockedIPs, setBlockedIPs] = useState([]);
  const [newIP, setNewIP] = useState('');
  const [newIPReason, setNewIPReason] = useState('');
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const [a, s, sess, alrt, bips] = await Promise.all([
          DB.getAuditLogs({ limit: 50 }).catch(()=>[]),
          DB.getSecurityEvents({ limit: 50 }).catch(()=>[]),
          DB.getUserDeviceSessions(null).catch(()=>[]),
          DB.getSecurityAlerts().catch(()=>[]),
          DB.getBlockedIPs().catch(()=>[]),
        ]);
        setAuditLogs(a||[]);
        setSecEvents(s||[]);
        setSessions(sess||[]);
        setAlerts(alrt||[]);
        setBlockedIPs(bips||[]);
      } catch(e) { console.error(e); }
      setLoading(false);
    })();
  }, []);

  async function doBlockIP() {
    if (!newIP.trim()) return;
    await DB.blockIP(newIP.trim(), newIPReason||'manual');
    setBlockedIPs(prev=>[...prev, {ip:newIP.trim(), reason:newIPReason||'manual', blocked_at:new Date().toISOString()}]);
    setNewIP(''); setNewIPReason('');
  }

  async function doUnblockIP(ip) {
    await DB.unblockIP(ip);
    setBlockedIPs(prev=>prev.filter(b=>b.ip!==ip));
  }

  const ipCounts = {};
  secEvents.filter(e=>e.event_type==='login_failed').forEach(e=>{ if(e.ip) ipCounts[e.ip]=(ipCounts[e.ip]||0)+1; });
  const suspectIPs = new Set(Object.entries(ipCounts).filter(([,v])=>v>=3).map(([k])=>k));

  return (
    <div>
      <div className="page-title">Segurança</div>
      <div className="page-sub">Logs de auditoria, eventos de segurança e sessões ativas</div>

      {alerts.length > 0 && (
        <div style={{marginBottom:16}}>
          {alerts.map((a,i)=>(
            <div key={i} className={`alert-card${a.type==='brute_force'||a.type==='spike'?' danger':''}`}>
              <span className="alert-icon">{a.type==='brute_force'?'🔓':a.type==='spike'?'📈':'⚠️'}</span>
              <div className="alert-body">
                <div className="alert-title">
                  {a.type==='brute_force'&&`Brute force detectado: IP ${a.ip} (${a.count} tentativas)`}
                  {a.type==='spike'&&`Spike de logins falhos: ${a.count} em 24h`}
                  {a.type==='reports'&&`${a.count} denúncias pendentes`}
                </div>
              </div>
              {a.type==='brute_force'&&(
                <button className="btn-sm btn-danger" onClick={()=>DB.blockIP(a.ip,'brute_force').then(()=>setAlerts(prev=>prev.filter((_,j)=>j!==i)))}>Bloquear IP</button>
              )}
            </div>
          ))}
        </div>
      )}

      <div className="sub-pills">
        {[['audit','📋 Audit Logs'],['events','🚨 Eventos'],['sessions','🖥 Sessões'],['blocklist','🚫 IPs Bloqueados']].map(([id,lbl])=>(
          <button key={id} className={`pill-btn${sub===id?' active':''}`} onClick={()=>setSub(id)}>{lbl}</button>
        ))}
      </div>

      {loading ? <div className="loading-txt">Carregando…</div> : (
        <>
          {sub === 'audit' && (
            <div className="card" style={{padding:0}}>
              <div className="tbl-wrap">
                <table className="data-tbl">
                  <thead><tr><th>Ator</th><th>Ação</th><th>Alvo</th><th>IP</th><th>Data</th></tr></thead>
                  <tbody>
                    {auditLogs.length === 0
                      ? <tr><td colSpan={5} style={{textAlign:'center',color:'var(--muted)',padding:24}}>Nenhum log registrado.</td></tr>
                      : auditLogs.map(l=>(
                        <tr key={l.id}>
                          <td style={{fontSize:12}}>{l.actor?.name || l.actor_id?.slice(0,8) || 'sistema'}</td>
                          <td><span className="mono" style={{color:'var(--accent)'}}>{l.action}</span></td>
                          <td style={{fontSize:12,color:'var(--muted)'}}>{l.target_type} {l.target_id ? '· '+l.target_id.slice(0,8) : ''}</td>
                          <td><span className="mono">{l.ip||'—'}</span></td>
                          <td style={{fontSize:11,color:'var(--muted)'}}>{fmtDateTime(l.created_at)}</td>
                        </tr>
                      ))
                    }
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {sub === 'events' && (
            <>
              {suspectIPs.size > 0 && (
                <div style={{background:'rgba(248,113,113,.08)',border:'1px solid rgba(248,113,113,.25)',borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:13}}>
                  ⚠️ <strong style={{color:'var(--red)'}}>IPs suspeitos</strong> (3+ tentativas falhas): {[...suspectIPs].join(', ')}
                </div>
              )}
              <div className="card" style={{padding:0}}>
                <div className="tbl-wrap">
                  <table className="data-tbl">
                    <thead><tr><th>Usuário</th><th>Tipo</th><th>IP</th><th>User Agent</th><th>Data</th></tr></thead>
                    <tbody>
                      {secEvents.length === 0
                        ? <tr><td colSpan={5} style={{textAlign:'center',color:'var(--muted)',padding:24}}>Nenhum evento registrado.</td></tr>
                        : secEvents.map(e=>(
                          <tr key={e.id}>
                            <td style={{fontSize:12}}>{e.user?.name || e.user_id?.slice(0,8) || '—'}</td>
                            <td>
                              <span className={`badge ${e.event_type?.includes('fail')||e.event_type?.includes('ban')?'badge-err':'badge-ok'}`}>
                                {e.event_type}
                              </span>
                            </td>
                            <td>
                              <span className={`mono${suspectIPs.has(e.ip)?' text-red':''}`}>{e.ip||'—'}</span>
                              {suspectIPs.has(e.ip)&&<span style={{marginLeft:4,fontSize:10}}>⚠️</span>}
                            </td>
                            <td style={{fontSize:11,color:'var(--muted)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.user_agent||'—'}</td>
                            <td style={{fontSize:11,color:'var(--muted)'}}>{fmtDateTime(e.created_at)}</td>
                          </tr>
                        ))
                      }
                    </tbody>
                  </table>
                </div>
              </div>
            </>
          )}

          {sub === 'sessions' && (
            <div className="card" style={{padding:0}}>
              <div className="tbl-wrap">
                <table className="data-tbl">
                  <thead><tr><th>Usuário</th><th>IP</th><th>User Agent</th><th>Último acesso</th><th></th></tr></thead>
                  <tbody>
                    {sessions.length === 0
                      ? <tr><td colSpan={5} style={{textAlign:'center',color:'var(--muted)',padding:24}}>Nenhuma sessão ativa.</td></tr>
                      : sessions.map(s=>(
                        <tr key={s.id}>
                          <td style={{fontSize:12}}>{s.user_id?.slice(0,8)||'—'}</td>
                          <td><span className="mono">{s.ip||'—'}</span></td>
                          <td style={{fontSize:11,color:'var(--muted)',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.user_agent||'—'}</td>
                          <td style={{fontSize:11,color:'var(--muted)'}}>{fmtDateTime(s.last_seen)}</td>
                          <td><button className="btn-sm btn-danger" onClick={async()=>{await DB.revokeUserSessions(s.user_id);alert('Sessão revogada.');}}>Revogar</button></td>
                        </tr>
                      ))
                    }
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {sub === 'blocklist' && (
            <div>
              <div className="card" style={{marginBottom:12}}>
                <div className="card-title">Bloquear novo IP</div>
                <div className="form-row" style={{marginTop:8}}>
                  <input className="form-input" style={{width:160}} placeholder="Endereço IP" value={newIP} onChange={e=>setNewIP(e.target.value)} />
                  <input className="form-input" style={{flex:1}} placeholder="Motivo (opcional)" value={newIPReason} onChange={e=>setNewIPReason(e.target.value)} />
                  <button className="btn btn-danger" onClick={doBlockIP}>🚫 Bloquear</button>
                </div>
              </div>
              <div className="card" style={{padding:0}}>
                <div className="tbl-wrap">
                  <table className="data-tbl">
                    <thead><tr><th>IP</th><th>Motivo</th><th>Bloqueado em</th><th></th></tr></thead>
                    <tbody>
                      {blockedIPs.length === 0
                        ? <tr><td colSpan={4} style={{textAlign:'center',color:'var(--muted)',padding:24}}>Nenhum IP bloqueado.</td></tr>
                        : blockedIPs.map((b,i)=>(
                          <tr key={i}>
                            <td><span className="mono text-red">{b.ip}</span></td>
                            <td style={{fontSize:12,color:'var(--muted)'}}>{b.reason||'—'}</td>
                            <td style={{fontSize:11,color:'var(--muted)'}}>{b.blocked_at?fmtDateTime(b.blocked_at):'—'}</td>
                            <td><button className="btn-sm" onClick={()=>doUnblockIP(b.ip)}>✓ Desbloquear</button></td>
                          </tr>
                        ))
                      }
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// MODERATION TAB
// ══════════════════════════════════════════════════════════════
function ModerationTab() {
  const [reports, setReports] = useState([]);
  const [statusFilter, setStatusFilter] = useState('pending');
  const [loading, setLoading] = useState(true);

  async function load(status) {
    setLoading(true);
    const r = await DB.getReports({ status, limit: 50 }).catch(()=>[]);
    setReports(r||[]);
    setLoading(false);
  }

  useEffect(() => { load(statusFilter); }, [statusFilter]);

  async function resolve(id, status) {
    await DB.resolveReport(id, status);
    setReports(rs => rs.filter(r => r.id !== id));
  }

  async function banReporter(report) {
    const reason = prompt('Motivo do banimento:');
    if (!reason) return;
    await DB.banUser(report.target_id, reason);
    await resolve(report.id, 'resolved');
  }

  return (
    <div>
      <div className="page-title">Moderação</div>
      <div className="page-sub">Fila de denúncias e ações de moderação</div>

      <div className="sub-pills">
        {[['pending','⏳ Pendentes'],['reviewed','👁 Revisadas'],['resolved','✅ Resolvidas'],['dismissed','✗ Descartadas']].map(([id,lbl])=>(
          <button key={id} className={`pill-btn${statusFilter===id?' active':''}`} onClick={()=>setStatusFilter(id)}>{lbl}</button>
        ))}
      </div>

      {loading ? <div className="loading-txt">Carregando…</div> : reports.length === 0
        ? <div className="empty">Nenhuma denúncia {statusFilter === 'pending' ? 'pendente' : 'com este status'}.</div>
        : reports.map(r=>(
          <div key={r.id} className="card" style={{marginBottom:10}}>
            <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:8}}>
                  <span className={`badge badge-${r.status==='pending'?'pending':r.status==='resolved'?'resolved':'dismissed'}`}>
                    {r.status}
                  </span>
                  <span style={{fontSize:12,color:'var(--muted)'}}>{r.target_type} · {fmtDate(r.created_at)}</span>
                </div>
                <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>{r.reason}</div>
                {r.description && <div style={{fontSize:12,color:'var(--muted)'}}>{r.description}</div>}
                <div style={{fontSize:11,color:'var(--muted)',marginTop:6}}>
                  Reporter: {r.reporter?.name || r.reporter_id?.slice(0,8) || '—'}
                  {' · '}Alvo: {r.target_id?.slice(0,20) || '—'}
                </div>
              </div>
              {r.status === 'pending' && (
                <div className="gap8" style={{flexDirection:'column',alignItems:'flex-end'}}>
                  <button className="btn btn-success" onClick={()=>resolve(r.id,'resolved')}>Resolver</button>
                  <button className="btn" onClick={()=>resolve(r.id,'dismissed')}>Descartar</button>
                  <button className="btn btn-danger" onClick={()=>banReporter(r)}>Banir alvo</button>
                </div>
              )}
            </div>
          </div>
        ))
      }
    </div>
  );
}

function AnnouncementsPane() {
  const [items, setItems] = useState([]);
  const [title, setTitle] = useState('');
  const [body, setBody] = useState('');

  async function load() { setItems(await DB.getAnnouncements()||[]); }
  useEffect(()=>{ load(); },[]);

  async function post() {
    if (!title.trim()) return alert('Digite um título.');
    await DB.addAnnouncement(title.trim(), body.trim());
    setTitle(''); setBody(''); load();
  }
  async function del(id) {
    if (!confirm('Excluir?')) return;
    await DB.deleteAnnouncement(id); load();
  }

  return (
    <div>
      <div className="card" style={{marginBottom:16}}>
        <div className="card-title">Novo anúncio</div>
        <div className="form-group" style={{marginBottom:10}}>
          <input className="form-input" placeholder="Título" value={title} onChange={e=>setTitle(e.target.value)} />
        </div>
        <div className="form-group" style={{marginBottom:12}}>
          <textarea className="form-input" placeholder="Texto (opcional)…" value={body} onChange={e=>setBody(e.target.value)} />
        </div>
        <button className="btn btn-primary" onClick={post}>Publicar Anúncio</button>
      </div>
      {items.length===0 ? <div className="empty">Nenhum anúncio.</div>
        : items.map(a=>(
          <div key={a.id} className="announce-item">
            <div className="announce-body">
              <div className="announce-title-txt">{a.title}</div>
              {a.body && <div className="announce-text">{a.body}</div>}
              <div className="announce-meta">{a.profiles?.name||'Admin'} · {(a.created_at||'').slice(0,10)}</div>
            </div>
            <button className="btn-icon" onClick={()=>del(a.id)}>✕</button>
          </div>
        ))
      }
    </div>
  );
}

function GoalsPane() {
  const [goals, setGoals] = useState({});
  const [saving, setSaving] = useState(false);
  const [saved, setSaved] = useState(false);

  useEffect(()=>{ DB.getGoals().then(g=>setGoals(g||{})); },[]);

  async function saveAll() {
    setSaving(true);
    await Promise.all(SUBJECTS.map(s => {
      const inp = document.getElementById('goal-'+s);
      return inp ? DB.setGoal(s, parseInt(inp.value), SUBJECT_NAMES[s]) : Promise.resolve();
    }));
    setSaving(false); setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  }

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontSize:13,color:'var(--muted)'}}>Meta de acerto por disciplina</div>
        <button className="btn btn-primary" onClick={saveAll} disabled={saving}>
          {saving ? 'Salvando…' : saved ? 'Salvo ✓' : 'Salvar metas'}
        </button>
      </div>
      <div className="goals-grid">
        {SUBJECTS.map(s=>(
          <div key={s} className="goal-card">
            <div className="goal-subject" style={{color:SUBJECT_COLORS[s]}}>{SUBJECT_NAMES[s]}</div>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <input id={'goal-'+s} className="goal-input" type="number" min={0} max={100} defaultValue={goals[s]?.target_score||70} />
              <span style={{fontSize:12,color:'var(--muted)'}}>% meta</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function DiscursivasPane() {
  const [list, setList] = useState([]);
  const [subject, setSubject] = useState('LP');
  const [year, setYear] = useState('');
  const [prompt, setPrompt] = useState('');
  const [gabarito, setGabarito] = useState('');
  const [respModal, setRespModal] = useState(null);
  const [responses, setResponses] = useState([]);

  async function load() { setList(await DB.getDiscursivas()||[]); }
  useEffect(()=>{ load(); },[]);

  async function add() {
    if (!prompt.trim()) return alert('Digite o enunciado.');
    await DB.addDiscursiva(subject, parseInt(year)||null, prompt.trim(), gabarito.trim()||null);
    setPrompt(''); setGabarito(''); setYear(''); load();
  }
  async function del(id) {
    if (!confirm('Excluir dissertação e respostas?')) return;
    await DB.deleteDiscursiva(id); load();
  }
  async function viewResp(d) {
    setRespModal(d); setResponses([]);
    const r = await DB.getDiscursivaResponses(d.id)||[];
    setResponses(r);
  }
  async function gradeResp(id) {
    const score = parseInt(document.getElementById('rscore-'+id).value);
    const comment = document.getElementById('rcomment-'+id).value.trim();
    if (isNaN(score)) return alert('Nota inválida.');
    await DB.gradeDiscursiva(id, score, comment||null);
    alert('Nota salva!');
  }

  return (
    <div>
      <div className="card" style={{marginBottom:16}}>
        <div className="card-title">Nova dissertação</div>
        <div className="disc-form-grid">
          <div className="form-group">
            <label className="form-label">Matéria</label>
            <select className="form-input" value={subject} onChange={e=>setSubject(e.target.value)}>
              {SUBJECTS.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Ano</label>
            <input className="form-input" type="number" placeholder="Ex: 2024" value={year} onChange={e=>setYear(e.target.value)} />
          </div>
          <div className="form-group full">
            <label className="form-label">Tema / Enunciado</label>
            <textarea className="form-input" rows={3} value={prompt} onChange={e=>setPrompt(e.target.value)} placeholder="Enunciado da questão…" />
          </div>
          <div className="form-group full">
            <label className="form-label">Gabarito (visível só para admin)</label>
            <textarea className="form-input" rows={3} value={gabarito} onChange={e=>setGabarito(e.target.value)} placeholder="Resposta modelo…" />
          </div>
        </div>
        <button className="btn btn-primary" onClick={add}>+ Adicionar Dissertação</button>
      </div>

      {list.length===0 ? <div className="empty">Nenhuma dissertação cadastrada.</div>
        : list.map(d=>(
          <div key={d.id} className="disc-row">
            <div className="disc-row-body">
              <div className="disc-row-prompt">{d.prompt.slice(0,140)}{d.prompt.length>140?'…':''}</div>
              <div className="disc-row-meta">{d.subject}{d.year?` · ${d.year}`:''}</div>
            </div>
            <button className="btn-sm" style={{color:'var(--accent)',borderColor:'rgba(142,167,255,.3)'}} onClick={()=>viewResp(d)}>Ver respostas</button>
            <button className="btn-icon" onClick={()=>del(d.id)}>✕</button>
          </div>
        ))
      }

      {respModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setRespModal(null)}>
          <div className="modal-box">

function EditalPane() {

  const [code, setCode] = useState('');

  async function load() {
    const t = await DB.getEditalTree()||[];
    setTree(t);
    const flat = [];
    t.forEach(n=>{ flat.push(n); (n.children||[]).forEach(c=>flat.push(c)); });
    setFlatAll(flat);
  }
  useEffect(()=>{ load(); },[]);

  async function add() {
    if (!title.trim()) return alert('Digite o título.');
    await DB.addEditalItem(subject, code||null, title.trim(), parentId||null, 0);

// ANALYTICS TAB
// ══════════════════════════════════════════════════════════════
function AnalyticsTab() {
  const [loading, setLoading] = useState(true);
  const [sessions, setSessions] = useState([]);
  const [retention, setRetention] = useState(null);
  const [heatmap, setHeatmap] = useState([]);
  const chartBar = useRef(null), chartDough = useRef(null), chartBarInst = useRef(null), chartDoughInst = useRef(null);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      const [s, ret, heat] = await Promise.all([
        DB.getAllSessions().catch(()=>[]),
        DB.getRetentionMetrics().catch(()=>null),
        DB.getSubjectHeatmap().catch(()=>[]),
      ]);
      setSessions(s||[]);
      setRetention(ret);
      setHeatmap(heat||[]);
      setLoading(false);
    })();
  },[]);

  useEffect(()=>{
    if (!sessions.length) return;
    chartBarInst.current?.destroy();
    chartDoughInst.current?.destroy();

    const actMap = {};
    sessions.forEach(s=>{ actMap[s.date]=(actMap[s.date]||0)+1; });
    const labels=[], counts=[];
    for(let i=29;i>=0;i--){
      const d=new Date(); d.setDate(d.getDate()-i);
      const k=d.toISOString().split('T')[0];
      labels.push(k.slice(5)); counts.push(actMap[k]||0);
    }
    if(chartBar.current) {
      chartBarInst.current = new Chart(chartBar.current.getContext('2d'),{
        type:'bar', data:{ labels, datasets:[{label:'Sessões',data:counts,backgroundColor:'rgba(142,167,255,.5)',borderColor:'#8ea7ff',borderWidth:1,borderRadius:3}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true},x:{grid:{display:false}}}}
      });
    }
    const fc=sessions.filter(s=>s.type==='flashcard').length;
    const sim=sessions.filter(s=>s.type==='simulado').length;
    if(chartDough.current) {
      chartDoughInst.current = new Chart(chartDough.current.getContext('2d'),{
        type:'doughnut',
        data:{labels:['Flashcards','Simulados'],datasets:[{data:[fc,sim],backgroundColor:['rgba(142,167,255,.7)','rgba(110,231,183,.7)'],borderWidth:1}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{position:'bottom',labels:{font:{size:10}}}}}
      });
    }
    return()=>{ chartBarInst.current?.destroy(); chartDoughInst.current?.destroy(); };
  },[sessions]);

  const total=sessions.length;
  const totalCards=sessions.reduce((a,s)=>a+s.total,0);
  const avg=total>0?Math.round(sessions.reduce((a,s)=>a+(s.correct/s.total*100),0)/total):0;

  return (
    <div>
      <div className="page-title">Analytics</div>
      <div className="page-sub">Métricas de uso da plataforma</div>
      {loading ? <div className="loading-txt">Carregando…</div> : (
        <>
          <div className="metrics-grid" style={{marginBottom:24}}>
            <div className="metric-card"><div className="metric-val">{total}</div><div className="metric-lbl">Sessões totais</div></div>
            <div className="metric-card"><div className="metric-val">{totalCards}</div><div className="metric-lbl">Cards estudados</div></div>
            <div className="metric-card"><div className="metric-val" style={{color:avg>=70?'var(--green)':'var(--yellow)'}}>{avg}%</div><div className="metric-lbl">Acerto médio</div></div>
          </div>
          <div className="charts-row">
            <div className="card">
              <div className="card-title">Sessões últimos 30 dias</div>
              <div className="chart-wrap"><canvas ref={chartBar}></canvas></div>
            </div>
            <div className="card">
              <div className="card-title">Tipo de sessão</div>
              <div className="chart-wrap"><canvas ref={chartDough}></canvas></div>
            </div>
          </div>

          {retention && (
            <div className="card">
              <div className="card-title">Retenção de usuários</div>
              <div style={{marginTop:8}}>
                {[['D1','Dia 1',retention.d1],['D7','Dia 7',retention.d7],['D30','Dia 30',retention.d30]].map(([k,lbl,pct])=>(
                  <div key={k} className="ret-row">
                    <div className="ret-label">{lbl}</div>
                    <div className="ret-bar-wrap">
                      <div className="ret-bar-fill" style={{width:`${pct||0}%`}}></div>
                    </div>
                    <div className="ret-pct">{pct||0}%</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {heatmap.length > 0 && (
            <div className="card">
              <div className="card-title">Acerto por disciplina (heatmap)</div>
              <div style={{marginTop:8}}>
                {heatmap.sort((a,b)=>b.avg_score-a.avg_score).map(h=>(
                  <div key={h.subject} className="heat-row">
                    <div className="heat-label">{h.subject}</div>
                    <div className="heat-bar-wrap">
                      <div className="heat-bar" style={{
                        width:`${h.avg_score||0}%`,
                        background: h.avg_score>=70?'rgba(110,231,183,.6)':h.avg_score>=50?'rgba(250,204,21,.6)':'rgba(248,113,113,.6)'
                      }}></div>
                    </div>
                    <div className="heat-pct">{Math.round(h.avg_score||0)}%</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function BillingTab() {
  const [subs, setSubs] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      const s = await DB.getAllSubscriptions().catch(()=>[]);
      setSubs(s||[]);
      setLoading(false);
    })();
  },[]);

  async function extendSub(userId, days) {
    const sub = subs.find(s=>s.user_id===userId);
    const base = sub?.expires_at ? new Date(sub.expires_at) : new Date();
    base.setDate(base.getDate()+days);
    await DB.setSubscriptionTier(userId, sub?.tier||'premium', base.toISOString().slice(0,10));
    const updated = await DB.getAllSubscriptions().catch(()=>[]);
    setSubs(updated||[]);
  }

  async function cancelSub(userId) {
    await DB.setSubscriptionTier(userId,'free',null);
    const updated = await DB.getAllSubscriptions().catch(()=>[]);
    setSubs(updated||[]);
  }

  const premium = subs.filter(s=>s.tier==='premium').length;
  const elite = subs.filter(s=>s.tier==='elite').length;
  const free = subs.filter(s=>s.tier==='free'||!s.tier).length;
  const mrrEst = premium*29 + elite*59;

  return (
    <div>
      <div className="page-title">Billing</div>
      <div className="page-sub">Gestão de assinaturas e receita estimada</div>

      <div className="billing-cta">
        💳 Configure o Stripe para pagamentos e cobranças automáticas — os dados abaixo são gerenciados manualmente.
      </div>

      <div className="billing-hero">
        <div className="metric-card"><div className="metric-val text-accent">{free}</div><div className="metric-lbl">Free</div></div>
        <div className="metric-card"><div className="metric-val" style={{color:'#facc15'}}>{premium}</div><div className="metric-lbl">Premium</div></div>
        <div className="metric-card"><div className="metric-val" style={{color:'#a855f7'}}>{elite}</div><div className="metric-lbl">Elite</div></div>
        <div className="metric-card"><div className="metric-val text-green">R${mrrEst}</div><div className="metric-lbl">MRR estimado</div></div>
      </div>

      {loading ? <div className="loading-txt">Carregando…</div> : (
        <div className="card" style={{padding:0}}>
          <div className="tbl-wrap">
            <table className="data-tbl">
              <thead><tr><th>Usuário</th><th>E-mail</th><th>Tier</th><th>Expira em</th><th>Status</th><th>Ações</th></tr></thead>
              <tbody>
                {subs.filter(s=>s.tier&&s.tier!=='free').length===0
                  ? <tr><td colSpan={6} style={{textAlign:'center',color:'var(--muted)',padding:24}}>Nenhuma assinatura ativa.</td></tr>
                  : subs.filter(s=>s.tier&&s.tier!=='free').map(s=>(
                    <tr key={s.id}>
                      <td><strong>{s.profiles?.name||'—'}</strong></td>
                      <td style={{fontSize:12,color:'var(--muted)'}}>{s.profiles?.email||s.email||'—'}</td>
                      <td>{tierBadge(s.tier)}</td>
                      <td style={{fontSize:12}}>{fmtDate(s.expires_at)||'—'}</td>
                      <td><span className={`badge ${s.status==='active'?'badge-ok':'badge-err'}`}>{s.status||'—'}</span></td>
                      <td>
                        <div className="gap8">
                          <button className="btn-sm" onClick={()=>extendSub(s.user_id,30)}>+30d</button>
                          <button className="btn-sm" onClick={()=>extendSub(s.user_id,365)}>+1 ano</button>
                          <button className="btn-sm btn-danger" onClick={()=>cancelSub(s.user_id)}>Cancelar</button>
                        </div>
                      </td>
                    </tr>
                  ))
                }
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

  useEffect(()=>{

      setLoading(true);
