<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gramática C2 — Atlas Diplomático</title>
<link rel="stylesheet" href="theme.css"/>
<script src="icons.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<style>
:root{
  --bg:#0f1115;--surface:#171a21;--card:rgba(255,255,255,0.04);
  --border:#2a2f3a;--text:#e5e7eb;--muted:#9ca3af;--muted2:#6b7280;
  --gold:#d4af37;--green:#34d399;--amber:#f59e0b;--red:#f87171;--blue:#60a5fa;
  --pt:#a78bfa;--en:#60a5fa;--es:#4ade80;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono','SF Mono','Courier New',monospace;min-height:100vh}

nav{position:sticky;top:0;z-index:200;height:52px;background:#000;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;padding:0 16px;gap:2px;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nav-logo{font-size:13px;font-weight:900;letter-spacing:2.5px;margin-right:14px;white-space:nowrap;flex-shrink:0;color:#fff}
.nav-logo span{text-decoration:underline}
nav a{color:#888;text-decoration:none;font-size:11px;font-weight:600;padding:5px 9px;border-radius:6px;transition:.15s;white-space:nowrap;flex-shrink:0}
nav a:hover{color:#fff;background:rgba(255,255,255,0.06)}
nav a.active{color:var(--gold);border-bottom:2px solid var(--gold);border-radius:0;padding-bottom:3px}
.nav-ham{background:none;border:none;color:#888;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px;flex-shrink:0;margin-right:4px}
.nav-ham:hover{color:#fff;background:rgba(255,255,255,.07)}
.nav-spacer{flex:1;min-width:8px}
.nav-cd{font-size:11px;font-weight:700;color:#f5e642;background:rgba(245,230,66,.1);border:1px solid rgba(245,230,66,.25);padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.nav-user{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-left:6px;color:#888}

.layout{display:grid;grid-template-columns:260px 1fr 240px;gap:0;min-height:calc(100vh - 52px)}
@media(max-width:1100px){.layout{grid-template-columns:220px 1fr}.panel-progress{display:none}}
@media(max-width:700px){.layout{grid-template-columns:1fr}.topic-sidebar{display:none}}

.topic-sidebar{border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;height:calc(100vh - 52px);position:sticky;top:52px}
.lang-tabs{display:flex;gap:4px;padding:0 12px 12px;border-bottom:1px solid var(--border);margin-bottom:8px}
.lang-tab{flex:1;padding:7px 4px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.5px;transition:.15s}
.lang-tab[data-lang="pt"].active{background:rgba(167,139,250,.12);border-color:var(--pt);color:var(--pt)}
.lang-tab[data-lang="en"].active{background:rgba(96,165,250,.12);border-color:var(--en);color:var(--en)}
.lang-tab[data-lang="es"].active{background:rgba(74,222,128,.12);border-color:var(--es);color:var(--es)}
.cat-group{margin-bottom:2px}
.cat-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted2);padding:10px 16px 4px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.cat-label:hover{color:var(--muted)}
.cat-chevron{transition:.2s;opacity:.5;font-size:9px}
.cat-group.collapsed .cat-chevron{transform:rotate(-90deg)}
.cat-items{overflow:hidden}
.cat-group.collapsed .cat-items{display:none}
.topic-link{display:flex;align-items:center;gap:8px;padding:6px 16px 6px 24px;font-size:12px;color:var(--muted);cursor:pointer;transition:.12s;border-left:2px solid transparent}
.topic-link:hover{color:var(--text);background:rgba(255,255,255,.03)}
.topic-link.active{color:var(--gold);border-left-color:var(--gold);background:rgba(212,175,55,.05)}
.topic-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--border)}
.topic-dot.green{background:var(--green)}
.topic-dot.amber{background:var(--amber)}
.topic-dot.red{background:var(--red)}

.main-content{padding:28px 32px;overflow-y:auto;min-width:0}
.lang-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle}
.lang-badge.pt{background:rgba(167,139,250,.15);color:var(--pt)}
.lang-badge.en{background:rgba(96,165,250,.15);color:var(--en)}
.lang-badge.es{background:rgba(74,222,128,.15);color:var(--es)}

.view{display:none}
.view.active{display:block}

.theory-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px;line-height:1.75;font-size:14px;white-space:pre-wrap}
.theory-examples{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.theory-examples h3{font-size:11px;color:var(--muted2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.ex-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:13px;line-height:1.6}

.quiz-progress-bar{height:3px;background:var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:.3s}
.quiz-counter{font-size:11px;color:var(--muted2);margin-bottom:12px}
.question-text{font-size:15px;font-weight:700;line-height:1.65;margin-bottom:18px}
.options{display:flex;flex-direction:column;gap:8px}
.opt-btn{padding:12px 16px;border-radius:9px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;text-align:left;transition:.15s;line-height:1.5}
.opt-btn:hover:not(:disabled){border-color:var(--gold);background:rgba(212,175,55,.06)}
.opt-btn.correct{border-color:var(--green);background:rgba(52,211,153,.08);color:var(--green)}
.opt-btn.wrong{border-color:var(--red);background:rgba(248,113,113,.08);color:var(--red)}
.opt-btn:disabled{cursor:default}
.feedback-box{margin-top:14px;padding:14px;border-radius:8px;font-size:13px;line-height:1.6;background:rgba(255,255,255,.03);border:1px solid var(--border)}

.result-score{text-align:center;padding:28px 0 20px}
.score-num{font-size:56px;font-weight:900;line-height:1}
.score-label{font-size:12px;color:var(--muted2);margin-top:6px;letter-spacing:.5px}
.result-list{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.result-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.result-item.ok{border-color:rgba(52,211,153,.3)}
.result-item.fail{border-color:rgba(248,113,113,.3)}
.result-item-q{font-size:13px;font-weight:700;margin-bottom:6px}
.result-item-exp{font-size:12px;color:var(--muted);line-height:1.6}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted2)}
.empty-state h2{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--muted)}
.empty-state p{font-size:13px;line-height:1.6}

.btn{padding:10px 20px;border-radius:9px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:.15s}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover{filter:brightness(1.1)}
.btn-gold:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-ghost:hover{color:#fff;border-color:var(--muted)}
.btn-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.loading{display:flex;align-items:center;gap:10px;color:var(--muted2);font-size:13px;padding:24px 0}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{color:var(--red);font-size:13px;padding:14px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);border-radius:8px;margin-top:12px}

.panel-progress{border-left:1px solid var(--border);padding:16px;overflow-y:auto;height:calc(100vh - 52px);position:sticky;top:52px}
.panel-progress h2{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted2);text-transform:uppercase;margin-bottom:14px}
.xp-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;text-align:center}
.xp-lang{font-size:10px;color:var(--muted2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.xp-val{font-size:22px;font-weight:900}
.xp-level{font-size:11px;color:var(--muted2);margin-top:3px}
.xp-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.xp-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:.4s}
.streak-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.streak-num{font-size:28px;font-weight:900;color:var(--amber)}
.streak-label{font-size:12px;color:var(--muted2)}
.heatmap-title{font-size:10px;color:var(--muted2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.heatmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(10px,1fr));gap:3px}
.hm-cell{width:10px;height:10px;border-radius:2px;background:var(--border)}
.hm-cell.green{background:var(--green);opacity:.8}
.hm-cell.amber{background:var(--amber);opacity:.8}
.hm-cell.red{background:var(--red);opacity:.7}
</style>
</head>
<body>

<nav>
  <button class="nav-ham" onclick="openSidebar()">☰</button>
  <span class="nav-logo">ATLAS <span>DIPL.</span></span>
  <a href="/gramatica.html" class="active">Gramática C2</a>
  <div class="nav-spacer"></div>
  <div class="nav-cd" id="navCountdown">—</div>
  <div class="nav-user" id="navUser">?</div>
</nav>

<aside id="sidebar"></aside>
<script src="_sidebar.js"></script>

<div class="layout">
  <div class="topic-sidebar">
    <div class="lang-tabs">
      <button class="lang-tab active" data-lang="pt" onclick="setLang('pt')">PT</button>
      <button class="lang-tab" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-tab" data-lang="es" onclick="setLang('es')">ES</button>
    </div>
    <div id="topicTree"></div>
  </div>

  <div class="main-content">
    <div id="viewEmpty" class="view active">
      <div class="empty-state">
        <h2>Selecione um tópico</h2>
        <p>Escolha um idioma e um tópico gramatical na barra lateral para começar o estudo em nível C2.</p>
      </div>
    </div>

    <div id="viewLoading" class="view">
      <div class="loading"><div class="spinner"></div><span id="loadingMsg">Gerando conteúdo…</span></div>
    </div>

    <div id="viewTheory" class="view">
      <div style="margin-bottom:20px">
        <h1 id="theoryTitle" style="font-size:20px;font-weight:800;letter-spacing:.5px">—</h1>
      </div>
      <div class="theory-box" id="theoryContent"></div>
      <div id="theoryExamplesWrap" style="display:none">
        <div class="theory-examples">
          <h3>Exemplos</h3>
          <div id="examplesList"></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-gold" onclick="startQuiz()">Iniciar Quiz C2 →</button>
      </div>
    </div>

    <div id="viewQuiz" class="view">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizFill" style="width:0%"></div></div>
      <div class="quiz-counter" id="quizCounter">Questão 1 de 5</div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
      <div class="feedback-box" id="feedbackBox" style="display:none"></div>
      <div class="btn-row" id="nextBtnRow" style="display:none">
        <button class="btn btn-gold" id="nextBtn" onclick="nextQuestion()">Próxima →</button>
      </div>
    </div>

    <div id="viewResult" class="view">
      <div class="result-score">
        <div class="score-num" id="resultScore">—</div>
        <div class="score-label">de 5 questões corretas</div>
      </div>
      <div class="result-list" id="resultList"></div>
      <div class="btn-row" style="margin-top:24px;justify-content:center">
        <button class="btn btn-ghost" onclick="showTheory()">← Rever Teoria</button>
        <button class="btn btn-gold" onclick="loadQuiz()">Refazer Quiz</button>
      </div>
    </div>

    <div id="viewErr" class="view">
      <div class="err" id="errMsg"></div>
      <div class="btn-row"><button class="btn btn-ghost" onclick="showEmpty()">← Voltar</button></div>
    </div>
  </div>

  <div class="panel-progress">
    <h2>Progresso</h2>
    <div class="xp-block">
      <div class="xp-lang" id="xpLangLabel">PT</div>
      <div class="xp-val" id="xpVal">0 XP</div>
      <div class="xp-level" id="xpLevel">Iniciante</div>
      <div class="xp-bar"><div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div></div>
    </div>
    <div class="streak-block">
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-label">dias<br>seguidos</div>
    </div>
    <div class="heatmap-title">Mapa de Tópicos</div>
    <div class="heatmap-grid" id="heatmapGrid"></div>
  </div>
</div>

<script>
const TOPICS = {
  // ── PORTUGUÊS (baseado no índice completo do livro de gramática CACD) ──
  pt: [
    { cat: 'Ortografia e Uso do Hífen', items: [
      'Uso do hífen: quando permanece (pós-Acordo 1990)',
      'Uso do hífen: quando passa a existir',
      'Uso do hífen: quando não se usa mais',
      'Uso do apóstrofo',
      'Regras de divisão silábica',
    ]},
    { cat: 'Acentuação Gráfica', items: [
      'Proparoxítonas',
      'Ditongos abertos tônicos',
      'Monossílabas tônicas',
      'Oxítonas',
      'Paroxítonas',
      'Acentos diferenciais: facultativos e obrigatórios',
      'Acentos suprimidos pelo Acordo de 1990',
      'Acentuação de vogais tônicas em hiatos (i/u, o/e dobrados)',
      'Verbos arguir, redarguir, aguar, delinquir e afins',
    ]},
    { cat: 'Pontuação', items: [
      'Vírgula: funções entre termos e entre orações',
      'Ponto e vírgula: funções',
      'Dois-pontos: funções',
      'Reticências: funções',
      'Travessão: funções',
      'Parênteses: funções',
      'Aspas: funções',
      'Ponto final: funções e casos especiais',
    ]},
    { cat: 'Substantivo', items: [
      'Classificação: abstrato, concreto, simples, composto, comum, próprio',
      'Flexão de gênero do substantivo',
      'Flexão de número: substantivo simples',
      'Flexão de número: substantivo composto',
      'Flexão de grau do substantivo',
    ]},
    { cat: 'Adjetivo', items: [
      'Flexão de gênero e número: adjetivo simples',
      'Flexão de gênero e número: adjetivo composto',
      'Grau superlativo absoluto',
      'Grau superlativo relativo',
      'Grau comparativo',
    ]},
    { cat: 'Artigo, Numeral e Interjeição', items: [
      'Artigo definido: empregos e omissões',
      'Artigo indefinido: empregos e omissões',
      'Numeral: classificação e emprego',
      'Interjeição: classificação e emprego',
    ]},
    { cat: 'Pronome', items: [
      'Funções do pronome oblíquo "se"',
      'Emprego dos pronomes retos e oblíquos',
      'Emprego dos pronomes demonstrativos e relativos',
      'Emprego dos pronomes de tratamento',
      'Emprego dos pronomes indefinidos',
      'Posicionamento dos pronomes oblíquos (próclise, ênclise, mesóclise)',
      'Pronomes oblíquos e locuções verbais',
    ]},
    { cat: 'Verbo', items: [
      'Estrutura do verbo: radical, vogal temática, terminação',
      'Verbos regulares, irregulares, defectivos, anômalos e abundantes',
      'Modo indicativo: tempos e empregos',
      'Modo subjuntivo: tempos e empregos',
      'Modo imperativo: afirmativo e negativo',
      'Formas nominais: infinitivo, gerúndio, particípio',
      'Vozes verbais: ativa, passiva, reflexiva',
      'Flexão de verbos importantes: ser, estar, ter, haver',
    ]},
    { cat: 'Advérbio, Preposição e Conjunção', items: [
      'Advérbio: classificação e emprego',
      'Preposição: classificação e regências',
      'Conjunções coordenativas: classificação e emprego',
      'Conjunções subordinativas: classificação e emprego',
    ]},
    { cat: 'Formação de Palavras', items: [
      'Elementos mórficos do verbo: radical, vogal temática, desinências, prefixo',
      'Elementos mórficos do nome: radical, sufixo, vogal de ligação, consoante de ligação',
      'Derivação: prefixal, sufixal, parassintética, regressiva, imprópria',

      'Objeto direto e objeto indireto',
      'Predicativo do sujeito e do objeto',
      'Adjunto adverbial e complemento nominal',
      'Adjunto adnominal, agente da passiva, aposto e vocativo',
      'Orações coordenadas: classificação',

      'Concordância com sujeito oracional e oração sem sujeito',

    { cat: 'Concordância Nominal', items: [

    { cat: 'Regência', items: [

    { cat: 'Crase', items: [

    ]},
    { cat: 'Variação e Funções da Linguagem', items: [

      'Variação fonológica, morfológica, sintática e lexical',
      'Denotação e conotação',
      'Gêneros textuais: narrativo, descritivo, dissertativo',

  ],

  // ── INGLÊS (baseado no índice completo do livro de gramática CACD) ──

    { cat: 'Nouns', items: [
      'Plural of nouns: regular and irregular',
      'Collective nouns',
      'Compound nouns and their plurals',
      'Countable and uncountable nouns',
      'Many/much, few/less, a lot: quantifiers',
      'Gender of nouns',
      'Genitive case (possessive s)',
      'One/ones/some as noun substitutes',
    ]},
    { cat: 'Articles', items: [
      'Indefinite articles: a/an — uses and omissions',
      'Definite article: the — uses and omissions',
      'Zero article: when no article is used',
    ]},
    { cat: 'Numerals & Time', items: [
      'Cardinal and ordinal numerals',
      'Fractions, decimals and mathematical symbols',
      'Expressing time and dates formally',
    ]},
    { cat: 'Pronouns', items: [
      'Personal pronouns: subject and object',
      'Possessive pronouns and adjectives',
      'Reflexive pronouns',
      'Demonstrative pronouns',
      'Indefinite pronouns: some, any, no, every compounds',
      'Either/neither as pronouns',
      'Ever-words: whatever, whoever, whichever',
      'Relative pronouns and relative clauses',
      'Impersonal pronouns: it, there, one',

const XP_LEVELS = [
  { label: 'Iniciante', max: 200 },
  { label: 'Básico', max: 500 },
  { label: 'Intermediário', max: 1000 },
  { label: 'Avançado', max: 2000 },
  { label: 'Expert', max: Infinity },
];

let currentLang = 'pt';
let currentTopic = null;
let theoryData = null;
let quizData = null;
let quizIdx = 0;
let quizAnswers = [];
let progressMap = {};
let userId = null;
let streakDays = 0;

document.addEventListener('DOMContentLoaded', async () => {
  await waitForDB();
  const { data: { user } } = await _sb.auth.getUser();
  if (!user) { window.location.href = '/index.html'; return; }
  userId = user.id;

  const profile = await DB.getProfile?.().catch(() => null);
  const initials = (profile?.full_name || user.email || '?').charAt(0).toUpperCase();
  document.getElementById('navUser').textContent = initials;

  updateCountdown();
  await loadProgress();
  renderTopicTree();
  renderProgressPanel();
});

function waitForDB() {
  return new Promise(resolve => {
    if (typeof _sb !== 'undefined') return resolve();
    const t = setInterval(() => { if (typeof _sb !== 'undefined') { clearInterval(t); resolve(); } }, 100);
  });
}

function updateCountdown() {
  const target = new Date('2026-03-01');
  const diff = Math.ceil((target - new Date()) / 86400000);
  const el = document.getElementById('navCountdown');
  if (el) el.textContent = diff > 0 ? `${diff}d CACD` : 'CACD';
}

async function loadProgress() {
  if (!userId) return;
  const { data } = await _sb.from('gramatica_progress').select('*').eq('user_id', userId);
  if (!data) return;
  progressMap = {};
  data.forEach(r => {
    progressMap[`${r.idioma}::${r.topico}`] = { acertos: r.acertos, total: r.total, xp: r.xp_gained, ultima: r.ultima_sessao };
  });

  const dates = [...new Set(data.map(r => r.ultima_sessao?.slice(0, 10)))].sort().reverse();
  let streak = 0;
  const today = new Date().toISOString().slice(0, 10);
  let check = today;
  for (const d of dates) {
    if (d === check) { streak++; check = prevDay(check); }
    else if (d < check) break;
  }
  streakDays = streak;
}

function prevDay(dateStr) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}

function renderTopicTree() {
  const tree = document.getElementById('topicTree');
  tree.innerHTML = '';
  TOPICS[currentLang].forEach(({ cat, items }) => {
    const group = document.createElement('div');
    group.className = 'cat-group';
    group.innerHTML = `<div class="cat-label" onclick="toggleCat(this)">${cat}<span class="cat-chevron">▾</span></div><div class="cat-items"></div>`;
    const itemsEl = group.querySelector('.cat-items');
    items.forEach(item => {
      const key = `${currentLang}::${item}`;
      const prog = progressMap[key];
      let dotClass = '';
      if (prog && prog.total > 0) {
        const pct = prog.acertos / prog.total;
        dotClass = pct >= 0.75 ? 'green' : pct >= 0.5 ? 'amber' : 'red';
      }
      const link = document.createElement('div');
      link.className = 'topic-link' + (currentTopic === item ? ' active' : '');
      link.innerHTML = `<span class="topic-dot ${dotClass}"></span>${item}`;
      link.onclick = () => selectTopic(item);
      itemsEl.appendChild(link);
    });
    tree.appendChild(group);
  });
}

function toggleCat(el) {
  el.closest('.cat-group').classList.toggle('collapsed');
}

function setLang(lang) {
  currentLang = lang;
  currentTopic = null;
  theoryData = null;
  quizData = null;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
  renderTopicTree();
  updateXPPanel();
  showEmpty();
}

async function selectTopic(topic) {
  currentTopic = topic;
  renderTopicTree();
  await loadTheory();
}

async function loadTheory() {
  showView('viewLoading');
  document.getElementById('loadingMsg').textContent = 'Gerando teoria C2…';
  try {
    const res = await fetch('/api/tutor-generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: 'GRAMATICA_TEORIA', idioma: currentLang, topico: currentTopic }),
    });
    if (!res.ok) throw new Error((await res.json()).error || 'Erro na API');
    const json = await res.json();
    theoryData = json.exercise || json;
    showTheory();
  } catch (e) {
    showErr(e.message);
  }
}

function showTheory() {
  if (!theoryData) { showEmpty(); return; }
  const badge = `<span class="lang-badge ${currentLang}">${currentLang.toUpperCase()} C2</span>`;
  document.getElementById('theoryTitle').innerHTML = currentTopic + badge;
  document.getElementById('theoryContent').textContent = theoryData.conteudo || '';
  const exList = document.getElementById('examplesList');
  const exWrap = document.getElementById('theoryExamplesWrap');
  if (theoryData.exemplos?.length) {
    exList.innerHTML = theoryData.exemplos.map(e => `<div class="ex-item">${e}</div>`).join('');
    exWrap.style.display = '';
  } else {
    exWrap.style.display = 'none';
  }
  showView('viewTheory');
}

async function loadQuiz() {
  showView('viewLoading');
  document.getElementById('loadingMsg').textContent = 'Gerando quiz C2…';
  try {
    const res = await fetch('/api/tutor-generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: 'GRAMATICA_QUIZ', idioma: currentLang, topico: currentTopic }),
    });
    if (!res.ok) throw new Error((await res.json()).error || 'Erro na API');
    const json = await res.json();
    quizData = json.exercise || json;
    quizIdx = 0;
    quizAnswers = [];
    renderQuestion();
    showView('viewQuiz');
  } catch (e) {
    showErr(e.message);
  }
}

function startQuiz() {
  if (!quizData?.questoes?.length) { loadQuiz(); return; }
  quizIdx = 0;
  quizAnswers = [];
  renderQuestion();
  showView('viewQuiz');
}

function renderQuestion() {
  const q = quizData.questoes[quizIdx];
  const total = quizData.questoes.length;
  document.getElementById('quizFill').style.width = `${(quizIdx / total) * 100}%`;
  document.getElementById('quizCounter').textContent = `Questão ${quizIdx + 1} de ${total}`;
  document.getElementById('questionText').textContent = q.enunciado;
  document.getElementById('feedbackBox').style.display = 'none';
  document.getElementById('nextBtnRow').style.display = 'none';
  const opts = document.getElementById('optionsContainer');
  opts.innerHTML = '';
  q.opcoes.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => answerQuestion(i, q.correta, q.explicacao);
    opts.appendChild(btn);
  });
}

function answerQuestion(chosen, correct, explanation) {
  document.querySelectorAll('.opt-btn').forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    else if (i === chosen && chosen !== correct) b.classList.add('wrong');
  });
  const isCorrect = chosen === correct;
  quizAnswers.push({ correct: isCorrect, explanation, enunciado: quizData.questoes[quizIdx].enunciado });

  const fb = document.getElementById('feedbackBox');
  fb.style.display = '';
  fb.style.borderColor = isCorrect ? 'rgba(52,211,153,.3)' : 'rgba(248,113,113,.3)';
  fb.innerHTML = `<strong style="color:${isCorrect ? 'var(--green)' : 'var(--red)'}">${isCorrect ? '✓ Correto' : '✗ Incorreto'}</strong><br>${explanation}`;

  const isLast = quizIdx === quizData.questoes.length - 1;
  document.getElementById('nextBtnRow').style.display = '';
  document.getElementById('nextBtn').textContent = isLast ? 'Ver Resultado →' : 'Próxima →';
}

function nextQuestion() {
  quizIdx++;
  if (quizIdx >= quizData.questoes.length) { showResult(); return; }
  renderQuestion();
}

async function showResult() {
  const acertos = quizAnswers.filter(a => a.correct).length;
  const scoreEl = document.getElementById('resultScore');
  scoreEl.textContent = `${acertos}/5`;
  scoreEl.style.color = acertos >= 4 ? 'var(--green)' : acertos >= 3 ? 'var(--amber)' : 'var(--red)';
  document.getElementById('resultList').innerHTML = quizAnswers.map((a, i) => `
    <div class="result-item ${a.correct ? 'ok' : 'fail'}">
      <div class="result-item-q">${i + 1}. ${a.enunciado}</div>
      <div class="result-item-exp">${a.explanation}</div>
    </div>`).join('');
  showView('viewResult');
  await saveProgress(acertos, 5);
}

async function saveProgress(acertos, total) {
  if (!userId || !currentTopic) return;
  const key = `${currentLang}::${currentTopic}`;
  const prev = progressMap[key] || { acertos: 0, total: 0, xp: 0 };
  const newAcertos = prev.acertos + acertos;
  const newTotal = prev.total + total;
  const newXP = prev.xp + (acertos * 10);
  progressMap[key] = { acertos: newAcertos, total: newTotal, xp: newXP, ultima: new Date().toISOString() };

  await _sb.from('gramatica_progress').upsert({
    user_id: userId,
    idioma: currentLang,
    topico: currentTopic,
    acertos: newAcertos,
    total: newTotal,
    xp_gained: newXP,
    ultima_sessao: new Date().toISOString(),
  }, { onConflict: 'user_id,idioma,topico' });

  const today = new Date().toISOString().slice(0, 10);
  const hadToday = Object.values(progressMap).some(p => p.ultima?.slice(0, 10) === today);
  if (hadToday && streakDays === 0) streakDays = 1;

  renderTopicTree();
  renderProgressPanel();
}

function renderProgressPanel() {
  updateXPPanel();
  document.getElementById('streakNum').textContent = streakDays;
  renderHeatmap();
}

function updateXPPanel() {
  const totalXP = Object.keys(progressMap)
    .filter(k => k.startsWith(currentLang + '::'))
    .reduce((s, k) => s + (progressMap[k].xp || 0), 0);
  document.getElementById('xpVal').textContent = `${totalXP} XP`;
  document.getElementById('xpLangLabel').textContent = currentLang.toUpperCase();
  let lvl = XP_LEVELS[XP_LEVELS.length - 1];
  let prevMax = 0;
  for (const l of XP_LEVELS) {
    if (totalXP < l.max) { lvl = l; break; }
    prevMax = l.max;
  }
  document.getElementById('xpLevel').textContent = lvl.label;
  const pct = lvl.max === Infinity ? 100 : Math.min(100, ((totalXP - prevMax) / (lvl.max - prevMax)) * 100);
  document.getElementById('xpBarFill').style.width = pct + '%';
}

function renderHeatmap() {
  const grid = document.getElementById('heatmapGrid');
  grid.innerHTML = '';
  TOPICS[currentLang].flatMap(g => g.items).forEach(t => {
    const prog = progressMap[`${currentLang}::${t}`];
    const cell = document.createElement('div');
    cell.className = 'hm-cell';
    cell.title = t;
    if (prog && prog.total > 0) {
      const pct = prog.acertos / prog.total;
      cell.classList.add(pct >= 0.75 ? 'green' : pct >= 0.5 ? 'amber' : 'red');
    }
    grid.appendChild(cell);
  });
}

function showView(id) {
  ['viewEmpty','viewLoading','viewTheory','viewQuiz','viewResult','viewErr'].forEach(v => {
    document.getElementById(v).classList.toggle('active', v === id);
  });
}
function showEmpty() { currentTopic = null; renderTopicTree(); showView('viewEmpty'); }
function showErr(msg) { document.getElementById('errMsg').textContent = msg; showView('viewErr'); }
</script>
