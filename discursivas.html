<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discursivas — Atlas Diplomático</title>
  <link rel="stylesheet" href="theme.css" />
  <script src="icons.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0f1115; --card:rgba(255,255,255,0.04); --border:#2a2f3a;
      --text:#e5e7eb; --muted:#9ca3af; --accent:#d4af37;
      --green:#34d399; --red:#f87171;
    }
    body { background:var(--bg); color:var(--text); font-family:Inter,sans-serif; min-height:100vh; }
    .grid-bg { position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
      background-size:40px 40px; }

    nav { position:sticky; top:0; z-index:200; height:52px; background:#000;
      border-bottom:1px solid rgba(255,255,255,0.07); display:flex; align-items:center;
      padding:0 16px; gap:2px; overflow-x:auto; scrollbar-width:none; }
    nav::-webkit-scrollbar { display:none; }
    .nav-logo { font-size:13px; font-weight:900; letter-spacing:2.5px; margin-right:14px;
      white-space:nowrap; flex-shrink:0; color:#fff; }
    .nav-logo span{color:#fff;text-decoration:underline}
    nav a { color:#888; text-decoration:none; font-size:11px; font-weight:600;
      padding:5px 9px; border-radius:6px; transition:.15s; white-space:nowrap;
      display:flex; align-items:center; gap:4px; flex-shrink:0; letter-spacing:.3px; }
    nav a:hover { color:#fff; background:rgba(255,255,255,0.06); }
    nav a.active{color:#d4af37;border-bottom:2px solid #d4af37;border-radius:0;padding-bottom:3px}
    .nav-spacer { flex:1; min-width:8px; }
    .nav-cd { font-size:11px; font-weight:700; color:#f5e642; background:rgba(245,230,66,.1);
      border:1px solid rgba(245,230,66,.25); padding:3px 10px; border-radius:20px;
      white-space:nowrap; flex-shrink:0; }
    .nav-user { width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.1);
      display:flex; align-items:center; justify-content:center; font-size:11px;
      font-weight:700; flex-shrink:0; margin-left:6px; color:#888; }

    main { position:relative; z-index:1; max-width:800px; margin:0 auto; padding:32px 24px; }

    .view { display:none; }
    .view.active { display:flex; flex-direction:column; align-items:center; }

    #viewLoader { gap:20px; text-align:center; }
    .loader-title { font-size:28px; font-weight:700; letter-spacing:1px; }
    .loader-sub { color:var(--muted); font-size:14px; }
    .file-browser { width:100%; max-width:640px; display:flex; flex-direction:column; gap:8px; }
    .fb-loading, .fb-empty { color:var(--muted); font-size:14px; padding:24px; text-align:center; }
    .fb-subject { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .fb-subject-header { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; transition:.15s; user-select:none; }
    .fb-subject-header:hover { background:rgba(255,255,255,.04); }
    .fb-subject-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .fb-subject-name { font-size:13px; font-weight:600; color:#e8e8e8; flex:1; }
    .fb-subject-count { font-size:11px; color:var(--muted); background:rgba(255,255,255,.08); padding:2px 8px; border-radius:10px; }
    .fb-chevron { font-size:12px; color:var(--muted); transition:transform .2s; }
    .fb-subject.collapsed .fb-chevron { transform:rotate(-90deg); }
    .fb-subject.collapsed .fb-subject-files { display:none; }
    .fb-subject-files { border-top:1px solid var(--border); }
    .fb-file-row { display:flex; align-items:center; padding:10px 16px 10px 34px; cursor:pointer; transition:.15s; gap:10px; }
    .fb-file-row:hover { background:rgba(255,255,255,.04); }
    .fb-file-name { flex:1; font-size:13px; color:#aaa; }
    .fb-file-row:hover .fb-file-name { color:#e8e8e8; }
    .fb-file-arrow { font-size:12px; color:var(--muted); }
    .fb-file-row:hover .fb-file-arrow { color:var(--accent); }

    .btn {
      padding:12px 28px; border-radius:12px; font-size:14px; font-weight:600;
      cursor:pointer; border:none; transition:0.2s; font-family:inherit;
    }
    .btn-primary { background:var(--accent); color:#0f1117; }
    .btn-primary:hover { opacity:0.85; }
    .btn-secondary { background:rgba(255,255,255,0.07); color:var(--text); border:1px solid var(--border); }
    .btn-secondary:hover { background:rgba(255,255,255,0.12); }
    .btn-small { padding:8px 18px; font-size:13px; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }

    /* ===== STUDY VIEW ===== */
    #viewStudy { gap:14px; width:100%; max-width:1180px; }
    .study-header { width:100%; display:flex; align-items:center; gap:12px; }
    .study-cat-name { font-size:13px; color:var(--muted); font-weight:500; }
    .study-spacer { flex:1; }
    .study-counter { font-size:13px; color:var(--muted); }
    .study-timer { font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; }
    .study-exit { background:none; border:1px solid var(--border); color:var(--muted);
      padding:5px 12px; border-radius:8px; font-size:12px; cursor:pointer; font-family:inherit; }
    .study-exit:hover { color:var(--text); border-color:rgba(255,255,255,0.3); }
    .progress-bar { width:100%; height:5px; background:rgba(255,255,255,0.07); border-radius:20px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--accent); border-radius:20px; transition:width 0.4s ease; }

    .dg-question { background:var(--card); border:1px solid var(--border); border-radius:16px;
      padding:18px 22px; width:100%; font-size:15px; line-height:1.5; }
    .dg-question-label { font-size:11px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px; }

    /* two-column layout: answer input (left) + reference/feedback (right), side by side */
    .study-columns { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:14px; align-items:start; }
    @media (max-width:900px) { .study-columns { grid-template-columns:1fr; } }
    .study-col { display:flex; flex-direction:column; gap:12px; min-width:0; }

    .dg-answer-box { width:100%; }
    .dg-textarea { width:100%; min-height:220px; background:rgba(255,255,255,0.04); border:1px solid var(--border);
      border-radius:12px; padding:14px 16px; color:var(--text); font-family:inherit; font-size:14px;
      line-height:1.5; resize:vertical; }
    .dg-textarea:focus { outline:none; border-color:var(--accent); }
    .dg-textarea:disabled { opacity:.7; }

    .result-box { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; font-size:13px; line-height:1.5; max-height:140px; overflow-y:auto; }
    .result-box-label { font-size:11px; color:var(--muted); letter-spacing:1.2px; text-transform:uppercase; margin-bottom:6px; }

    .dg-feedback { width:100%; border-radius:14px; padding:14px 18px; display:flex; flex-direction:column; gap:8px; max-height:340px; overflow-y:auto; }
    .dg-feedback.good { background:rgba(110,231,183,0.1); border:1px solid rgba(110,231,183,0.3); }
    .dg-feedback.bad { background:rgba(248,113,113,0.1); border:1px solid rgba(248,113,113,0.3); }
    .dg-score-row { display:flex; align-items:center; gap:14px; }
    .dg-score { font-size:22px; font-weight:700; }
    .dg-score-pct { font-size:13px; color:var(--muted); }
    .dg-feedback-text { font-size:13px; color:var(--text); line-height:1.4; }
    .points-list { font-size:12px; line-height:1.5; }
    .points-list ul { padding-left:16px; margin-top:2px; }
    .points-correct { color:var(--green); }
    .points-missing { color:#f5e642; }
    .points-errors { color:var(--red); }

    .opt-btns { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }

    /* ===== OPTIONS VIEW ===== */
    #viewOptions { gap:16px; text-align:center; width:100%; max-width:480px; }
    .opt-title { font-size:22px; font-weight:700; }
    .opt-sub { color:var(--muted); font-size:14px; }
    .opt-grid { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin:8px 0; width:100%; }
    .opt-box { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 22px; min-width:100px; flex:1; }
    .opt-val { font-size:26px; font-weight:700; }
    .opt-lbl { font-size:11px; color:var(--muted); margin-top:2px; }
    .resume-inline { display:none; width:100%; margin-bottom:4px; padding:14px 20px;
      background:#1a1d24; border:1px solid var(--accent); border-radius:12px; text-align:center; }
    .resume-msg { font-size:13px; color:var(--muted); margin-bottom:10px; line-height:1.5; }
    .resume-reset { background:transparent; color:var(--muted); border:1px solid var(--border);
      padding:8px 16px; border-radius:8px; font-size:12px; cursor:pointer; font-family:inherit; }
    .resume-reset:hover { color:var(--text); }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <nav>
    <div class="nav-logo">ATLAS <span>DIPL.</span></div>
    <a href="index.html">Início</a>
    <a href="flashcards.html">Flashcards</a>
    <a href="digitar.html">Digitar</a>
    <a href="discursivas.html" class="active">Discursivas</a>
    <a href="espiral.html">Espiral</a>
    <a href="analise.html">Análise</a>
    <div class="nav-spacer"></div>
    <div class="nav-cd" id="navCountdown"></div>
    <div class="nav-user" id="navUser">?</div>
  </nav>

  <main>
    <div class="view active" id="viewLoader">
      <div class="loader-title">PERGUNTAS DISCURSIVAS</div>
      <div class="loader-sub">Responda com suas palavras — a IA avalia o conteúdo, não o texto exato</div>
      <div class="file-browser" id="fileBrowser">
        <div class="fb-loading">Carregando decks...</div>
      </div>
    </div>

    <div class="view" id="viewOptions">
      <div class="opt-title" id="optTitle"></div>
      <div class="opt-sub" id="optSub"></div>
      <div class="opt-grid">
        <div class="opt-box"><div class="opt-val" id="optTotal"></div><div class="opt-lbl">Perguntas</div></div>
      </div>
      <div class="resume-inline" id="resumeInline">
        <div class="resume-msg" id="resumeMsg"></div>
        <button class="resume-reset" id="btnResumeReset">Zerar progresso</button>
      </div>
      <div class="opt-btns">
        <button class="btn btn-primary" id="btnStartSeq" onclick="startSeq()">Responder todas (de onde parei)</button>
        <button class="btn btn-secondary btn-small" onclick="showView('viewLoader')">← Outro deck</button>
      </div>
    </div>

    <div class="view" id="viewStudy">
      <div class="study-header">
        <span class="study-cat-name" id="studyCatName"></span>
        <div class="study-spacer"></div>
        <span class="study-timer" id="studyTimer"></span>
        <span class="study-counter" id="studyCounter"></span>
        <button class="study-exit" onclick="exitStudy()">✕ Sair</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

      <div class="dg-question">
        <div class="dg-question-label">Pergunta</div>
        <div id="dqText"></div>
      </div>

      <div class="study-columns">
        <div class="study-col">
          <div class="dg-answer-box">
            <textarea class="dg-textarea" id="dqAnswerInput" placeholder="Digite sua resposta..."></textarea>
          </div>
          <div class="result-box" id="resultUserBox" style="display:none">
            <div class="result-box-label">Sua resposta</div>
            <div id="resultUserAnswer"></div>
          </div>
        </div>

        <div class="study-col">
          <div class="result-box" id="resultRefBox" style="display:none">
            <div class="result-box-label">Resposta de referência</div>
            <div id="resultRefAnswer"></div>
          </div>
          <div class="dg-feedback" id="dqFeedback" style="display:none">
            <div class="dg-score-row">
              <div class="dg-score" id="dqScoreText"></div>
              <div class="dg-score-pct" id="dqScorePct"></div>
            </div>
            <div class="dg-feedback-text" id="dqFeedbackText"></div>
            <div class="points-list" id="dqCorrectPoints"></div>
            <div class="points-list" id="dqMissingPoints"></div>
            <div class="points-list" id="dqErrorPoints"></div>
          </div>
        </div>
      </div>

      <div class="opt-btns">
        <button class="btn btn-primary" id="dqSubmitBtn" onclick="submitDiscursivaAnswer()">Responder</button>
        <button class="btn btn-secondary" id="dqRetryBtn" onclick="retryDiscursiva()" style="display:none">Tentar novamente</button>
        <button class="btn btn-primary" id="dqNextBtn" onclick="nextDiscursivaStep()" style="display:none">Próxima pergunta →</button>
      </div>
    </div>

    <div class="view" id="viewSummary">
      <div style="font-size:56px">📊</div>
      <div style="font-size:26px;font-weight:700" id="summaryTitle"></div>
      <div class="loader-sub" id="summarySub"></div>
      <div class="opt-btns" style="margin-top:16px">
        <button class="btn btn-secondary" onclick="showView('viewLoader');loadFileBrowser()">Outro deck</button>
        <a href="index.html" class="btn btn-secondary">← Início</a>
      </div>
    </div>
  </main>

  <script>
    const APPROVAL_THRESHOLD = 50;
    const FOLDER_COLORS = {
      'DIREITO': '#cccccc', 'ECONOMIA': '#eeeeee', 'GEOGRAFIA': '#ffffff',
      'HISTORIA DO BRASIL': '#cccccc', 'HISTORIA MUNDIAL': '#dddddd', 'POLITICAINTERNACIONAL': '#dddddd',
    };

    let queue = [], qIdx = 0, deckName = '';
    let questionStartedAt = null;
    let lastDone = 0;
    let sessionStartIdx = 0;

    (async () => {
      const user = await DB.requireAuth();
      const [profile, examDate] = await Promise.all([DB.getProfile(), DB.getExamDate()]);
      const nu = document.getElementById('navUser');
      if (nu) nu.textContent = (profile?.name || user.email || '?').slice(0,2).toUpperCase();
      const nc = document.getElementById('navCountdown');
      if (nc) nc.textContent = Math.ceil((examDate - Date.now()) / 86400000) + 'd';
      loadFileBrowser();
    })();

    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    let _manifest = null;
    async function loadManifest() {
      if (_manifest) return _manifest;
      try {
        const res = await fetch('manifest.json');
        if (!res.ok) throw new Error();
        _manifest = await res.json();
      } catch { _manifest = { discursivas: {} }; }
      return _manifest;
    }

    async function loadFileBrowser() {
      const browser = document.getElementById('fileBrowser');
      const m = await loadManifest();
      const folders = Object.keys(m.discursivas || {});
      if (!folders.length) {
        browser.innerHTML = '<div class="fb-empty">Nenhuma pergunta encontrada.</div>';
        return;
      }
      const active = folders
        .map(folder => ({ folder, files: m.discursivas[folder] || [] }))
        .filter(s => s.files.length > 0)
        .sort((a, b) => a.folder.localeCompare(b.folder, 'pt-BR'));
      browser.innerHTML = active.map(s => {
        const color = FOLDER_COLORS[s.folder.toUpperCase()] || '#8ea7ff';
        const fullPath = 'pergutnas/' + s.folder;
        const sortedFiles = [...s.files].sort((a, b) => a.localeCompare(b, 'pt-BR'));
        return `
        <div class="fb-subject">
          <div class="fb-subject-header" onclick="this.parentElement.classList.toggle('collapsed')">
            <span class="fb-subject-dot" style="background:${color}"></span>
            <span class="fb-subject-name">${s.folder}</span>
            <span class="fb-subject-count">${s.files.length}</span>
            <span class="fb-chevron">▾</span>
          </div>
          <div class="fb-subject-files">
            ${sortedFiles.map(f => `<div class="fb-file-row" onclick="loadDeckFromPath('${encodeURIComponent(fullPath+'/'+f)}','${f.replace(/\.csv$/i,'').replace(/'/g,"\\'")}')">
              <span class="fb-file-name">${f.replace(/\.csv$/i,'')}</span>
              <span class="fb-file-arrow">→</span>
            </div>`).join('')}
          </div>
        </div>`;
      }).join('');
    }

    let allQuestions = [];

    async function loadDeckFromPath(encodedPath, name) {
      const path = decodeURIComponent(encodedPath);
      try {
        const res = await fetch(encodeURI(path));
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const buf = await res.arrayBuffer();
        let text;
        try { text = new TextDecoder('utf-8',{fatal:true}).decode(buf); }
        catch { text = new TextDecoder('windows-1252').decode(buf); }
        deckName = name;
        const parsed = Papa.parse(text, { delimiter:';', skipEmptyLines:true });
        allQuestions = parsed.data
          .filter(row => row[0]&&row[0].trim()&&row[1]&&row[1].trim())
          .map(row => ({ question:row[0].trim(), reference_answer:row[1].trim() }));
        if (!allQuestions.length) { alert('Nenhuma pergunta encontrada: ' + name); return; }

        let remoteSaved = null;
        try { remoteSaved = await DB.getDiscursivaCheckpoint(deckName); } catch(e) {}
        lastDone = remoteSaved ? (remoteSaved.current_index || 0) : 0;

        showOptions();
      } catch(e) { alert('Erro ao carregar: ' + e.message); }
    }

    function showOptions() {
      document.getElementById('optTitle').textContent = deckName;
      document.getElementById('optSub').textContent = 'Perguntas discursivas';
      document.getElementById('optTotal').textContent = allQuestions.length;

      const total = allQuestions.length;
      const resumeEl = document.getElementById('resumeInline');
      const resetBtn = document.getElementById('btnResumeReset');
      if (lastDone > 0 && lastDone < total) {
        document.getElementById('resumeMsg').textContent =
          `Progresso: ${lastDone} de ${total} perguntas concluídas — próxima sessão começa na pergunta ${lastDone + 1}`;
        resumeEl.style.display = 'block';
      } else if (lastDone >= total) {
        document.getElementById('resumeMsg').textContent =
          `✓ Todas as ${total} perguntas do deck foram concluídas!`;
        resumeEl.style.display = 'block';
      } else {
        resumeEl.style.display = 'none';
      }
      resetBtn.onclick = () => {
        lastDone = 0;
        DB.clearDiscursivaCheckpoint(deckName).catch(() => {});
        resumeEl.style.display = 'none';
      };

      showView('viewOptions');
    }

    function startSeq() {
      if (lastDone >= allQuestions.length) {
        alert('Todas as perguntas do deck foram concluídas! Clique em "Zerar progresso" para reiniciar.');
        return;
      }
      queue = allQuestions;
      qIdx = lastDone;
      sessionStartIdx = lastDone;
      showView('viewStudy');
      document.getElementById('studyCatName').textContent = deckName;
      renderDiscursivaStep();
    }

    function saveDiscursivaProgress() {
      DB.saveDiscursivaCheckpoint({
        deck_name: deckName,
        current_index: qIdx,
        total_questions: allQuestions.length,
      }).catch(() => {});
    }

    function exitStudy() {
      if (queue.length) {
        lastDone = Math.max(lastDone, qIdx);
        saveDiscursivaProgress();
      }
      showView('viewLoader');
      loadFileBrowser();
    }

    function renderDiscursivaStep() {
      if (qIdx >= queue.length) { showDiscursivaSummary(); return; }
      const q = queue[qIdx];
      document.getElementById('studyCounter').textContent = `${qIdx + 1} / ${queue.length}`;
      document.getElementById('progressFill').style.width = (qIdx / queue.length * 100) + '%';
      document.getElementById('dqText').textContent = q.question;
      document.getElementById('dqAnswerInput').value = '';
      document.getElementById('dqAnswerInput').disabled = false;
      document.getElementById('resultUserBox').style.display = 'none';
      document.getElementById('resultRefBox').style.display = 'none';
      document.getElementById('dqFeedback').style.display = 'none';
      document.getElementById('dqSubmitBtn').style.display = '';
      document.getElementById('dqRetryBtn').style.display = 'none';
      document.getElementById('dqNextBtn').style.display = 'none';
      questionStartedAt = Date.now();
      updateTimer();
    }

    let timerInterval = null;
    function updateTimer() {
      clearInterval(timerInterval);
      const timerEl = document.getElementById('studyTimer');
      timerInterval = setInterval(() => {
        const secs = Math.floor((Date.now() - questionStartedAt) / 1000);
        const m = String(Math.floor(secs / 60)).padStart(2, '0');
        const s = String(secs % 60).padStart(2, '0');
        timerEl.textContent = `${m}:${s}`;
      }, 1000);
    }

    function renderPointsList(containerId, labelClass, labelText, points) {
      const el = document.getElementById(containerId);
      el.innerHTML = '';
      if (!points || !points.length) return;
      const label = document.createElement('span');
      label.className = labelClass;
      label.textContent = labelText;
      const ul = document.createElement('ul');
      points.forEach(p => {
        const li = document.createElement('li');
        li.textContent = p;
        ul.appendChild(li);
      });
      el.appendChild(label);
      el.appendChild(ul);
    }

    async function submitDiscursivaAnswer() {
      const q = queue[qIdx];
      const answer = document.getElementById('dqAnswerInput').value.trim();
      if (answer.length < 5) { alert('Escreva uma resposta antes de enviar.'); return; }

      const submitBtn = document.getElementById('dqSubmitBtn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Avaliando...';

      const timeSpentSeconds = Math.floor((Date.now() - questionStartedAt) / 1000);

      let result;
      try {
        const token = await DB.getAccessToken();
        const res = await fetch('/api/discursivas', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ question: q.question, referenceAnswer: q.reference_answer, userAnswer: answer }),
        });
        result = await res.json();
        if (result.error) throw new Error(result.error);
      } catch (e) {
        alert('Erro ao avaliar resposta: ' + e.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Responder';
        return;
      }

      submitBtn.disabled = false;
      submitBtn.textContent = 'Responder';
      clearInterval(timerInterval);

      document.getElementById('dqAnswerInput').disabled = true;
      document.getElementById('resultUserAnswer').textContent = answer;
      document.getElementById('resultRefAnswer').textContent = q.reference_answer;
      document.getElementById('resultUserBox').style.display = 'block';
      document.getElementById('resultRefBox').style.display = 'block';

      const feedbackEl = document.getElementById('dqFeedback');
      feedbackEl.className = 'dg-feedback ' + (result.approved ? 'good' : 'bad');
      feedbackEl.style.display = 'flex';
      document.getElementById('dqScoreText').textContent = result.score + '/100';
      document.getElementById('dqScorePct').textContent = result.approved ? 'Aprovado' : 'Abaixo do limite (' + APPROVAL_THRESHOLD + '%)';
      document.getElementById('dqFeedbackText').textContent = result.feedback || '';

      renderPointsList('dqCorrectPoints', 'points-correct', 'Pontos corretos', result.correct_points);
      renderPointsList('dqMissingPoints', 'points-missing', 'Pontos ausentes', result.missing_points);
      renderPointsList('dqErrorPoints', 'points-errors', 'Erros', result.errors);

      document.getElementById('dqSubmitBtn').style.display = 'none';

      await DB.saveDiscursivaAttempt({
        deckName,
        question: q.question,
        userAnswer: answer,
        score: result.score,
        approved: result.approved,
        correctPoints: result.correct_points,
        missingPoints: result.missing_points,
        errors: result.errors,
        feedback: result.feedback,
        timeSpentSeconds,
      });

      if (result.approved) {
        document.getElementById('dqNextBtn').style.display = '';
      } else {
        document.getElementById('dqRetryBtn').style.display = '';
        document.getElementById('dqNextBtn').style.display = '';
        document.getElementById('dqNextBtn').textContent = 'Ver resposta e avançar →';
      }
    }

    function retryDiscursiva() {
      renderDiscursivaStep();
    }

    function nextDiscursivaStep() {
      qIdx++;
      lastDone = qIdx;
      saveDiscursivaProgress();
      document.getElementById('dqNextBtn').textContent = 'Próxima pergunta →';
      renderDiscursivaStep();
    }

    function showDiscursivaSummary() {
      showView('viewSummary');
      document.getElementById('summaryTitle').textContent = 'Sessão concluída!';
      document.getElementById('summarySub').textContent = `${qIdx - sessionStartIdx} perguntas estudadas nesta sessão · ${qIdx} de ${allQuestions.length} no total`;
    }
  </script>
</body>
</html>
