  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0f1117; --surface:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.09);
      --text:#e8e8e8; --muted:#666; --accent:#8ea7ff;
      --HB:#f87171; --HM:#fbbf24; --PI:#60a5fa; --GEO:#34d399; --ECO:#a78bfa; --DIP:#fb923c;
    }
    body { background:var(--bg); color:var(--text); font-family:Inter,sans-serif; min-height:100vh; overflow-x:hidden; }

    /* ── NAV ── */
    nav { position:sticky; top:0; z-index:300; height:52px; background:#000;
      border-bottom:1px solid rgba(255,255,255,0.07); display:flex; align-items:center;
      padding:0 16px; gap:2px; overflow-x:auto; scrollbar-width:none; }
    nav::-webkit-scrollbar { display:none; }
    .nav-logo { font-size:13px; font-weight:900; letter-spacing:2.5px; margin-right:14px;
      white-space:nowrap; flex-shrink:0; color:#fff; }
    .nav-logo span { color:#39ff14; }
    nav a { color:#888; text-decoration:none; font-size:11px; font-weight:600;
      padding:5px 9px; border-radius:6px; transition:.15s; white-space:nowrap;
      display:flex; align-items:center; gap:4px; flex-shrink:0; letter-spacing:.3px; }
    nav a:hover { color:#fff; background:rgba(255,255,255,0.06); }
    nav a.active { color:#39ff14; border-bottom:2px solid #39ff14; border-radius:0; padding-bottom:3px; }
    .nav-spacer { flex:1; min-width:8px; }
    .nav-cd { font-size:11px; font-weight:700; color:#f5e642; background:rgba(245,230,66,.1);
      border:1px solid rgba(245,230,66,.25); padding:3px 10px; border-radius:20px;
      white-space:nowrap; flex-shrink:0; }
    .nav-user { width:28px; height:28px; border-radius:50%; background:rgba(255,255,255,.1);
      display:flex; align-items:center; justify-content:center; font-size:11px;
      font-weight:700; flex-shrink:0; margin-left:6px; color:#888; cursor:pointer; }

    /* ── HEADER ── */
    .page-header { padding:24px 24px 0; max-width:1400px; margin:0 auto; }
    .page-title { font-size:26px; font-weight:900; letter-spacing:-0.5px; }
    .page-title span { color:#39ff14; }
    .page-sub { font-size:13px; color:var(--muted); margin-top:4px; }

    /* ── LEGEND + FILTERS ── */
    .controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap;
      padding:16px 24px 0; max-width:1400px; margin:0 auto; }
    .legend-title { font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-right:4px; }
    .disc-btn { display:flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px;
      border:1.5px solid; font-size:11px; font-weight:700; cursor:pointer; transition:.15s; background:transparent; }
    .disc-btn.active { opacity:1; }
    .disc-btn.dimmed { opacity:0.35; }
    .disc-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .divider { width:1px; height:20px; background:var(--border); }
    .view-toggle { display:flex; gap:4px; }
    .view-btn { padding:4px 10px; border-radius:6px; border:1px solid var(--border);
      font-size:11px; color:var(--muted); cursor:pointer; background:transparent; transition:.15s; font-family:inherit; }
    .view-btn.active { background:rgba(255,255,255,0.08); color:var(--text); border-color:rgba(255,255,255,0.2); }

    /* ── VENN CANVAS ── */
    #vennWrap { width:100%; height:calc(100vh - 200px); min-height:500px; position:relative;
      max-width:1400px; margin:0 auto; padding:0 24px; }
    #vennSvg { width:100%; height:100%; display:block; }

    /* SVG styles */
    .anchor-circle { cursor:pointer; transition:.15s; }
    .anchor-circle:hover { filter:brightness(1.3); }
    .anchor-label { font-size:11px; font-weight:900; fill:#fff; text-anchor:middle;
      pointer-events:none; letter-spacing:.5px; text-transform:uppercase; }
    .anchor-label-sub { font-size:9px; fill:rgba(255,255,255,0.6); text-anchor:middle; pointer-events:none; }
    .theme-node { cursor:pointer; transition:opacity .2s; }
    .theme-node circle { transition:r .2s; }
    .theme-node:hover circle { filter:brightness(1.4); }
    .theme-label { font-size:9.5px; fill:#ddd; text-anchor:middle; pointer-events:none;
      font-family:Inter,sans-serif; font-weight:600; }
    .link-line { stroke:rgba(255,255,255,0.05); stroke-width:1; pointer-events:none; }
    .link-line.highlighted { stroke:rgba(255,255,255,0.25); stroke-width:1.5; }

    /* ── GRID VIEW ── */
    #gridView { display:none; max-width:1400px; margin:0 auto; padding:16px 24px 40px;
      display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px; }
    #gridView.hidden { display:none; }
    .cluster-card { background:var(--surface); border:1px solid var(--border); border-radius:12px;
      padding:14px 16px; cursor:pointer; transition:.2s; position:relative; overflow:hidden; }
    .cluster-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
    .cluster-card:hover { border-color:rgba(255,255,255,0.2); transform:translateY(-1px); }
    .cc-icon { font-size:20px; margin-bottom:8px; }
    .cc-name { font-size:13px; font-weight:700; color:var(--text); line-height:1.3; margin-bottom:8px; }
    .cc-badges { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
    .cc-badge { font-size:9px; font-weight:800; padding:2px 6px; border-radius:10px;
      letter-spacing:.5px; text-transform:uppercase; }
    .cc-subtemas { font-size:10px; color:var(--muted); line-height:1.5; }
    .cc-count { position:absolute; top:12px; right:12px; font-size:9px; font-weight:700;
      color:var(--muted); background:rgba(255,255,255,0.05); border-radius:8px; padding:2px 6px; }

    /* ── DRAWER ── */
    .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:400;
      display:none; justify-content:flex-end; }
    .drawer-overlay.open { display:flex; }
    .drawer { width:400px; max-width:92vw; height:100%; background:#14161f;
      border-left:1px solid var(--border); overflow-y:auto; padding:24px;
      transform:translateX(100%); transition:transform .3s; display:flex; flex-direction:column; gap:16px; }
    .drawer-overlay.open .drawer { transform:translateX(0); }
    .drawer-close { position:absolute; top:16px; right:16px; background:none; border:none;
      color:var(--muted); font-size:20px; cursor:pointer; }
    .drawer-icon { font-size:32px; }
    .drawer-name { font-size:20px; font-weight:900; line-height:1.2; }
    .drawer-badges { display:flex; gap:6px; flex-wrap:wrap; }
    .drawer-badge { font-size:11px; font-weight:800; padding:4px 10px; border-radius:20px;
      letter-spacing:.5px; text-transform:uppercase; }
    .drawer-section { }
    .drawer-section h5 { font-size:9px; letter-spacing:1.5px; color:var(--muted);
      text-transform:uppercase; margin-bottom:8px; }
    .drawer-chips { display:flex; flex-wrap:wrap; gap:5px; }
    .drawer-chip { background:rgba(255,255,255,0.06); border:1px solid var(--border);
      border-radius:16px; padding:3px 10px; font-size:11px; color:var(--text); }
    .drawer-edital { display:flex; flex-direction:column; gap:4px; }
    .edital-link { display:flex; align-items:center; gap:6px; padding:6px 8px;
      background:rgba(255,255,255,0.04); border-radius:8px; text-decoration:none;
      font-size:11px; color:var(--muted); border:1px solid transparent; transition:.15s; }
    .edital-link:hover { border-color:var(--border); color:var(--text); }
    .edital-link-subj { font-size:9px; font-weight:800; width:28px; text-align:center; flex-shrink:0; }
    .drawer-actions { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
    .drawer-actions a, .drawer-actions button {
      display:block; width:100%; padding:12px; text-align:center; border-radius:10px;
      font-size:13px; font-weight:700; cursor:pointer; text-decoration:none; font-family:inherit; }
    .btn-primary { background:var(--accent); color:#0f1117; border:none; }
    .btn-primary:hover { opacity:0.9; }
    .btn-secondary { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--muted); }
    .btn-secondary:hover { border-color:rgba(255,255,255,0.2); color:var(--text); }

    /* ── TOOLTIP ── */
    #tooltip { position:fixed; background:#1a1d2a; border:1px solid var(--border);
      border-radius:8px; padding:8px 12px; font-size:11px; pointer-events:none;
      opacity:0; transition:opacity .15s; z-index:500; max-width:200px; }
    #tooltip .tt-name { font-weight:700; color:var(--text); margin-bottom:3px; }
    #tooltip .tt-subj { color:var(--muted); font-size:10px; }

    /* ── RESPONSIVE ── */
    @media (max-width:600px) {
      .page-title { font-size:20px; }
      #vennWrap { height:calc(100vh - 160px); padding:0 8px; }
      .drawer { padding:16px; }
    }
  </style>
</head>

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let activeSubjects = new Set(['HB','HM','PI','GEO','ECO','DIP']);
let currentView = 'venn';
let selectedCluster = null;
let simulation = null;

// ─────────────────────────────────────────────────────────────────────────────
// AUTH (countdown + user)
// ─────────────────────────────────────────────────────────────────────────────
async function initAuth() {
  const user = await DB.getUser();
  if (!user) { location.href = 'login.html'; return; }
  const profile = await DB.getProfile(user.id);
  const initials = (profile?.name || user.email || '?').slice(0,2).toUpperCase();
  document.getElementById('navUser').textContent = initials;
  if (profile?.role === 'admin') document.getElementById('navAdmin').style.display = '';

  const examDate = await DB.getExamDate();
  const days = Math.ceil((examDate - Date.now()) / 86400000);
  document.getElementById('navCountdown').textContent = days > 0 ? `D-${days}` : 'CACD';
}

// ─────────────────────────────────────────────────────────────────────────────
// VENN (D3 force simulation)
// ─────────────────────────────────────────────────────────────────────────────
function buildVenn() {
  const wrap = document.getElementById('vennWrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  const cx = W / 2, cy = H / 2;
  const R = Math.min(W, H) * 0.34;

  const svg = d3.select('#vennSvg');
  svg.selectAll('*').remove();

  // ── defs: glow filter ──
  const defs = svg.append('defs');
  const glow = defs.append('filter').attr('id','glow');
  glow.append('feGaussianBlur').attr('stdDeviation','3').attr('result','blur');
  const feMerge = glow.append('feMerge');
  feMerge.append('feMergeNode').attr('in','blur');
  feMerge.append('feMergeNode').attr('in','SourceGraphic');

  // ── Discipline anchor positions (hexagon) ──
  const SUBJS = ['HM','PI','DIP','GEO','ECO','HB'];
  const anchors = SUBJS.map((s, i) => {
    const angle = (i * 2 * Math.PI / 6) - Math.PI / 2;
    return { id: s, x: cx + R * Math.cos(angle), y: cy + R * Math.sin(angle) };
  });
  const anchorMap = Object.fromEntries(anchors.map(a => [a.id, a]));

  // ── Filter clusters by active subjects ──
  const visibleClusters = CLUSTERS.filter(c =>
    c.subjects.some(s => activeSubjects.has(s))
  );

  // ── Compute target position for each cluster (centroid of its disciplines) ──
  function targetPos(cluster) {
    const pts = cluster.subjects.filter(s => activeSubjects.has(s)).map(s => anchorMap[s]).filter(Boolean);
    if (!pts.length) return { tx: cx, ty: cy };
    return { tx: pts.reduce((a,p)=>a+p.x,0)/pts.length, ty: pts.reduce((a,p)=>a+p.y,0)/pts.length };
  }

  // ── Nodes for simulation ──
  const nodes = visibleClusters.map(c => {
    const {tx, ty} = targetPos(c);
    return { ...c, x: tx + (Math.random()-.5)*40, y: ty + (Math.random()-.5)*40, tx, ty };
  });

  // ── Draw links (lines from cluster to anchor) ──
  const linkGroup = svg.append('g').attr('class','links');
  const links = [];
  nodes.forEach(n => {
    n.subjects.filter(s => activeSubjects.has(s)).forEach(s => {
      links.push({ source: n, target: anchorMap[s] });
    });
  });

  const linkLines = linkGroup.selectAll('line').data(links).enter().append('line')
    .attr('class','link-line')
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y);

  // ── Draw anchor circles ──
  const anchorGroup = svg.append('g').attr('class','anchors');
  const anchorNodes = anchorGroup.selectAll('g').data(anchors).enter().append('g')
    .attr('class','anchor-circle')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor','pointer')
    .on('click', (e, d) => toggleAnchorFilter(d.id));

  anchorNodes.append('circle')
    .attr('r', 38)
    .attr('fill', d => SUBJ_COLOR[d.id] + '18')
    .attr('stroke', d => SUBJ_COLOR[d.id])
    .attr('stroke-width', 2)
    .attr('filter','url(#glow)');

  anchorNodes.append('text').attr('class','anchor-label')
    .attr('dy', '-4')
    .attr('fill', d => SUBJ_COLOR[d.id])
    .text(d => d.id);

  anchorNodes.append('text').attr('class','anchor-label-sub')
    .attr('dy', '10')
    .text(d => SUBJ_LABEL[d.id]);

  // ── Draw theme nodes ──
  const nodeGroup = svg.append('g').attr('class','theme-nodes');
  const nodeEls = nodeGroup.selectAll('g').data(nodes).enter().append('g')
    .attr('class','theme-node')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .on('mouseover', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseout', hideTooltip)
    .on('click', (e, d) => { e.stopPropagation(); openDrawer(d); });

  // Node radius proportional to subject count
  const rScale = d => 14 + d.subjects.length * 4;

  nodeEls.append('circle')
    .attr('r', rScale)
    .attr('fill', d => {
      if (d.subjects.length === 1) return SUBJ_COLOR[d.subjects[0]] + 'cc';
      // Gradient via average
      const cols = d.subjects.map(s => SUBJ_COLOR[s]);
      return cols[0] + 'aa';
    })
    .attr('stroke', d => {
      const c = d.subjects.filter(s => activeSubjects.has(s));
      return c.length ? SUBJ_COLOR[c[0]] : '#555';
    })
    .attr('stroke-width', 1.5)
    .attr('filter','url(#glow)');

  // Discipline dots inside node
  nodeEls.each(function(d) {
    const g = d3.select(this);
    const n = d.subjects.length;
    d.subjects.forEach((s, i) => {
      const a = (i / n) * 2 * Math.PI - Math.PI / 2;
      const dr = rScale(d) * 0.5;
      g.append('circle')
        .attr('r', 3)
        .attr('cx', Math.cos(a) * dr)
        .attr('cy', Math.sin(a) * dr)
        .attr('fill', SUBJ_COLOR[s]);
    });
  });

  // Node label (wrapped, max 2 lines)
  nodeEls.each(function(d) {
    const words = d.name.split(' ');
    const g = d3.select(this);
    const r = rScale(d);
    // Simple 2-line wrap at midpoint
    const mid = Math.ceil(words.length / 2);
    const line1 = words.slice(0, mid).join(' ');
    const line2 = words.slice(mid).join(' ');
    g.append('text').attr('class','theme-label').attr('dy', line2 ? '-5' : '3').text(line1);
    if (line2) g.append('text').attr('class','theme-label').attr('dy', '8').text(line2);
  });

  // ── Force simulation ──
  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodes)
    .force('attract', () => {
      nodes.forEach(n => {
        const k = 0.12;
        n.vx += (n.tx - n.x) * k;
        n.vy += (n.ty - n.y) * k;
      });
    })
    .force('collide', d3.forceCollide(d => rScale(d) + 6).strength(0.8))
    .force('boundary', () => {
      const pad = 50;
      nodes.forEach(n => {
        if (n.x < pad) n.vx += (pad - n.x) * 0.1;
        if (n.x > W-pad) n.vx += (W-pad - n.x) * 0.1;
        if (n.y < pad) n.vy += (pad - n.y) * 0.1;
        if (n.y > H-pad) n.vy += (H-pad - n.y) * 0.1;
      });
    })
    .alphaDecay(0.02)
    .on('tick', () => {
      nodeEls.attr('transform', d => `translate(${d.x},${d.y})`);
      linkLines
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    });
}

// ─────────────────────────────────────────────────────────────────────────────
// GRID VIEW
// ─────────────────────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('gridView');
  const visible = CLUSTERS.filter(c => c.subjects.some(s => activeSubjects.has(s)));

  grid.innerHTML = visible.map(c => {
    const color = SUBJ_COLOR[c.subjects[0]];
    const badges = c.subjects.map(s =>
      `<span class="cc-badge" style="background:${SUBJ_COLOR[s]}22;color:${SUBJ_COLOR[s]}">${s}</span>`
    ).join('');
    return `
      <div class="cluster-card" onclick="openDrawer(CLUSTERS.find(x=>x.id===${c.id}))"
           style="border-top:3px solid ${color}">
        <div class="cc-count">${c.subjects.length} mat.</div>
        <div class="cc-icon">${c.icon}</div>
        <div class="cc-name">${c.name}</div>
        <div class="cc-badges">${badges}</div>
        <div class="cc-subtemas">${c.subtemas.slice(0,4).join(' · ')}</div>
      </div>`;
  }).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// DRAWER
// ─────────────────────────────────────────────────────────────────────────────
function openDrawer(cluster) {
  selectedCluster = cluster;
  document.getElementById('dIcon').textContent = cluster.icon;
  document.getElementById('dName').textContent = cluster.name;

  // Badges
  document.getElementById('dBadges').innerHTML = cluster.subjects.map(s =>
    `<span class="drawer-badge" style="background:${SUBJ_COLOR[s]}22;color:${SUBJ_COLOR[s]}">${s} — ${SUBJ_LABEL[s]}</span>`
  ).join('');

  // Subtemas chips
  document.getElementById('dChips').innerHTML = cluster.subtemas.map(s =>
    `<span class="drawer-chip">${s}</span>`
  ).join('');

  // Edital topics
  document.getElementById('dEdital').innerHTML = cluster.edital_ids.map(id => {
    const m = EDITAL_META[id];
    if (!m) return '';
    return `<span class="edital-link">
      <span class="edital-link-subj" style="color:${SUBJ_COLOR[m.subj]}">${m.code}</span>
      ${m.title}
    </span>`;
  }).join('');

  // Open
  document.getElementById('drawerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.body.style.overflow = '';
  selectedCluster = null;
}

function estudarEixo() {
  if (!selectedCluster) return;
  const ids = selectedCluster.edital_ids.join(',');
  const name = encodeURIComponent(selectedCluster.name);
  // Navigate to flashcards, which will pick up spiral params after deck select
  location.href = `flashcards.html?spiral=${ids}&spiral_name=${name}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// TOOLTIP
// ─────────────────────────────────────────────────────────────────────────────
function showTooltip(event, d) {
  document.getElementById('ttName').textContent = d.icon + ' ' + d.name;
  document.getElementById('ttSubj').textContent = d.subjects.join(' · ');
  document.getElementById('tooltip').style.opacity = '1';
  moveTooltip(event);
}
function moveTooltip(event) {
  const tt = document.getElementById('tooltip');
  tt.style.left = (event.clientX + 14) + 'px';
  tt.style.top  = (event.clientY - 10) + 'px';
}
function hideTooltip() {
  document.getElementById('tooltip').style.opacity = '0';
}

// ─────────────────────────────────────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────────────────────────────────────
function toggleAnchorFilter(subj) {
  if (activeSubjects.has(subj)) {
    if (activeSubjects.size === 1) return; // keep at least one
    activeSubjects.delete(subj);
  } else {
    activeSubjects.add(subj);
  }
  // Sync filter buttons
  document.querySelectorAll('.disc-btn').forEach(btn => {
    const s = btn.dataset.subj;
    btn.classList.toggle('active', activeSubjects.has(s));
    btn.classList.toggle('dimmed', !activeSubjects.has(s));
  });
  rebuildView();
}

document.querySelectorAll('.disc-btn').forEach(btn => {
  btn.addEventListener('click', () => toggleAnchorFilter(btn.dataset.subj));
});

// ─────────────────────────────────────────────────────────────────────────────
// VIEW TOGGLE
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('btnVenn').addEventListener('click', () => {
  currentView = 'venn';
  document.getElementById('btnVenn').classList.add('active');
  document.getElementById('btnGrid').classList.remove('active');
  document.getElementById('vennWrap').style.display = '';
  document.getElementById('gridView').classList.add('hidden');
  buildVenn();
});

document.getElementById('btnGrid').addEventListener('click', () => {
  currentView = 'grid';
  document.getElementById('btnGrid').classList.add('active');
  document.getElementById('btnVenn').classList.remove('active');
  document.getElementById('vennWrap').style.display = 'none';
  document.getElementById('gridView').classList.remove('hidden');
  buildGrid();
});

function rebuildView() {
  if (currentView === 'venn') buildVenn();
  else buildGrid();
}

// ─────────────────────────────────────────────────────────────────────────────
// RESIZE
// ─────────────────────────────────────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (currentView === 'venn') buildVenn(); }, 200);
});

  buildVenn();
