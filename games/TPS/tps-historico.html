<script>
const BATCH_SIZE = 5;
const PAIRS_PER_ROUND = 10;
const YEARS = [2023, 2022, 2021, 2019, 2018, 2017, 2016];
const sectionPairs = {};
let currentSection = null, allPairs = [], batchOffset = 0, roundPairs = [], batchInRound = 0;
let currentBatch = [], matchMap = {}, leftItems = [], rightItems = [], activeItem = null;
let matchedInBatch = 0, locked = false, combo = 0, maxCombo = 0, errors = 0, totalMatched = 0;
let timerSecs = 0, timerInterval = null, roundWrongPairs = [], storedWrongPairs = [], suddenDeath = false;

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }
function fmt(s){ return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toggleSuddenDeath() {
  suddenDeath = !suddenDeath;
  const btn = document.getElementById('sdBtn');
  btn.classList.toggle('active', suddenDeath);
}

async function loadSection(year) {
  return new Promise((resolve) => {
    Papa.parse(`/TPS/TPS ${year}.csv`, {
      header: false, delimiter: ';', download: true, skipEmptyLines: true,
      complete({ data }) {
        sectionPairs[year] = data.filter(r => r[0] && r[1]).map(r => ({ left: r[0].trim(), right: r[1].trim() }));
        resolve();
      },
      error() { sectionPairs[year] = []; resolve(); }
    });
  });
}

async function init() {
  await Promise.all(YEARS.map(y => loadSection(y)));
  await renderStages();
  document.getElementById('viewLoading').style.display = 'none';
  document.getElementById('viewStages').style.display = 'block';
}

async function renderStages() {
  const grid = document.getElementById('stagesGrid');
  let html = '', totalDone = 0, totalPairs = 0;
  for (const year of YEARS) {
    const pairs = sectionPairs[year] || [];
    const prog = JSON.parse(localStorage.getItem(`tps_${year}_progress`) || '{}');
    const done = Math.min(prog.batchOffset || 0, pairs.length);
    const pct = pairs.length ? Math.round((done / pairs.length) * 100) : 0;
    totalDone += done;
    totalPairs += pairs.length;
    const started = done > 0;
    html += `<div class="stage-card${started?' started':''}" onclick="startSection(${year})">
      <div class="stage-icon">📄</div>
      <div class="stage-name">TPS ${year}</div>
      <div class="stage-meta">${pairs.length} pares</div>
      <div class="stage-prog-bar"><div class="stage-prog-fill" style="width:${pct}%"></div></div>
      <div class="stage-prog-label">${done > 0 ? `${done} / ${pairs.length} (${pct}%)` : 'Não iniciado'}</div>
      ${done > 0 ? `<button class="stage-reset-btn" onclick="event.stopPropagation();resetSectionFromHub(${year})">🔄 Recomeçar</button>` : ''}
    </div>`;
  }
  grid.innerHTML = html;
  const pct = totalPairs ? Math.round((totalDone/totalPairs)*100) : 0;
  document.getElementById('stageHeroMeta').textContent = `${totalDone} / ${totalPairs} pares (${pct}%)`;
}

function loadProgress(year) {
  storedWrongPairs = [];
  const local = JSON.parse(localStorage.getItem(`tps_${year}_progress`) || '{}');
  storedWrongPairs = local.wrongPairs || [];
  return local;
}

function saveProgress(year, data) {
  const full = { ...data, wrongPairs: storedWrongPairs };
  localStorage.setItem(`tps_${year}_progress`, JSON.stringify(full));
}

function startSection(year) {
  currentSection = year;
  allPairs = sectionPairs[year] || [];
  const prog = loadProgress(year);
  batchOffset = Math.min(prog.batchOffset || 0, allPairs.length);

  if (batchOffset >= allPairs.length && allPairs.length > 0) {
    document.getElementById('doneTitle').textContent = `TPS ${year} concluído!`;
    document.getElementById('doneSub').textContent = `Todos os ${allPairs.length} pares estudados.`;
    document.getElementById('viewStages').style.display = 'none';
    document.getElementById('viewDone').style.display = 'block';
    return;
  }

  startRound();
}

function startRound() {
  roundPairs = allPairs.slice(batchOffset, batchOffset + PAIRS_PER_ROUND);
  batchInRound = 0;
  combo = 0;
  maxCombo = 0;
  errors = 0;
  totalMatched = 0;
  timerSecs = 0;
  roundWrongPairs = [];

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSecs++;
    document.getElementById('timerBadge').textContent = fmt(timerSecs);
  }, 1000);

  const roundNum = Math.floor(batchOffset / PAIRS_PER_ROUND) + 1;
  const totalRounds = Math.ceil(allPairs.length / PAIRS_PER_ROUND);
  document.getElementById('gameSectionName').textContent = `TPS ${currentSection}`;
  document.getElementById('gameRoundLabel').textContent = `Rodada ${roundNum}/${totalRounds}`;
  document.getElementById('gameProg').style.width = '0%';

  document.getElementById('viewStages').style.display = 'none';
  document.getElementById('viewGame').style.display = 'block';
  loadBatch();
}

function loadBatch() {
  const start = batchInRound * BATCH_SIZE;
  currentBatch = roundPairs.slice(start, start + BATCH_SIZE);
  const pairOrder = shuffle([...currentBatch.keys()]);
  const rightOrder = shuffle([...currentBatch.keys()]);
  leftItems = pairOrder.map(i => currentBatch[i].left);
  rightItems = rightOrder.map(i => currentBatch[i].right);
  matchMap = {};
  pairOrder.forEach((pairIdx, leftPos) => { matchMap[leftPos] = currentBatch[pairIdx].right; });
  matchedInBatch = 0;
  activeItem = null;
  locked = false;
  updateComboUI();
  updateProgress();
  renderColumns();
}

function renderColumns() {
  document.getElementById('colLeft').innerHTML = leftItems.map((t,i)=>`<div class="match-item" data-side="left" data-idx="${i}" onclick="tap(this)">${esc(t)}</div>`).join('');
  document.getElementById('colRight').innerHTML = rightItems.map((t,i)=>`<div class="match-item" data-side="right" data-idx="${i}" onclick="tap(this)">${esc(t)}</div>`).join('');
}

function tap(el) {
  if (locked || el.classList.contains('is-correct') || el.classList.contains('gone')) return;
  const side = el.dataset.side;
  const idx = +el.dataset.idx;

  if (!activeItem) { activeItem = { side, idx, el }; el.classList.add('selected'); return; }
  if (activeItem.el === el) { el.classList.remove('selected'); activeItem = null; return; }
  if (activeItem.side === side) {
    activeItem.el.classList.remove('selected');
    activeItem = { side, idx, el }; el.classList.add('selected'); return;
  }

  const leftIdx = side === 'left' ? idx : activeItem.idx;
  const rightIdx = side === 'right' ? idx : activeItem.idx;
  const leftEl = side === 'left' ? el : activeItem.el;
  const rightEl = side === 'right' ? el : activeItem.el;

  leftEl.classList.remove('selected');
  rightEl.classList.remove('selected');
  activeItem = null;
  locked = true;

  const isMatch = matchMap[leftIdx] === rightItems[rightIdx];
  if (isMatch) {
    combo++; maxCombo = Math.max(maxCombo, combo); totalMatched++; matchedInBatch++;
    updateComboUI(); updateProgress();
    leftEl.classList.add('is-correct'); rightEl.classList.add('is-correct');
    setTimeout(() => {
      leftEl.classList.add('vanish'); rightEl.classList.add('vanish');
      setTimeout(() => {
        leftEl.classList.add('gone'); rightEl.classList.add('gone');
        locked = false;
        if (matchedInBatch >= currentBatch.length) setTimeout(advanceBatch, 300);
      }, 320);
    }, 420);
  } else {
    combo = 0; errors++;
    const lv = leftItems[leftIdx];
    if (!roundWrongPairs.find(p => p.left === lv))
      roundWrongPairs.push({ left: lv, right: matchMap[leftIdx] });
    updateComboUI();
    leftEl.classList.add('is-wrong'); rightEl.classList.add('is-wrong');
    setTimeout(() => {
      leftEl.classList.remove('is-wrong'); rightEl.classList.remove('is-wrong');
      if (suddenDeath) { loadBatch(); } else { locked = false; }
    }, 500);
  }
}

function updateProgress() {
  const pct = roundPairs.length ? (totalMatched / roundPairs.length) * 100 : 0;
  document.getElementById('gameProg').style.width = pct + '%';
}

function updateComboUI() {
  const badge = document.getElementById('comboBadge');
  if (combo >= 2) {
    badge.textContent = `COMBO ×${combo}`;
    badge.classList.remove('hidden');
  } else { badge.classList.add('hidden'); }
}

function advanceBatch() {
  roundWrongPairs.forEach(p => {
    if (!storedWrongPairs.find(e => e.left === p.left)) {
      storedWrongPairs.push(p);
    }
  });
  roundWrongPairs = [];
  batchInRound++;
  if (batchInRound * BATCH_SIZE >= roundPairs.length) {
    const oldOffset = batchOffset;
    batchOffset += roundPairs.length;
    saveProgress(currentSection, { batchOffset });
    showResult();
  } else { loadBatch(); }
}

function showResult() {
  clearInterval(timerInterval);
  const total = roundPairs.length;
  const acc = total / (total + errors);
  const stars = acc >= 0.9 ? 3 : acc >= 0.65 ? 2 : 1;
  document.getElementById('resEmoji').textContent = stars >= 3 ? '⭐' : stars >= 2 ? '✓' : '•';
  document.getElementById('resTitle').textContent = 'Rodada concluída';
  document.getElementById('resSub').textContent = errors === 0 ? 'Sem erros!' : `${errors} erro(s)`;
  document.getElementById('resStars').innerHTML = '<span style="color:#d4af37">'+'★'.repeat(stars)+'</span><span style="color:#333">'+'★'.repeat(3-stars)+'</span>';
  document.getElementById('resPairs').textContent = totalMatched;
  document.getElementById('resErrors').textContent = errors;
  document.getElementById('resTime').textContent = fmt(timerSecs);
  document.getElementById('resCombo').textContent = maxCombo;
  const isLast = batchOffset >= allPairs.length;
  document.getElementById('btnNext').textContent = isLast ? 'Concluído →' : 'Próxima Rodada →';
  document.getElementById('viewGame').style.display = 'none';
  document.getElementById('viewResult').style.display = 'block';
}

function repeatRound() {
  batchOffset -= roundPairs.length;
  if (batchOffset < 0) batchOffset = 0;
  saveProgress(currentSection, { batchOffset });
  startRound();
}

function nextRound() {
  if (batchOffset >= allPairs.length) {
    document.getElementById('doneTitle').textContent = `TPS ${currentSection} concluído!`;
    document.getElementById('doneSub').textContent = `Todos os ${allPairs.length} pares estudados.`;
    document.getElementById('viewResult').style.display = 'none';
    document.getElementById('viewDone').style.display = 'block';
  } else { startRound(); }
}

function resetSection() {
  batchOffset = 0;
  saveProgress(currentSection, { batchOffset });
  startRound();
}

function resetSectionFromHub(year) {
  if (!confirm(`Recomeçar TPS ${year}?`)) return;
  saveProgress(year, { batchOffset: 0 });
  renderStages();
}

function goBackToStages() {
  clearInterval(timerInterval);
  document.getElementById('viewGame').style.display = 'none';
  document.getElementById('viewResult').style.display = 'none';
  document.getElementById('viewDone').style.display = 'none';
  document.getElementById('viewStages').style.display = 'block';
  renderStages();
}

function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('open'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('open'); }

init();

(async()=>{
  try {
    const user = await DB.requireAuth();
    const [profile, , examDate] = await Promise.all([DB.getProfile(), DB.isAdmin(), DB.getExamDate()]);
    const nu = document.getElementById('navUser');
    if (nu) nu.textContent = (profile?.name || user.email || '?').slice(0,2).toUpperCase();
    const nc = document.getElementById('navCountdown');
    if (nc && examDate) nc.textContent = Math.ceil((examDate - Date.now()) / 86400000) + 'd';
  } catch(e){}
})();
</script>
