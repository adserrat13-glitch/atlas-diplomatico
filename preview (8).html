<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluxo Sensor de Umidade</title>

  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      font-family: Arial, sans-serif;
      color: white;
    }

    .canvas {
      position: relative;
      width: 100vw;
      height: 100vh;
      background:
        linear-gradient(#2c2c2c 1px, transparent 1px),
        linear-gradient(90deg, #2c2c2c 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .node {
      position: absolute;
      width: 180px;
      background: #2a2a2a;
      border: 1px solid #666;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    .label {
      font-size: 12px;
      color: #aaa;
    }

    .port {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: absolute;
    }

    .green { background: #00c853; }
    .yellow { background: #ffca28; }
    .purple { background: #7c4dff; }

    .line {
      position: absolute;
      background: #caa64b;
    }

    /* POSIÇÕES */

    .sensor {
      top: 70px;
      left: 520px;
    }

    .convert {
      top: 210px;
      left: 550px;
      width: 120px;
    }

    .concat {
      top: 340px;
      left: 510px;
      width: 180px;
    }

    .lcd {
      top: 470px;
      left: 450px;
      width: 260px;
    }

    /* LINHAS */

    .line1 {
      width: 4px;
      height: 90px;
      top: 170px;
      left: 605px;
    }

    .line2 {
      width: 4px;
      height: 90px;
      top: 300px;
      left: 605px;
    }

    .line3 {
      width: 4px;
      height: 90px;
      top: 430px;
      left: 605px;
    }

  </style>
</head>
<body>

<div class="canvas">

  <!-- Moisture Sensor -->
  <div class="node sensor">
    <div class="label">PORT | UDP</div>
    <div class="title">moisture-sensor</div>

    <div class="port green" style="top:-6px; left:20px;"></div>
    <div class="port purple" style="top:-6px; right:20px;"></div>

    <div class="port green" style="bottom:-6px; left:50%;"></div>
    <div class="port purple" style="bottom:-6px; left:75%;"></div>
    <div class="port purple" style="bottom:-6px; right:15px;"></div>
  </div>

  <!-- Conversão -->
  <div class="node convert">
    <div class="label">NUM</div>
    <div class="title">to-percent</div>

    <div class="port yellow" style="bottom:-6px; left:50%;"></div>
  </div>

  <!-- Concat -->
  <div class="node concat">
    <div class="title">concat</div>

    <div class="port yellow" style="top:-6px; left:50%;"></div>
    <div class="port yellow" style="left:-6px; top:50%;"></div>
    <div class="port yellow" style="bottom:-6px; left:20px;"></div>
  </div>

  <!-- LCD -->
  <div class="node lcd">
    <div class="label">ADDR | BL | L1 | L2 | UDP</div>
    <div class="title">text-lcd-16x2-i2c</div>

    <div class="port yellow" style="top:-6px; left:20px;"></div>
    <div class="port purple" style="top:-6px; left:80px;"></div>
    <div class="port yellow" style="top:-6px; left:140px;"></div>
    <div class="port yellow" style="top:-6px; left:200px;"></div>
    <div class="port purple" style="top:-6px; right:20px;"></div>

    <div class="port purple" style="bottom:-6px; left:20px;"></div>
  </div>

  <!-- Conexões -->
  <div class="line line1"></div>
  <div class="line line2"></div>
  <div class="line line3"></div>

</div>

</body>
</html>
