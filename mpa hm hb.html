<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Mental - História do Brasil & Mundial</title>
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        .container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 20px;
        }
        canvas {
            border-radius: 10px;
            background-color: #f4f6f8;
            display: block;
            margin: 0 auto;
            width: 100%;
            height: auto;
            max-width: 900px;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
        }
        .legend {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
        }
        .color-box {
            width: 15px;
            height: 15px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>📚 Mapa Mental: História do Brasil e História Mundial</h1>
    
    <div class="legend">
        <div class="legend-item"><div class="color-box" style="background-color: #2E7D32;"></div> História do Brasil (Verde)</div>
        <div class="legend-item"><div class="color-box" style="background-color: #1976D2;"></div> História Mundial (Azul)</div>
    </div>

    <div class="container">
        <canvas id="mindmapCanvas" width="900" height="900"></canvas>
    </div>

    <div class="footer">
        Resumo visual dos tópicos das disciplinas. Clique ou passe o mouse para explorar (visualização interativa).
    </div>

    <script>
        const canvas = document.getElementById('mindmapCanvas');
        const ctx = canvas.getContext('2d');

        // Configuração do Canvas
        const W = canvas.width;
        const H = canvas.height;
        const CX = W / 2;
        const CY = H / 2;

        // Cores baseadas na nova temática
        const COLORS = {
            BRASIL: '#2E7D32', // Verde Escuro
            MUNDO: '#1976D2',  // Azul
        };

        // Definição dos Nós Principais (Dados mapeados do seu texto)
        const categories = [
            // HISTÓRIA DO BRASIL (VERDE)
            {
                label: "BRASIL: COLONIAL",
                color: COLORS.BRASIL,
                angle: -135, 
                subs: ["Configuração Territorial", "Economia Açucareira", "Sociedade Colonial", "Escravidão"]
            },
            {
                label: "BRASIL: INDEPENDÊNCIA",
                color: COLORS.BRASIL,
                angle: -160, 
                subs: ["Movimentos Emancip.", "Situação Europeia", "Brasil Reino Unido", "Constitucionalismo"]
            },
            {
                label: "BRASIL: IMPÉRIO",
                color: COLORS.BRASIL,
                angle: -80, 
                subs: ["Primeiro Reinado", "Regência (1831-40)", "Segundo Reinado", "Guerra do Paraguai"]
            },
            {
                label: "BRASIL: REPÚBLICA VELHA",
                color: COLORS.BRASIL,
                angle: -40, 
                subs: ["Proclamação (1889)", "Constituição 1891", "Oligarquias/Coronelismo", "Crise 1920"]
            },
            {
                label: "BRASIL: ERA VARGAS",
                color: COLORS.BRASIL,
                angle: 20, 
                subs: ["1930-1945", "Estado Novo", "Industrialização", "CLT e 2ª Guerra"]
            },
            
            // HISTÓRIA MUNDIAL (AZUL)
            {
                label: "MUNDO: REVOLUÇÕES",
                color: COLORS.MUNDO,
                angle: 80, 
                subs: ["Francesa (1789)", "Independência Américas", "Marxismo/Anarquismo", "Revolução Russa"]
            },
            {
                label: "MUNDO: RELAÇÕES INT.",
                color: COLORS.MUNDO,
                angle: 120, 
                subs: ["Guerras Mundiais", "Paz de Versalhes", "Guerra Fria", "ONU e Détente"]
            },
            {
                label: "MUNDO: COLONIALISMO",
                color: COLORS.MUNDO,
                angle: 180, 
                subs: ["Imperialismo", "Partilha África/Ásia", "Descolonização", "Bandung"]
            },
            {
                label: "MUNDO: SÉCULO XXI",
                color: COLORS.MUNDO,
                angle: 220, 
                subs: ["Globalização", "Capitalismo Contemporâneo", "Pós-Modernidade", "Redes Sociais"]
            }
        ];

        // Função para desenhar nós e linhas
        function drawNode(x, y, label, color, radius) {
            // Desenha a linha de conexão
            ctx.beginPath();
            ctx.moveTo(CX, CY);
            ctx.lineTo(x, y);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Desenha o nó
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Adiciona o Texto
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Quebra o texto se for muito longo
            if (label.length > 10) {
                const words = label.split(' ');
                let lines = [];
                let currentLine = '';
                for (let i = 0; i < words.length; i++) {
                    let testLine = currentLine + words[i] + ' ';
                    if (testLine.length > 10 && currentLine !== '') {
                        lines.push(currentLine.trim());
                        currentLine = words[i] + ' ';
                    } else {
                        currentLine = testLine;
                    }
                }
                lines.push(currentLine.trim());
                
                let lineY = y - (lines.length - 1) * 6;
                lines.forEach(line => {
                    ctx.fillText(line, x, lineY);
                    lineY += 12;
                });
            } else {
                ctx.fillText(label, x, y);
            }
        }

        function drawSubNode(x, y, label, color, radius) {
            // Desenha nó secundário
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.globalAlpha = 0.7;
            ctx.fill();
            ctx.globalAlpha = 1.0;
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Texto Secundário (Menor)
            ctx.fillStyle = '#fff';
            ctx.font = '9px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, x, y);
        }

        // Função Principal de Renderização
        function renderMindMap() {
            ctx.clearRect(0, 0, W, H);

            // 1. Desenha o Centro (Logo História)
            ctx.beginPath();
            ctx.arc(CX, CY, 60, 0, Math.PI * 2);
            ctx.fillStyle = '#111';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            ctx.stroke();
            
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 22px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('HISTÓRIA', CX, CY - 5);
            ctx.font = '10px Arial';
            ctx.fillText('(BRASIL & MUNDO)', CX, CY + 20);

            // 2. Desenha as Categorias Principais
            const mainRadius = 180;
            const subRadius = 280;

            categories.forEach(cat => {
                const rad = (cat.angle * Math.PI) / 180;
                const x = CX + mainRadius * Math.cos(rad);
                const y = CY + mainRadius * Math.sin(rad);

                // Desenha a conexão principal
                ctx.beginPath();
                ctx.moveTo(CX, CY);
                ctx.lineTo(x, y);
                ctx.strokeStyle = cat.color;
                ctx.lineWidth = 3;
                ctx.stroke();

                // Desenha o nó principal
                drawNode(x, y, cat.label, cat.color, 35);

                // 3. Desenha os Sub-nós (Subcategorias)
                const subCount = cat.subs.length;
                const angleSpread = 30; // Quanto de ângulo entre os subs
                const startAngle = cat.angle - (subCount - 1) * (angleSpread / 2);
                
                cat.subs.forEach((sub, index) => {
                    const subRad = ( (startAngle + (index * angleSpread)) * Math.PI ) / 180;
                    const sx = CX + subRadius * Math.cos(subRad);
                    const sy = CY + subRadius * Math.sin(subRad);

                    // Linha do Principal para o Sub
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(sx, sy);
                    ctx.strokeStyle = cat.color;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    // Desenha o Sub
                    drawSubNode(sx, sy, sub, cat.color, 18);
                });
            });

            // Adiciona alguns conectores entre sub-nós para simular a complexidade
            ctx.globalAlpha = 0.15;
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            
            // Conexões aleatórias para visual "mapa complexo"
            const randConnect = [
                [0, 1], [1, 3], [2, 5], [4, 7], [3, 6], [5, 8]
            ];
            randConnect.forEach(pair => {
                const c1 = categories[pair[0]];
                const c2 = categories[pair[1]];
                if (c1 && c2) {
                    const rad1 = (c1.angle * Math.PI) / 180;
                    const rad2 = (c2.angle * Math.PI) / 180;
                    const x1 = CX + (mainRadius + 60) * Math.cos(rad1);
                    const y1 = CY + (mainRadius + 60) * Math.sin(rad1);
                    const x2 = CX + (mainRadius + 60) * Math.cos(rad2);
                    const y2 = CY + (mainRadius + 60) * Math.sin(rad2);
                    
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            });
            ctx.setLineDash([]);
            ctx.globalAlpha = 1.0;
        }

        // Renderiza o mapa
        renderMindMap();

        // Adiciona interatividade (Redimensionar suavemente)
        window.addEventListener('resize', () => {
            // Apenas re-renderiza se o tamanho mudar drasticamente
        });

    </script>
</body>
</html>
