<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detector de Falsos Especialistas — História Mundial</title>
  <link rel="stylesheet" href="../../theme.css">
  <link rel="stylesheet" href="../../games-theme.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../supabase.js"></script>
  <style>
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
    .container { max-width: 760px; margin: 0 auto; padding: 2rem 1rem; }
    .header { text-align: center; margin-bottom: 2.5rem; }
    .header h1 { font-size: 1.5rem; color: #f59e0b; letter-spacing: 0.05em; text-transform: uppercase; margin: 0 0 0.5rem; }
    .header p { color: var(--text-muted, #888); font-size: 0.9rem; margin: 0; }
    .screen { display: none; }
    .screen.active { display: block; }
    .topic-section { margin-bottom: 2rem; }
    .topic-section h2 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #f59e0b; margin: 0 0 0.75rem; border-bottom: 1px solid var(--border, #333); padding-bottom: 0.4rem; }
    .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.5rem; }
    .topic-btn { background: var(--card-bg, #1a1a1a); border: 1px solid var(--border, #333); color: var(--text); padding: 0.65rem 0.9rem; border-radius: 6px; cursor: pointer; text-align: left; font-size: 0.85rem; transition: border-color 0.15s, background 0.15s; }
    .topic-btn:hover { border-color: #f59e0b; background: var(--card-hover, #222); }
    .progress-bar { height: 4px; background: var(--border, #333); border-radius: 2px; margin-bottom: 1.5rem; }
    .progress-fill { height: 100%; background: #f59e0b; border-radius: 2px; transition: width 0.3s; }
    .q-meta { font-size: 0.75rem; color: var(--text-muted, #888); margin-bottom: 0.5rem; }
    .q-conceito { font-size: 0.7rem; background: var(--card-bg, #1a1a1a); color: #f59e0b; border-left: 3px solid #f59e0b; padding: 0.3rem 0.6rem; border-radius: 0 4px 4px 0; margin-bottom: 1rem; display: inline-block; }
    .q-text { font-size: 1.05rem; line-height: 1.6; margin-bottom: 1.25rem; }
    .answer-area { width: 100%; min-height: 120px; background: var(--card-bg, #1a1a1a); border: 1px solid var(--border, #333); border-radius: 8px; color: var(--text); padding: 0.75rem 1rem; font-size: 0.95rem; font-family: var(--font); resize: vertical; box-sizing: border-box; }
    .answer-area:focus { outline: none; border-color: #f59e0b; }
    .char-count { text-align: right; font-size: 0.72rem; color: var(--text-muted, #888); margin-top: 0.3rem; }
    .feedback-panel { background: var(--card-bg, #1a1a1a); border: 1px solid var(--border, #333); border-radius: 10px; padding: 1.25rem; margin-top: 1.25rem; }
    .feedback-scores { display: flex; gap: 1rem; margin-bottom: 1rem; }
    .score-pill { flex: 1; text-align: center; background: var(--bg, #111); border-radius: 8px; padding: 0.6rem 0.4rem; }
    .score-pill .val { font-size: 1.4rem; font-weight: 700; color: #f59e0b; }
    .score-pill .lbl { font-size: 0.65rem; color: var(--text-muted, #888); text-transform: uppercase; }
    .lacuna-box { background: #2a1a0e; border-left: 3px solid #d97706; padding: 0.75rem 1rem; border-radius: 0 6px 6px 0; margin-bottom: 1rem; font-size: 0.9rem; }
    .lacuna-box.none { background: #0e1f13; border-color: #22c55e; }
    .lacuna-label { font-size: 0.68rem; text-transform: uppercase; color: #d97706; letter-spacing: 0.08em; margin-bottom: 0.3rem; }
    .lacuna-box.none .lacuna-label { color: #22c55e; }
    .list-section { margin-bottom: 0.75rem; }
    .list-section h4 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted, #888); margin: 0 0 0.4rem; }
    .list-section ul { margin: 0; padding-left: 1.2rem; font-size: 0.85rem; line-height: 1.6; }
    .modelo-box { background: var(--bg, #111); border-radius: 6px; padding: 0.75rem 1rem; font-size: 0.85rem; line-height: 1.65; color: var(--text-muted, #bbb); font-style: italic; }
    .report-header { text-align: center; margin-bottom: 2rem; }
    .total-score { font-size: 3rem; font-weight: 700; color: #f59e0b; }
    .score-max { font-size: 1rem; color: var(--text-muted, #888); }
    .verdict { font-size: 1rem; margin: 0.5rem 0 0; }
    .gap-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.6rem; }
    .gap-item { background: var(--card-bg, #1a1a1a); border-radius: 8px; padding: 0.85rem 1rem; font-size: 0.875rem; border-left: 3px solid #f59e0b; }
    .gap-item.ok { border-color: #22c55e; }
    .gap-q { font-size: 0.7rem; color: var(--text-muted, #888); margin-bottom: 0.25rem; }
    .gap-text { line-height: 1.5; }
    .btn { display: inline-block; padding: 0.65rem 1.4rem; border-radius: 7px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: opacity 0.15s; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #f59e0b; color: #111; }
    .btn-ghost { background: transparent; border: 1px solid var(--border, #333); color: var(--text); }
    .btn-row { display: flex; gap: 0.75rem; margin-top: 1rem; }
    .loading { text-align: center; padding: 2rem; color: var(--text-muted, #888); font-size: 0.9rem; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border, #333); border-top-color: #f59e0b; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 0.5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .back-link { display: inline-block; color: var(--text-muted, #888); font-size: 0.8rem; margin-bottom: 1.5rem; text-decoration: none; }
    .back-link:hover { color: #f59e0b; }

    /* Quiz de revisão */
    .review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    .review-counter { font-size: 0.8rem; color: var(--text-muted, #888); }
    .review-score { font-size: 0.85rem; font-weight: 600; color: #f59e0b; }
    .review-enunciado { font-size: 1rem; line-height: 1.65; margin-bottom: 1.25rem; }
    .alt-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .alt-btn { background: var(--card-bg, #1a1a1a); border: 1px solid var(--border, #333); color: var(--text); padding: 0.7rem 1rem; border-radius: 8px; cursor: pointer; text-align: left; font-size: 0.9rem; transition: border-color 0.15s, background 0.15s; display: flex; gap: 0.75rem; align-items: flex-start; }
    .alt-btn:hover:not(:disabled) { border-color: #f59e0b; background: var(--card-hover, #222); }
    .alt-btn:disabled { cursor: default; }
    .alt-btn.correta { border-color: #22c55e; background: #0e1f13; }
    .alt-btn.errada { border-color: #ef4444; background: #1f0e0e; opacity: 0.7; }
    .alt-btn.selecionada-errada { border-color: #ef4444; background: #2a1010; opacity: 1; }
    .alt-letra { font-weight: 700; min-width: 1.2rem; color: var(--text-muted, #888); }
    .alt-btn.correta .alt-letra { color: #22c55e; }
    .alt-btn.selecionada-errada .alt-letra { color: #ef4444; }
    .review-explicacao { background: var(--card-bg, #1a1a1a); border-left: 3px solid #f59e0b; border-radius: 0 6px 6px 0; padding: 0.75rem 1rem; font-size: 0.85rem; line-height: 1.6; color: var(--text-muted, #bbb); margin-bottom: 1rem; display: none; }
    .review-result { text-align: center; padding: 2rem 1rem; }
    .review-result .big-score { font-size: 3rem; font-weight: 700; color: #f59e0b; }
    .review-result .sub { color: var(--text-muted, #888); font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="container">
  <a href="../../detector/index.html" class="back-link">← Voltar ao Hub</a>
  <div class="header">
    <h1>Detector de Falsos Especialistas</h1>
    <p>Selecione um tópico. Responda 5 perguntas. Descubra onde estão suas lacunas reais.</p>
  </div>
  <div id="screen-topics" class="screen active"></div>
  <div id="screen-quiz" class="screen">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div id="quiz-content"></div>
  </div>
  <div id="screen-review" class="screen">
    <div class="progress-bar"><div class="progress-fill" id="review-progress-fill" style="width:0%"></div></div>
    <div id="review-content"></div>
  </div>

  <div id="screen-report" class="screen">
    <div class="report-header">
      <div class="total-score" id="report-score">0</div>
      <div class="score-max">/ 150 pontos</div>
      <p class="verdict" id="report-verdict"></p>
    </div>
    <h3 style="font-size:0.8rem;text-transform:uppercase;letter-spacing:.08em;color:#f59e0b;margin:0 0 1rem">Lacunas identificadas</h3>
    <ul class="gap-list" id="gap-list"></ul>
    <div class="btn-row" style="margin-top:2rem;justify-content:center">
      <button class="btn btn-primary" onclick="startReviewQuiz()">Revisar com Quiz (20 questões) →</button>
      <button class="btn btn-ghost" onclick="resetToTopics()">Testar outro tópico</button>
    </div>
  </div>
</div>
<script>
const EDITAL = [
  {
    secao: '1. Estruturas e Ideias Econômicas',
    topicos: [
      'Da Revolução Industrial ao capitalismo organizado (séc. XVIII-XX)',
      'Principais fases do desenvolvimento capitalista desde ~1780',
      'Principais ideias econômicas — da Fisiocracia ao Liberalismo',
      'Marxismo',
      'Crise de 1929 e o New Deal',
      'Prosperidade no segundo pós-guerra',
      'Welfare State e sua crise',
      'Pós-Fordismo e acumulação flexível',
    ],
  },
  {
    secao: '2. Revoluções',
    topicos: [
      'Revolução Francesa e as revoluções burguesas',
      'Processos de independência na América',
      'Conceitos e características das revoluções contemporâneas',
      'Anarquismo e socialismo',
      'Revoluções no século XX — Rússia e China',
      'Revoluções na América Latina — México e Cuba',
    ],
  },
  {
    secao: '3. Relações Internacionais',
    topicos: [
      'Modelos e interpretações das RI',
      'Concerto Europeu e sua crise (1815-1918)',
      'Rivalidades coloniais e causas da 1ª Guerra Mundial',
      'Os 14 pontos de Wilson e a Paz de Versalhes',
      'Liga das Nações',
      'Causas da 2ª Guerra Mundial',
      'Conferências de Moscou, Teerã, Ialta, Potsdam e São Francisco',
      'Bretton Woods, Plano Marshall e ONU',
      'Guerra Fria — bipolaridade de Truman a Nixon',
      'Conflitos localizados, détente e segunda Guerra Fria',
      'Crise e desagregação do bloco soviético',
    ],
  },
  {
    secao: '4. Colonialismo, Imperialismo e Dominação',
    topicos: [
      'Fim do colonialismo do Antigo Regime e nova expansão europeia',
      'Debates acerca da natureza do Imperialismo',
      'Partilha da África e da Ásia',
      'Dominação e reação na Índia, China e Japão',
      'Descolonização, Conferência de Bandung e Não Alinhamento',
      'O conceito de Terceiro Mundo',
    ],
  },
  {
    secao: '5. Evolução Política e Econômica nas Américas',
    topicos: [
      'Expansão territorial nos EUA e Guerra de Secessão',
      'Identidades nacionais na América Latina — militarismo e caudilhismo',
      'Doutrina Monroe e política externa dos EUA na América Latina',
      'Pan-Americanismo, OEA e Tratado do Rio de Janeiro',
      'Experiências de integração nas Américas',
    ],
  },
  {
    secao: '6. Ideias e Regimes Políticos',
    topicos: [
      'Liberalismo e nacionalismo no século XIX',
      'Construção dos Estados nacionais — Alemanha e Itália',
      'Democracia, fascismo e comunismo no século XX',
      'Ditaduras e regimes fascistas',
      'Novo nacionalismo e fundamentalismo contemporâneo',
      'O liberalismo no século XX',
    ],
  },
  {
    secao: '7. Vida Cultural e RI no Século XXI',
    topicos: [
      'Movimento romântico, cultura do imperialismo e vanguardas europeias',
      'O modernismo e a pós-modernidade',
      'RI no século XXI frente aos paradigmas digitais, redes sociais e tecnologias de comunicação',
    ],
  },
];

let state = { topico: '', perguntas: [], respostas: [], avaliacoes: [], currentQ: 0, feedbackShown: false };
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function renderTopics() {
  document.getElementById('screen-topics').innerHTML = EDITAL.map(sec => `<div class="topic-section"><h2>${sec.secao}</h2><div class="topic-grid">${sec.topicos.map(t => `<button class="topic-btn" onclick="startSession(this.dataset.t)" data-t="${esc(t)}">${esc(t)}</button>`).join('')}</div></div>`).join('');
}
function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
async function startSession(elOrStr) {
  const topico = typeof elOrStr === 'string' ? elOrStr : elOrStr.dataset.t;
  state = { topico, perguntas: [], respostas: [], avaliacoes: [], currentQ: 0, feedbackShown: false };
  showScreen('screen-quiz');
  renderLoading('Gerando perguntas para "' + esc(topico) + '"…');
  try {
    const res = await fetch('/api/generate-gap-questions', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ topico }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao gerar perguntas');
    state.perguntas = data.perguntas; renderQuestion(0);
  } catch (err) { renderError(err.message); }
}
function renderLoading(msg) { document.getElementById('quiz-content').innerHTML = `<div class="loading"><span class="spinner"></span>${msg}</div>`; }
function renderError(msg) { document.getElementById('quiz-content').innerHTML = `<div class="loading" style="color:#ef4444">${msg}</div><div class="btn-row" style="justify-content:center"><button class="btn btn-ghost" onclick="resetToTopics()">← Voltar</button></div>`; }
function renderQuestion(idx) {
  state.currentQ = idx; state.feedbackShown = false;
  const q = state.perguntas[idx];
  document.getElementById('progress-fill').style.width = (idx / state.perguntas.length * 100) + '%';
  document.getElementById('quiz-content').innerHTML = `<div class="q-meta">Pergunta ${idx + 1} de ${state.perguntas.length} · ${esc(state.topico)}</div><div class="q-conceito">Conceito testado: ${esc(q.conceito_alvo)}</div><div class="q-text">${esc(q.pergunta)}</div><textarea class="answer-area" id="answer-input" placeholder="Escreva sua resposta…" oninput="updateCharCount(this)"></textarea><div class="char-count"><span id="char-count">0</span> / 3000</div><div class="btn-row"><button class="btn btn-primary" id="btn-submit" onclick="submitAnswer()">Avaliar resposta</button><button class="btn btn-ghost" onclick="resetToTopics()">Abandonar</button></div><div id="feedback-area"></div>`;
}
function updateCharCount(el) { document.getElementById('char-count').textContent = el.value.length; }
async function submitAnswer() {
  const resposta = document.getElementById('answer-input').value;
  if (resposta.trim().length < 5) { alert('Escreva ao menos uma frase antes de avaliar.'); return; }
  const btn = document.getElementById('btn-submit'); btn.disabled = true; btn.textContent = 'Avaliando…';
  const q = state.perguntas[state.currentQ]; state.respostas[state.currentQ] = resposta;
  try {
    const res = await fetch('/api/evaluate-gap-answer', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pergunta: q.pergunta, conceito_alvo: q.conceito_alvo, resposta }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro na avaliação');
    state.avaliacoes[state.currentQ] = data; renderFeedback(data, q);
  } catch (err) { btn.disabled = false; btn.textContent = 'Avaliar resposta'; alert('Erro: ' + err.message); }
}
function renderFeedback(av, q) {
  state.feedbackShown = true;
  const hasLacuna = !av.lacuna_revelada.toLowerCase().startsWith('nenhuma');
  const isLast = state.currentQ === state.perguntas.length - 1;
  document.getElementById('feedback-area').innerHTML = `<div class="feedback-panel"><div class="feedback-scores"><div class="score-pill"><div class="val">${av.dominio}</div><div class="lbl">Domínio</div></div><div class="score-pill"><div class="val">${av.aplicacao}</div><div class="lbl">Aplicação</div></div><div class="score-pill"><div class="val">${av.precisao}</div><div class="lbl">Precisão</div></div><div class="score-pill"><div class="val">${av.total}</div><div class="lbl">Total/30</div></div></div><div class="lacuna-box ${hasLacuna ? '' : 'none'}"><div class="lacuna-label">${hasLacuna ? '⚠ Lacuna revelada' : '✓ Domínio confirmado'}</div>${esc(av.lacuna_revelada)}</div>${av.o_que_faltou.length ? `<div class="list-section"><h4>O que faltou</h4><ul>${av.o_que_faltou.map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>` : ''}${av.o_que_acertou.length ? `<div class="list-section"><h4>O que acertou</h4><ul>${av.o_que_acertou.map(x => `<li>${esc(x)}</li>`).join('')}</ul></div>` : ''}<div class="list-section"><h4>Resposta modelo</h4><div class="modelo-box">${esc(av.resposta_modelo)}</div></div><div class="btn-row">${isLast ? `<button class="btn btn-primary" onclick="showReport()">Ver relatório final →</button>` : `<button class="btn btn-primary" onclick="renderQuestion(${state.currentQ + 1})">Próxima pergunta →</button>`}</div></div>`;
  document.getElementById('btn-submit').style.display = 'none';
  document.getElementById('feedback-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function showReport() {
  const total = state.avaliacoes.reduce((s, a) => s + (a?.total || 0), 0);
  const pct = Math.round((total / (state.perguntas.length * 30)) * 100);
  const verdict = pct >= 80 ? 'Domínio sólido — siga para o próximo tópico.' : pct >= 60 ? 'Conhecimento parcial — revise os pontos marcados.' : pct >= 40 ? 'Lacunas significativas — retorne ao material básico.' : 'Domínio superficial — este tópico precisa de atenção prioritária.';
  document.getElementById('report-score').textContent = total;
  document.getElementById('report-verdict').textContent = verdict;
  document.getElementById('gap-list').innerHTML = state.perguntas.map((q, i) => { const av = state.avaliacoes[i]; if (!av) return ''; const hasLacuna = !av.lacuna_revelada.toLowerCase().startsWith('nenhuma'); return `<li class="gap-item ${hasLacuna ? '' : 'ok'}"><div class="gap-q">P${i + 1} · ${esc(q.conceito_alvo)}</div><div class="gap-text">${esc(av.lacuna_revelada)}</div></li>`; }).join('');
  document.getElementById('progress-fill').style.width = '100%';
  saveDetectorSession('HM').finally(() => { showScreen('screen-report'); window.scrollTo({ top: 0, behavior: 'smooth' }); });
}
async function saveDetectorSession(subjectId) {
  try {
    const user = await DB.getUser(); if (!user) return;
    const total = state.avaliacoes.reduce((s, a) => s + (a?.total || 0), 0);
    const maxScore = state.perguntas.length * 30;
    const wrongItems = state.perguntas.map((q, i) => { const av = state.avaliacoes[i]; if (!av || av.total >= 20) return null; return { q: q.pergunta, correct: av.lacuna_revelada, userAns: state.respostas[i] || '' }; }).filter(Boolean);
    await DB.addSession({ type: 'detector', deck: state.topico, subject: subjectId, total: maxScore, correct: total, wrong: maxScore - total, wrong_items: wrongItems });
  } catch (e) { console.warn('detector save:', e); }
}
function resetToTopics() { showScreen('screen-topics'); window.scrollTo({ top: 0, behavior: 'smooth' }); }

let reviewState = { questoes: [], currentQ: 0, acertos: 0, respondidas: 0 };
async function startReviewQuiz() {
  showScreen('screen-review');
  document.getElementById('review-progress-fill').style.width = '0%';
  document.getElementById('review-content').innerHTML = `<div class="loading"><span class="spinner"></span>Gerando quiz de revisão personalizado…</div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  const lacunas = state.avaliacoes.filter(av => av && !av.lacuna_revelada.toLowerCase().startsWith('nenhuma')).flatMap(av => [av.lacuna_revelada, ...(av.o_que_faltou || [])]).slice(0, 8);
  try {
    const res = await fetch('/api/generate-review-quiz', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ topico: state.topico, lacunas }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erro ao gerar quiz');
    reviewState = { questoes: data.questoes, currentQ: 0, acertos: 0, respondidas: 0 };
    renderReviewQuestion(0);
  } catch (err) {
    document.getElementById('review-content').innerHTML = `<div class="loading" style="color:#ef4444">${esc(err.message)}</div><div class="btn-row" style="justify-content:center;margin-top:1rem"><button class="btn btn-ghost" onclick="showScreen('screen-report')">← Voltar ao relatório</button></div>`;
  }
}
function renderReviewQuestion(idx) {
  reviewState.currentQ = idx;
  const q = reviewState.questoes[idx]; const total = reviewState.questoes.length;
  document.getElementById('review-progress-fill').style.width = (idx / total * 100) + '%';
  document.getElementById('review-content').innerHTML = `<div class="review-header"><span class="review-counter">Questão ${idx + 1} de ${total}</span><span class="review-score">✓ ${reviewState.acertos} acertos</span></div><div class="review-enunciado">${esc(q.enunciado)}</div><div class="alt-list" id="alt-list">${['A','B','C','D','E'].map(l => `<button class="alt-btn" id="alt-${l}" onclick="responderReview('${l}')"><span class="alt-letra">${l}</span><span>${esc(q.alternativas[l])}</span></button>`).join('')}</div><div class="review-explicacao" id="review-explicacao">${esc(q.explicacao)}</div><div class="btn-row" id="review-next-row" style="display:none">${idx + 1 < total ? `<button class="btn btn-primary" onclick="renderReviewQuestion(${idx + 1})">Próxima →</button>` : `<button class="btn btn-primary" onclick="showReviewResult()">Ver resultado final →</button>`}<button class="btn btn-ghost" onclick="showScreen('screen-report')">← Relatório</button></div>`;
}
function responderReview(letra) {
  const q = reviewState.questoes[reviewState.currentQ];
  if (letra === q.correta) reviewState.acertos++;
  reviewState.respondidas++;
  ['A','B','C','D','E'].forEach(l => { const btn = document.getElementById('alt-' + l); btn.disabled = true; if (l === q.correta) btn.classList.add('correta'); else if (l === letra) btn.classList.add('selecionada-errada'); else btn.classList.add('errada'); });
  document.getElementById('review-explicacao').style.display = 'block';
  document.getElementById('review-next-row').style.display = 'flex';
  document.getElementById('review-next-row').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function showReviewResult() {
  const total = reviewState.questoes.length; const pct = Math.round((reviewState.acertos / total) * 100);
  document.getElementById('review-progress-fill').style.width = '100%';
  const msg = pct >= 85 ? 'Excelente domínio — lacunas superadas!' : pct >= 70 ? 'Bom desempenho — continue revisando os pontos errados.' : pct >= 50 ? 'Progresso razoável — recomenda-se nova revisão.' : 'Lacunas ainda presentes — retorne ao material básico.';
  document.getElementById('review-content').innerHTML = `<div class="review-result"><div class="big-score">${reviewState.acertos}<span style="font-size:1.5rem;color:var(--text-muted,#888)">/${total}</span></div><div style="font-size:1.1rem;margin:0.25rem 0">${pct}%</div><div class="sub">${msg}</div></div><div class="btn-row" style="justify-content:center;margin-top:1.5rem"><button class="btn btn-primary" onclick="startReviewQuiz()">Novo quiz de revisão</button><button class="btn btn-ghost" onclick="resetToTopics()">Testar outro tópico</button></div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderTopics();
</script>
