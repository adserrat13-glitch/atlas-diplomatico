<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1115;color:#e5e7eb;font-family:'JetBrains Mono','Courier New',monospace;min-height:100vh}
nav{position:sticky;top:0;z-index:200;height:52px;background:#0f1115;border-bottom:1px solid rgba(212,175,55,.15);display:flex;align-items:center;padding:0 16px;gap:2px;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nav-ham{background:none;border:none;color:#9ca3af;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:.15s;flex-shrink:0;margin-right:4px}
.nav-ham:hover{color:#e5e7eb;background:rgba(255,255,255,.07)}
.nav-logo{font-size:13px;font-weight:900;letter-spacing:2.5px;margin-right:14px;white-space:nowrap;flex-shrink:0;color:#d4af37}
.nav-logo span{text-decoration:underline}
nav a{color:#9ca3af;text-decoration:none;font-size:11px;font-weight:600;padding:5px 9px;border-radius:6px;transition:.15s;white-space:nowrap;display:flex;align-items:center;gap:4px;flex-shrink:0}
nav a:hover{color:#e5e7eb;background:rgba(255,255,255,.06)}
nav a.active{color:#d4af37;border-bottom:2px solid #d4af37;border-radius:0;padding-bottom:3px}
.nav-spacer{flex:1;min-width:8px}
.nav-cd{font-size:11px;font-weight:700;color:#d4af37;background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.25);padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.nav-user{width:28px;height:28px;border-radius:50%;background:rgba(212,175,55,.15);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-left:6px;color:#d4af37}
.view{display:none}.view.active{display:block}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:10px;color:#6b7280;font-size:13px}
.loading-dot{width:6px;height:6px;border-radius:50%;background:#d4af37;animation:loadpulse 1s ease infinite}
@keyframes loadpulse{0%,100%{opacity:.2}50%{opacity:1}}
.stage-hero{padding:32px 16px 20px;text-align:center;max-width:680px;margin:0 auto}
.stage-hero h1{font-size:20px;font-weight:800;letter-spacing:2px;margin-bottom:4px;color:#d4af37}
.stage-hero p{font-size:11px;color:#6b7280;margin-top:4px}
.stage-hero-meta{font-size:11px;color:#9ca3af;margin-top:8px}
.stages-grid{display:grid;grid-template-columns:repeat(1,1fr);gap:12px;max-width:640px;margin:0 auto;padding:0 16px 60px}
@media(min-width:480px){.stages-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:720px){.stages-grid{grid-template-columns:repeat(4,1fr)}}
.stage-card{background:#171a21;border:1.5px solid rgba(212,175,55,.15);border-radius:12px;padding:20px 14px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;flex-direction:column;gap:6px;user-select:none}
.stage-card:hover{border-color:rgba(212,175,55,.5);background:#1e2230}
.stage-card.started{border-color:rgba(212,175,55,.3)}
.stage-icon{font-size:24px;line-height:1}
.stage-name{font-size:12px;font-weight:800;color:#e5e7eb;line-height:1.35}
.stage-meta{font-size:10px;color:#6b7280}
.stage-prog-bar{height:3px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;margin-top:2px}
.stage-prog-fill{height:100%;background:#d4af37;border-radius:99px;transition:width .5s}
.stage-prog-label{font-size:9px;color:#9ca3af;margin-top:3px;font-weight:600}
.stage-reset-btn{font-size:10px;font-weight:700;padding:4px 8px;border-radius:6px;border:1px solid rgba(248,113,113,.3);background:transparent;color:#9ca3af;cursor:pointer;margin-top:4px;font-family:inherit;transition:.15s;text-align:left}
.stage-reset-btn:hover{border-color:#f87171;color:#f87171;background:rgba(248,113,113,.08)}
.game-wrap{max-width:900px;margin:0 auto;padding:0 20px 40px}
.game-topbar{display:flex;align-items:center;gap:10px;padding:14px 0 10px;flex-wrap:wrap}
.game-back{background:none;border:1px solid rgba(212,175,55,.25);color:#9ca3af;font-size:12px;font-weight:700;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:inherit;transition:.15s;flex-shrink:0}
.game-back:hover{color:#d4af37;border-color:#d4af37}
.game-section-name{font-size:14px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#d4af37}
.game-round{font-size:12px;color:#6b7280;flex-shrink:0}
.timer-badge{font-size:13px;font-weight:700;background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.2);padding:5px 14px;border-radius:20px;flex-shrink:0;font-variant-numeric:tabular-nums;color:#d4af37}
.combo-badge{font-size:13px;font-weight:800;color:#000;background:#d4af37;padding:5px 14px;border-radius:20px;flex-shrink:0}
.combo-badge.hidden{display:none}
.combo-badge.pop{animation:comboPop .35s ease}
.sd-btn{font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;border:1px solid rgba(248,113,113,.35);background:transparent;color:#9ca3af;cursor:pointer;font-family:inherit;transition:.15s;letter-spacing:.5px;flex-shrink:0}
.sd-btn:hover{border-color:#f87171;color:#f87171}
.sd-btn.active{background:rgba(248,113,113,.15);border-color:#f87171;color:#f87171}
@keyframes comboPop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
.game-prog{height:3px;background:rgba(212,175,55,.1);border-radius:99px;margin-bottom:18px;overflow:hidden}
.game-prog-fill{height:100%;background:#d4af37;border-radius:99px;transition:width .5s}
.columns-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.col-label{font-size:11px;font-weight:700;letter-spacing:1.5px;color:#6b7280;margin-bottom:8px;text-transform:uppercase}
.match-col{display:flex;flex-direction:column;gap:10px}
.match-item{background:#171a21;border:1.5px solid rgba(212,175,55,.15);border-radius:12px;padding:16px 14px;font-size:13px;font-weight:600;line-height:1.5;cursor:pointer;transition:background .12s,border-color .12s,transform .1s,opacity .3s;user-select:none;min-height:64px;display:flex;align-items:center;word-break:break-word;hyphens:auto;color:#e5e7eb}
.match-item:hover:not(.is-correct):not(.is-wrong){background:rgba(212,175,55,.07);border-color:rgba(212,175,55,.4)}
.match-item.selected{background:rgba(212,175,55,.12);border-color:#d4af37;transform:scale(1.02);box-shadow:0 0 0 1px rgba(212,175,55,.2)}
.match-item.is-correct{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.4);color:#34d399;pointer-events:none}
.match-item.is-wrong{background:rgba(248,113,113,.08);border-color:rgba(248,113,113,.4);color:#f87171;animation:shake .35s ease}
.match-item.vanish{opacity:0;transform:scale(0.85);pointer-events:none;transition:opacity .3s,transform .3s}
.match-item.gone{display:none}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.result-wrap{max-width:420px;margin:0 auto;padding:40px 16px 60px;text-align:center}
.result-emoji{font-size:52px;margin-bottom:10px;min-height:170px;display:flex;align-items:center;justify-content:center}.result-emoji img{width:160px;height:160px;object-fit:cover;border-radius:50%}
.result-title{font-size:16px;font-weight:800;letter-spacing:.5px;margin-bottom:4px}
.result-sub{font-size:11px;color:#6b7280;margin-bottom:16px}
.result-stars{font-size:36px;letter-spacing:4px;margin-bottom:24px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:28px;text-align:left}
.result-stat{background:#171a21;border:1px solid rgba(212,175,55,.15);border-radius:10px;padding:14px 12px}
.result-stat-label{font-size:9px;font-weight:700;letter-spacing:1px;color:#6b7280;text-transform:uppercase;margin-bottom:5px}
.result-stat-val{font-size:20px;font-weight:800}
.c-green{color:#34d399}.c-red{color:#f87171}.c-gold{color:#d4af37}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-r{border:none;border-radius:10px;padding:12px 22px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;letter-spacing:.3px}
.btn-primary{background:#d4af37;color:#0f1115}.btn-primary:hover{background:#b8962e}
.btn-secondary{background:#171a21;border:1px solid rgba(212,175,55,.25);color:#e5e7eb}.btn-secondary:hover{background:#1e2230;border-color:rgba(212,175,55,.5)}
.btn-review{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);color:#f87171}.btn-review:hover{background:rgba(248,113,113,.15)}
.review-row{margin-top:10px;display:flex;justify-content:center}
.all-done{max-width:440px;margin:40px auto;padding:32px 16px;text-align:center}
.all-done h2{font-size:18px;font-weight:800;margin-bottom:8px;color:#d4af37}
.all-done p{font-size:12px;color:#6b7280}
select#batchSizeSel{background:#171a21;border:1px solid rgba(212,175,55,.25);color:#d4af37;font-family:inherit;font-size:10px;font-weight:700;padding:4px 8px;border-radius:6px;cursor:pointer;appearance:none;-webkit-appearance:none}
select#batchSizeSel option{background:#171a21;color:#e5e7eb}
</style>
</head>

<script>
let BATCH_SIZE = 5;
const PAIRS_PER_ROUND = 10;

const SECTIONS = [
  { id: 'gram', icon: 'grammar', label: 'Grammar', csv: 'GRAMMAR MATCHING.csv' },
];
const PATCH_FILES={10:'10.png',20:'20.png',30:'30.png',40:'40.png',50:'50.png',60:'60.png',70:'70.png',80:'80.png',100:'100.png'};
function acertosPatchImg(acc){let b=Math.round(acc*10)*10;if(b<10)b=10;if(b>100)b=100;if(b===90)b=100;return`../PATCH%20DE%20ERROS/${PATCH_FILES[b]}`;}

function localKey(sec)  { return `ing_${sec.id}`; }
function remoteKey(sec) { return `ing-${sec.id}`; }

const loadedPairs = {};
let currentSection = null, sectionPairs = [], batchOffset = 0;
let roundPairs = [], batchInRound = 0, currentBatch = [], matchMap = {};
let leftItems = [], rightItems = [], activeItem = null;
let matchedInBatch = 0, locked = false;
let combo = 0, maxCombo = 0, errors = 0, totalMatched = 0;
let timerSecs = 0, timerInterval = null;
let roundWrongPairs = [], storedWrongPairs = [], isReviewMode = false;
let suddenDeath = false;

function toggleSuddenDeath() {
 suddenDeath = !suddenDeath;
 const btn = document.getElementById('sdBtn');
 btn.classList.toggle('active', suddenDeath);
 btn.textContent = suddenDeath ? '☠ ELIMINAÇÃO ON' : '☠ Eliminação';
}

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(s){ return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }
function showView(id){ document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById(id).classList.add('active'); }

async function loadProgress(sec) {
 try { const r = await DB.getGameProgress(remoteKey(sec)); if(r!==null){storedWrongPairs=r.wrongPairs||[];return r;} } catch(e){}
 const l = JSON.parse(localStorage.getItem(localKey(sec))||'{}');
 storedWrongPairs = l.wrongPairs||[]; return l;
}
function saveProgress(sec, data) {
 const full = {...data, wrongPairs: storedWrongPairs};
 localStorage.setItem(localKey(sec), JSON.stringify(full));
 DB.saveGameProgress(remoteKey(sec), full).catch(()=>{});
}

function loadCSV(sec) {
 return new Promise(resolve => {
  if(loadedPairs[sec.id]){resolve();return;}
  Papa.parse(sec.csv, {
   header:false, delimiter:';', download:true, skipEmptyLines:true,
   complete({data}){ loadedPairs[sec.id]=data.filter(r=>r[0]&&r[0].trim()&&r[1]&&r[1].trim()).map(r=>({left:r[0].trim(),right:r[1].trim()})); resolve(); },
   error(){loadedPairs[sec.id]=[];resolve();}
  });
 });
}

async function init() { await Promise.all(SECTIONS.map(s=>loadCSV(s))); await renderStages(); showView('viewStages'); }
init();

async function renderStages() {
 const grid = document.getElementById('stagesGrid');
 const meta = document.getElementById('stageHeroMeta');
 let html='', totalDone=0, totalAll=0;
 for(const sec of SECTIONS){
  const pairs=loadedPairs[sec.id]||[], count=pairs.length;
  const prog=await loadProgress(sec);
  const done=Math.min(prog.batchOffset||0,count), pct=count?Math.round(done/count*100):0;
  totalDone+=done; totalAll+=count;
  const svgIco=(typeof ICONS!=='undefined'&&ICONS[sec.icon])?ICONS[sec.icon]:'';
  html+=`<div class="stage-card${done>0?' started':''}" onclick="startSection('${sec.id}')">
   <div class="stage-icon" style="width:22px;height:22px;display:flex;align-items:center;justify-content:center;color:#d4af37">${svgIco}</div><div class="stage-name">${sec.label}</div>
   <div class="stage-meta">${count} pares</div>
   <div class="stage-prog-bar"><div class="stage-prog-fill" style="width:${pct}%"></div></div>
   <div class="stage-prog-label">${done>0?`${done}/${count} (${pct}%)`:'Não iniciado'}</div>
   ${done>0?`<button class="stage-reset-btn" onclick="event.stopPropagation();resetSectionFromHub('${sec.id}')">🔄 Recomeçar</button>`:''}
  </div>`;
 }
 grid.innerHTML=html;
 meta.textContent=`${totalDone}/${totalAll} pares concluídos (${totalAll?Math.round(totalDone/totalAll*100):0}%)`;
}

async function startSection(sectionId) {
 currentSection=SECTIONS.find(s=>s.id===sectionId);
 sectionPairs=loadedPairs[sectionId]||[];
 const prog=await loadProgress(currentSection);
 batchOffset=Math.min(prog.batchOffset||0,sectionPairs.length);
 initStudyCyclePopup('ING', batchOffset);
 if(batchOffset>=sectionPairs.length&&sectionPairs.length>0){showDone();return;}
 startRound();
}

function goBackToStages(){clearInterval(timerInterval);renderStages();showView('viewStages');}

function startRound(){
 roundPairs=sectionPairs.slice(batchOffset,batchOffset+PAIRS_PER_ROUND);
 batchInRound=0; combo=0; maxCombo=0; errors=0; totalMatched=0; timerSecs=0;
 roundWrongPairs=[]; isReviewMode=false;
 clearInterval(timerInterval);
 timerInterval=setInterval(()=>{timerSecs++;document.getElementById('timerBadge').textContent=fmt(timerSecs);},1000);
 const roundNum=Math.floor(batchOffset/PAIRS_PER_ROUND)+1;
 const totalRounds=Math.ceil(sectionPairs.length/PAIRS_PER_ROUND);
 document.getElementById('gameSectionName').textContent=currentSection.label;
 document.getElementById('gameRoundLabel').textContent=`Rodada ${roundNum}/${totalRounds}`;
 document.getElementById('gameProg').style.width='0%';
 showView('viewGame'); loadBatch();
}

function loadBatch(){
 const start=batchInRound*BATCH_SIZE;
 currentBatch=roundPairs.slice(start,start+BATCH_SIZE);
 const pairOrder=shuffle([...currentBatch.keys()]);
 const rightOrder=shuffle([...currentBatch.keys()]);
 leftItems=pairOrder.map(i=>currentBatch[i].left);
 rightItems=rightOrder.map(i=>currentBatch[i].right);
 matchMap={};
 pairOrder.forEach((pairIdx,leftPos)=>{matchMap[leftPos]=currentBatch[pairIdx].right;});
 matchedInBatch=0; activeItem=null; locked=false;
 updateComboUI(); updateProgress(); renderColumns();
}

function renderColumns(){
 document.getElementById('colLeft').innerHTML=leftItems.map((t,i)=>`<div class="match-item" data-side="left" data-idx="${i}" onclick="tap(this)">${esc(t)}</div>`).join('');
 document.getElementById('colRight').innerHTML=rightItems.map((t,i)=>`<div class="match-item" data-side="right" data-idx="${i}" onclick="tap(this)">${esc(t)}</div>`).join('');
}

function tap(el){
 if(locked)return;
 if(el.classList.contains('is-correct')||el.classList.contains('gone'))return;
 const side=el.dataset.side, idx=+el.dataset.idx;
 if(!activeItem){activeItem={side,idx,el};el.classList.add('selected');return;}
 if(activeItem.el===el){el.classList.remove('selected');activeItem=null;return;}
 if(activeItem.side===side){activeItem.el.classList.remove('selected');activeItem={side,idx,el};el.classList.add('selected');return;}
 const leftIdx=side==='left'?idx:activeItem.idx, rightIdx=side==='right'?idx:activeItem.idx;
 const leftEl=side==='left'?el:activeItem.el, rightEl=side==='right'?el:activeItem.el;
 leftEl.classList.remove('selected'); rightEl.classList.remove('selected');
 activeItem=null; locked=true;
 const isMatch=matchMap[leftIdx]===rightItems[rightIdx];
 if(isMatch){
  combo++;maxCombo=Math.max(maxCombo,combo);totalMatched++;matchedInBatch++;
  updateComboUI();updateProgress();
  leftEl.classList.add('is-correct');rightEl.classList.add('is-correct');
  setTimeout(()=>{leftEl.classList.add('vanish');rightEl.classList.add('vanish');
   setTimeout(()=>{leftEl.classList.add('gone');rightEl.classList.add('gone');locked=false;
    if(matchedInBatch>=currentBatch.length)setTimeout(advanceBatch,300);},320);},420);
 }else{
  combo=0;errors++;
  if(!isReviewMode){const wp={left:leftItems[leftIdx],right:matchMap[leftIdx]};if(!roundWrongPairs.find(p=>p.left===wp.left&&p.right===wp.right))roundWrongPairs.push(wp);}
  updateComboUI();
  leftEl.classList.add('is-wrong');rightEl.classList.add('is-wrong');
  setTimeout(()=>{leftEl.classList.remove('is-wrong');rightEl.classList.remove('is-wrong');if(suddenDeath){loadBatch();}else{locked=false;}},500);
 }
}

function updateProgress(){const pct=roundPairs.length?(totalMatched/roundPairs.length)*100:0;document.getElementById('gameProg').style.width=pct+'%';}
function updateComboUI(){const b=document.getElementById('comboBadge');if(combo>=2){b.textContent=`COMBO ×${combo}`;b.classList.remove('hidden','pop');void b.offsetWidth;b.classList.add('pop');}else{b.classList.add('hidden');}}

function advanceBatch(){
 if(isReviewMode){
  currentBatch.forEach(p=>{const i=storedWrongPairs.findIndex(e=>e.left===p.left&&e.right===p.right);if(i!==-1)storedWrongPairs.splice(i,1);});
  batchInRound++;
  if(batchInRound*BATCH_SIZE>=roundPairs.length){saveProgress(currentSection,{batchOffset});showReviewResult();}else{loadBatch();}
  return;
 }
 roundWrongPairs.forEach(p=>{
  if(!storedWrongPairs.find(e=>e.left===p.left)){
   if(!p.firstSeen){const _d=new Date().toISOString().split('T')[0];p.firstSeen=_d;p.lastReview=_d;p.interval=1;p.reps=0;}
   storedWrongPairs.push(p);
  }
 });
 roundWrongPairs=[];batchInRound++;
 if(batchInRound*BATCH_SIZE>=roundPairs.length){const oldOff=batchOffset;batchOffset+=roundPairs.length;saveProgress(currentSection,{batchOffset});checkStudyCyclePopup('ING',oldOff,batchOffset);showResult();}
 else{loadBatch();}
}

function showResult(){
 clearInterval(timerInterval);
 const total=roundPairs.length, acc=total/(total+errors), stars=acc>=.9?3:acc>=.65?2:1;
 const patchEl=document.getElementById('resEmoji');patchEl.innerHTML=`<img src="${acertosPatchImg(acc)}" style="width:96px;height:96px;object-fit:contain" onerror="this.style.display='none'">`;
 document.getElementById('resTitle').textContent='Rodada concluída';
 document.getElementById('resSub').textContent=errors===0?'Sem erros! Perfeito!':`Precisão: ${Math.round(acc*100)}%`;
 document.getElementById('resStars').innerHTML='<span style="color:#d4af37">'+'⭐'.repeat(stars)+'</span><span style="color:#2a2f3a">'+'⭐'.repeat(3-stars)+'</span>';
 document.getElementById('resPairs').textContent=totalMatched;
 document.getElementById('resErrors').textContent=errors;
 document.getElementById('resTime').textContent=fmt(timerSecs);
 document.getElementById('resCombo').textContent=maxCombo;
 document.getElementById('btnNext').textContent=batchOffset>=sectionPairs.length?'Ver conclusão →':'Próxima Rodada →';
 document.getElementById('btnRepeat').style.display='';
 const rb=document.getElementById('btnReview');
 if(storedWrongPairs.length>0){rb.textContent=`🔴 Revisar Erros (${storedWrongPairs.length})`;rb.style.display='';}else{rb.style.display='none';}
 DB.addSession({type:'game',deck:remoteKey(currentSection),subject:'ING',total:totalMatched,correct:totalMatched,wrong:errors,time_seconds:timerSecs}).catch(()=>{});
 showView('viewResult');
}

function startReview(){
 isReviewMode=true;roundPairs=[...storedWrongPairs];batchInRound=0;combo=0;maxCombo=0;errors=0;totalMatched=0;timerSecs=0;
 clearInterval(timerInterval);timerInterval=setInterval(()=>{timerSecs++;document.getElementById('timerBadge').textContent=fmt(timerSecs);},1000);
 document.getElementById('gameSectionName').textContent='Revisão de Erros';
 document.getElementById('gameRoundLabel').textContent=`${roundPairs.length} pares`;
 document.getElementById('gameProg').style.width='0%';showView('viewGame');loadBatch();
}

function showReviewResult(){
 clearInterval(timerInterval);isReviewMode=false;
 const pending=storedWrongPairs.length;
 const patchEl2=document.getElementById('resEmoji');patchEl2.innerHTML=`<img src="${acertosPatchImg(pending===0?1:0.5)}" style="width:96px;height:96px;object-fit:contain" onerror="this.style.display='none'">`;
 document.getElementById('resTitle').textContent='Revisão concluída!';
 document.getElementById('resSub').textContent=pending===0?'Sem erros pendentes!':`${pending} par${pending!==1?'es':''} ainda pendente(s)`;
 document.getElementById('resStars').innerHTML=pending===0?'<span style="color:#34d399;font-size:24px">Zerado!</span>':'';
 document.getElementById('resPairs').textContent=roundPairs.length;
 document.getElementById('resErrors').textContent=errors;
 document.getElementById('resTime').textContent=fmt(timerSecs);
 document.getElementById('resCombo').textContent=maxCombo;
 document.getElementById('btnNext').textContent='Continuar →';
 document.getElementById('btnRepeat').style.display='none';
 const rb=document.getElementById('btnReview');
 if(storedWrongPairs.length>0){rb.textContent=`🔴 Revisar Novamente (${storedWrongPairs.length})`;rb.style.display='';}else{rb.style.display='none';}
 showView('viewResult');
}

function repeatRound(){batchOffset-=roundPairs.length;if(batchOffset<0)batchOffset=0;saveProgress(currentSection,{batchOffset});startRound();}

function showDone(){
 document.getElementById('doneTitle').textContent=`${currentSection.label} concluída!`;
 const doneImg=document.getElementById('donePatchImg');if(doneImg)doneImg.innerHTML=`<img src="${acertosPatchImg(1)}" style="width:96px;height:96px;object-fit:contain" onerror="this.style.display='none'">`;
 document.getElementById('doneSub').textContent=`Todos os ${sectionPairs.length} pares estudados.`;
 const row=document.getElementById('doneReviewRow'),btn=document.getElementById('doneReviewBtn');
 if(storedWrongPairs.length>0){btn.textContent=`🔴 Revisar Erros (${storedWrongPairs.length})`;row.style.display='block';}else{row.style.display='none';}
 showView('viewDone');
}

function nextRound(){if(batchOffset>=sectionPairs.length){showDone();}else{startRound();}}

function resetSection(){batchOffset=0;storedWrongPairs=[];saveProgress(currentSection,{batchOffset});startRound();}

async function resetSectionFromHub(id){
 if(!confirm('Recomeçar esta seção? O progresso será perdido.'))return;
 const sec=SECTIONS.find(s=>s.id===id);if(!sec)return;
 await saveProgress(sec,{batchOffset:0,wrongPairs:[]});renderStages();
}

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('open');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');}

(async()=>{
 try{
  const user=await DB.requireAuth();
  const [profile,,examDate]=await Promise.all([DB.getProfile(),DB.isAdmin(),DB.getExamDate()]);
  const nu=document.getElementById('navUser');if(nu)nu.textContent=(profile?.name||user.email||'?').slice(0,2).toUpperCase();
  const nc=document.getElementById('navCountdown');if(nc&&examDate)nc.textContent=Math.ceil((examDate-Date.now())/86400000)+'d';
 }catch(e){}
})();
</script>
